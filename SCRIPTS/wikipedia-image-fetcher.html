<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wikipedia Image Fetcher</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, sans-serif; background: #fff; color: #0D0D0D; padding: 2rem; max-width: 960px; margin: 0 auto; }
  h1 { font-size: 1.4rem; font-weight: 500; margin-bottom: 0.4rem; }
  p.sub { font-size: 0.875rem; color: #6B6B5E; margin-bottom: 1.5rem; }
  label { font-size: 0.8rem; color: #4A4A4A; display: block; margin-bottom: 6px; }
  textarea { width: 100%; font-family: monospace; font-size: 13px; padding: 10px; border: 1px solid #9B957F; border-radius: 4px; resize: vertical; }
  .controls { display: flex; gap: 8px; margin: 1rem 0; flex-wrap: wrap; align-items: center; }
  button { padding: 8px 16px; font-size: 13px; border: 1px solid #4A4A4A; background: #fff; color: #0D0D0D; border-radius: 4px; cursor: pointer; }
  button:hover { background: #f0f0f0; }
  button:disabled { opacity: 0.4; cursor: not-allowed; }
  #status { font-size: 13px; color: #6B6B5E; }
  #grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 12px; margin-top: 1rem; }
  .card { border: 1px solid #9B957F; border-radius: 6px; overflow: hidden; }
  .card img { width: 100%; height: 140px; object-fit: cover; display: block; }
  .card-body { padding: 8px 10px; }
  .card-name { font-size: 13px; font-weight: 500; margin-bottom: 2px; }
  .card-file { font-size: 11px; color: #6B6B5E; font-family: monospace; margin-bottom: 3px; }
  .card-attr { font-size: 11px; color: #9B957F; line-height: 1.4; }
  .card-via { font-size: 10px; color: #4A4A4A; margin-top: 3px; font-style: italic; }
  .card-error { height: 140px; background: #f5f5f0; display: flex; align-items: center; justify-content: center; font-size: 12px; color: #8B0000; padding: 8px; text-align: center; }
</style>
</head>
<body>

<h1>Wikipedia Image Fetcher</h1>
<p class="sub">Paste names, fetch images, download as ZIP. Falls back to search when exact match fails.</p>

<label>Names — one per line</label>
<textarea id="nameInput" rows="8" placeholder="Alan Turing&#10;Grace Hopper&#10;David Ogilvy&#10;Florence Nightingale David"></textarea>

<div class="controls">
  <button onclick="fetchAll()">Fetch images</button>
  <button id="zipBtn" onclick="downloadZip()" style="display:none;">Download all as ZIP</button>
  <span id="status"></span>
</div>

<div id="grid"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<script>
const results = [];

function slug(name) {
  return name.toLowerCase().trim().replace(/\s+/g, '-').replace(/[^a-z0-9-]/g, '');
}

function setStatus(msg) {
  document.getElementById('status').textContent = msg;
}

// Step 1: try exact slug
async function tryExact(name) {
  const encoded = encodeURIComponent(name.trim().replace(/ /g, '_'));
  try {
    const res = await fetch(`https://en.wikipedia.org/api/rest_v1/page/summary/${encoded}`);
    if (!res.ok) return null;
    const data = await res.json();
    if (!data.thumbnail) return null;
    return { data, via: 'exact' };
  } catch { return null; }
}

// Step 2: search API fallback
async function trySearch(name) {
  const encoded = encodeURIComponent(name.trim());
  try {
    const res = await fetch(
      `https://en.wikipedia.org/w/api.php?action=query&list=search&srsearch=${encoded}&srlimit=3&format=json&origin=*`
    );
    if (!res.ok) return null;
    const data = await res.json();
    const hits = data?.query?.search;
    if (!hits || hits.length === 0) return null;

    // Try each hit until we find one with an image
    for (const hit of hits) {
      const title = encodeURIComponent(hit.title.replace(/ /g, '_'));
      try {
        const res2 = await fetch(`https://en.wikipedia.org/api/rest_v1/page/summary/${title}`);
        if (!res2.ok) continue;
        const summary = await res2.json();
        if (!summary.thumbnail) continue;
        return { data: summary, via: `search → "${hit.title}"` };
      } catch { continue; }
    }
    return null;
  } catch { return null; }
}

async function fetchOne(name) {
  // Try exact first
  let result = await tryExact(name);

  // Fall back to search
  if (!result) {
    result = await trySearch(name);
  }

  if (!result) {
    return { name, error: 'No image found' };
  }

  const { data, via } = result;
  return {
    name,
    filename: slug(name) + '.jpg',
    thumbUrl: data.thumbnail.source,
    fullUrl: data.originalimage ? data.originalimage.source : data.thumbnail.source,
    attribution: data.description || '',
    wikiUrl: data.content_urls?.desktop?.page || '',
    via
  };
}

function renderCard(r) {
  const grid = document.getElementById('grid');
  const card = document.createElement('div');
  card.className = 'card';
  if (r.error) {
    card.innerHTML = `
      <div class="card-error">${r.error}</div>
      <div class="card-body">
        <div class="card-name">${r.name}</div>
      </div>`;
  } else {
    card.innerHTML = `
      <img src="${r.thumbUrl}" alt="${r.name}" crossorigin="anonymous" />
      <div class="card-body">
        <div class="card-name">${r.name}</div>
        <div class="card-file">${r.filename}</div>
        ${r.attribution ? `<div class="card-attr">${r.attribution}</div>` : ''}
        ${r.via !== 'exact' ? `<div class="card-via">via ${r.via}</div>` : ''}
      </div>`;
  }
  grid.appendChild(card);
}

async function fetchAll() {
  const raw = document.getElementById('nameInput').value.trim();
  if (!raw) return;
  const names = raw.split('\n').map(n => n.trim()).filter(Boolean);

  results.length = 0;
  document.getElementById('grid').innerHTML = '';
  document.getElementById('zipBtn').style.display = 'none';
  setStatus(`Fetching 0 / ${names.length}…`);

  for (let i = 0; i < names.length; i++) {
    setStatus(`Fetching ${i + 1} / ${names.length}: ${names[i]}`);
    const r = await fetchOne(names[i]);
    results.push(r);
    renderCard(r);
  }

  const ok = results.filter(r => !r.error).length;
  const fail = results.length - ok;
  const viaSearch = results.filter(r => r.via && r.via !== 'exact').length;
  setStatus(`${ok} found (${viaSearch} via search fallback)${fail ? `, ${fail} not found` : ''}`);
  if (ok > 0) document.getElementById('zipBtn').style.display = '';
}

async function downloadZip() {
  const btn = document.getElementById('zipBtn');
  btn.disabled = true;
  const zip = new JSZip();
  const good = results.filter(r => !r.error);

  for (const r of good) {
    try {
      setStatus(`Adding ${r.filename}…`);
      const res = await fetch(r.fullUrl);
      const blob = await res.blob();
      const ext = r.fullUrl.split('.').pop().split('?')[0].toLowerCase();
      const fname = slug(r.name) + '.' + (ext.match(/^(jpg|jpeg|png|gif|webp|svg)$/) ? ext : 'jpg');
      zip.file(fname, blob);
    } catch(e) {
      console.warn('Could not fetch', r.name);
    }
  }

  const content = await zip.generateAsync({ type: 'blob' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(content);
  a.download = 'wikipedia-images.zip';
  a.click();

  setStatus('ZIP downloaded.');
  btn.disabled = false;
}
</script>
</body>
</html>
