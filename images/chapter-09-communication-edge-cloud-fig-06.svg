<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 460" role="img" aria-labelledby="t06 d06">
  <title id="t06">Three predictive-maintenance strategies compared on four axes</title>
  <desc id="d06">Four small bar panels — latency in milliseconds, monthly data in megabytes, monthly cost in dollars, and accuracy percent — comparing Strategy 1 on-device, Strategy 2 full cloud, and Strategy 3 split inference. Strategy 2 is marked over budget; Strategy 3 is marked the winner.</desc>
  <defs>
    <style>
      .ti { font-family: 'EB Garamond', Georgia, 'Times New Roman', serif; font-size: 15px; font-weight: bold; fill: #2a1a0e; }
      .h2 { font-family: 'EB Garamond', Georgia, 'Times New Roman', serif; font-size: 12px; font-weight: bold; fill: #2a1a0e; }
      .lb { font-family: 'EB Garamond', Georgia, 'Times New Roman', serif; font-size: 11px; fill: #2a1a0e; }
      .ax { font-family: 'EB Garamond', Georgia, 'Times New Roman', serif; font-size: 9px; fill: #4a4540; }
      .sm { font-family: 'EB Garamond', Georgia, 'Times New Roman', serif; font-size: 10px; fill: #4a4540; }
      .nm { font-family: 'EB Garamond', Georgia, 'Times New Roman', serif; font-size: 10px; font-style: italic; fill: #6a6560; }
      .val { font-family: 'EB Garamond', Georgia, 'Times New Roman', serif; font-size: 10px; font-weight: bold; fill: #2a1a0e; }
      .cap { font-family: 'EB Garamond', Georgia, 'Times New Roman', serif; font-size: 11px; font-style: italic; fill: #4a4540; }
      .badge { font-family: 'EB Garamond', Georgia, 'Times New Roman', serif; font-size: 9px; font-weight: bold; fill: #fdfcfb; }
      .verdict { font-family: 'EB Garamond', Georgia, 'Times New Roman', serif; font-size: 10px; font-weight: bold; fill: #8a1f1f; }
      .win { font-family: 'EB Garamond', Georgia, 'Times New Roman', serif; font-size: 10px; font-weight: bold; fill: #2a1a0e; }
    </style>
  </defs>
  <rect width="760" height="460" fill="#fdfcfb"/>

  <text x="32" y="32" class="ti">Same problem, three architectures — each panel a different axis</text>
  <text x="32" y="50" class="nm">predictive maintenance, motor vibration · target ≥90% accuracy · ≤1 s latency · ≤$10/device/mo · NB-IoT</text>

  <!-- Legend at top -->
  <rect x="32"  y="68" width="12" height="12" fill="#8a8480"/>
  <text x="50"  y="78" class="lb">Strategy 1 — full on-device · Model B (200 K params)</text>
  <rect x="290" y="68" width="12" height="12" fill="#c8c4c0"/>
  <text x="308" y="78" class="lb">Strategy 2 — full cloud · Model C (1 M params)</text>
  <rect x="540" y="68" width="12" height="12" fill="#2a1a0e"/>
  <text x="558" y="78" class="lb">Strategy 3 — split · Model C</text>

  <!-- Panel layout: four panels, 2 across × 2 down.
       Panel widths 320, heights 150. Margins. Origins:
       TL: 32, 110    TR: 400, 110    BL: 32, 290    BR: 400, 290
  -->

  <!-- ====== PANEL 1: LATENCY (ms), max ~1000 ======= -->
  <text x="48" y="124" class="h2">Latency (ms) · budget 1 000 ms</text>
  <!-- plot area: x in [48, 360], y in [136, 248] -->
  <line x1="48" y1="248" x2="360" y2="248" stroke="#4a4540" stroke-width="1"/>
  <line x1="48" y1="136" x2="48"  y2="248" stroke="#4a4540" stroke-width="1"/>
  <!-- y ticks: 0, 500, 1000 over 112 px -->
  <text x="42" y="251" text-anchor="end" class="ax">0</text>
  <line x1="46" y1="248" x2="48" y2="248" stroke="#4a4540"/>
  <text x="42" y="195" text-anchor="end" class="ax">500</text>
  <line x1="46" y1="192" x2="48" y2="192" stroke="#4a4540"/>
  <text x="42" y="139" text-anchor="end" class="ax">1 000</text>
  <line x1="46" y1="136" x2="48" y2="136" stroke="#4a4540"/>
  <!-- budget line at 1000 -->
  <line x1="48" y1="136" x2="360" y2="136" stroke="#8a1f1f" stroke-width="0.8" stroke-dasharray="3 3"/>
  <text x="356" y="132" text-anchor="end" class="sm" fill="#8a1f1f">budget · 1 000 ms</text>
  <!-- Bars: S1=220 ms, S2=250 ms, S3=350 ms; bar width 56, x positions 82, 175, 268 -->
  <!-- y(v) = 248 - v*112/1000 -->
  <rect x="82"  y="223.36" width="56" height="24.64" fill="#8a8480"/>
  <text x="110" y="219" text-anchor="middle" class="val">220</text>
  <rect x="175" y="220" width="56" height="28" fill="#c8c4c0"/>
  <text x="203" y="216" text-anchor="middle" class="val">250</text>
  <rect x="268" y="208800" width="0" height="0"/>
  <rect x="268" y="208.8" width="56" height="39.2" fill="#2a1a0e"/>
  <text x="296" y="204" text-anchor="middle" class="val">350</text>
  <!-- x labels -->
  <text x="110" y="262" text-anchor="middle" class="sm">S1</text>
  <text x="203" y="262" text-anchor="middle" class="sm">S2</text>
  <text x="296" y="262" text-anchor="middle" class="sm">S3</text>

  <!-- ====== PANEL 2: MONTHLY DATA (MB), max ~140 ======= -->
  <text x="416" y="124" class="h2">Monthly data (MB) · NB-IoT plan</text>
  <line x1="416" y1="248" x2="728" y2="248" stroke="#4a4540" stroke-width="1"/>
  <line x1="416" y1="136" x2="416" y2="248" stroke="#4a4540" stroke-width="1"/>
  <text x="410" y="251" text-anchor="end" class="ax">0</text>
  <line x1="414" y1="248" x2="416" y2="248" stroke="#4a4540"/>
  <text x="410" y="195" text-anchor="end" class="ax">75 MB</text>
  <line x1="414" y1="192" x2="416" y2="192" stroke="#4a4540"/>
  <text x="410" y="139" text-anchor="end" class="ax">150 MB</text>
  <line x1="414" y1="136" x2="416" y2="136" stroke="#4a4540"/>
  <!-- 10 MB plan line at 10 MB = 7.47 px -->
  <line x1="416" y1="240.53" x2="728" y2="240.53" stroke="#8a1f1f" stroke-width="0.8" stroke-dasharray="3 3"/>
  <text x="724" y="237" text-anchor="end" class="sm" fill="#8a1f1f">10 MB plan ceiling</text>
  <!-- Bars: S1=0.00003 MB ≈ 0, S2=129.6 MB, S3=2.88 MB
       y(v) = 248 - v*112/150 -->
  <rect x="450" y="247.978" width="56" height="0.022" fill="#8a8480"/>
  <text x="478" y="245" text-anchor="middle" class="val">0.03 KB</text>
  <rect x="543" y="151.2" width="56" height="96.8" fill="#c8c4c0"/>
  <text x="571" y="147" text-anchor="middle" class="val">129.6</text>
  <rect x="636" y="245.85" width="56" height="2.15" fill="#2a1a0e"/>
  <text x="664" y="242" text-anchor="middle" class="val">2.88</text>
  <text x="478" y="262" text-anchor="middle" class="sm">S1</text>
  <text x="571" y="262" text-anchor="middle" class="sm">S2</text>
  <text x="664" y="262" text-anchor="middle" class="sm">S3</text>

  <!-- ====== PANEL 3: MONTHLY COST ($), max ~30 ======= -->
  <text x="48" y="304" class="h2">Monthly cost ($) · budget ≤ $10</text>
  <line x1="48" y1="428" x2="360" y2="428" stroke="#4a4540" stroke-width="1"/>
  <line x1="48" y1="316" x2="48"  y2="428" stroke="#4a4540" stroke-width="1"/>
  <text x="42" y="431" text-anchor="end" class="ax">$0</text>
  <line x1="46" y1="428" x2="48" y2="428" stroke="#4a4540"/>
  <text x="42" y="375" text-anchor="end" class="ax">$15</text>
  <line x1="46" y1="372" x2="48" y2="372" stroke="#4a4540"/>
  <text x="42" y="319" text-anchor="end" class="ax">$30</text>
  <line x1="46" y1="316" x2="48" y2="316" stroke="#4a4540"/>
  <!-- budget line at $10 = 36.8 px from top? y(10) = 428 - 10*112/30 = 428 - 37.33 = 390.67 -->
  <line x1="48" y1="390.67" x2="360" y2="390.67" stroke="#8a1f1f" stroke-width="0.8" stroke-dasharray="3 3"/>
  <text x="356" y="387" text-anchor="end" class="sm" fill="#8a1f1f">budget · $10/mo</text>
  <!-- S1=$2, S2=$25.72, S3=$5.72 -->
  <!-- y(v) = 428 - v*112/30 -->
  <rect x="82"  y="420.53" width="56" height="7.47" fill="#8a8480"/>
  <text x="110" y="416" text-anchor="middle" class="val">$2.00</text>
  <rect x="175" y="332.02" width="56" height="95.98" fill="#c8c4c0"/>
  <text x="203" y="328" text-anchor="middle" class="val">$25.72</text>
  <rect x="268" y="406.65" width="56" height="21.35" fill="#2a1a0e"/>
  <text x="296" y="402" text-anchor="middle" class="val">$5.72</text>
  <text x="110" y="442" text-anchor="middle" class="sm">S1</text>
  <text x="203" y="442" text-anchor="middle" class="sm">S2</text>
  <text x="296" y="442" text-anchor="middle" class="sm">S3</text>
  <!-- over-budget callout on S2 -->
  <text x="203" y="312" text-anchor="middle" class="verdict">over budget</text>

  <!-- ====== PANEL 4: ACCURACY (%) ======= -->
  <text x="416" y="304" class="h2">Accuracy (%) · floor 90 %</text>
  <line x1="416" y1="428" x2="728" y2="428" stroke="#4a4540" stroke-width="1"/>
  <line x1="416" y1="316" x2="416" y2="428" stroke="#4a4540" stroke-width="1"/>
  <text x="410" y="431" text-anchor="end" class="ax">0%</text>
  <line x1="414" y1="428" x2="416" y2="428" stroke="#4a4540"/>
  <text x="410" y="375" text-anchor="end" class="ax">50%</text>
  <line x1="414" y1="372" x2="416" y2="372" stroke="#4a4540"/>
  <text x="410" y="319" text-anchor="end" class="ax">100%</text>
  <line x1="414" y1="316" x2="416" y2="316" stroke="#4a4540"/>
  <!-- floor line at 90% = y = 428 - 90*112/100 = 327.2 -->
  <line x1="416" y1="327.2" x2="728" y2="327.2" stroke="#8a1f1f" stroke-width="0.8" stroke-dasharray="3 3"/>
  <text x="724" y="324" text-anchor="end" class="sm" fill="#8a1f1f">floor · 90 %</text>
  <!-- S1=91%, S2=96%, S3=96% -->
  <!-- y(v) = 428 - v*112/100 -->
  <rect x="450" y="326.08" width="56" height="101.92" fill="#8a8480"/>
  <text x="478" y="322" text-anchor="middle" class="val">91 %</text>
  <rect x="543" y="320.48" width="56" height="107.52" fill="#c8c4c0"/>
  <text x="571" y="316" text-anchor="middle" class="val">96 %</text>
  <rect x="636" y="320.48" width="56" height="107.52" fill="#2a1a0e"/>
  <text x="664" y="316" text-anchor="middle" class="val">96 %</text>
  <text x="478" y="442" text-anchor="middle" class="sm">S1</text>
  <text x="571" y="442" text-anchor="middle" class="sm">S2</text>
  <text x="664" y="442" text-anchor="middle" class="sm">S3</text>

  <!-- winner badge -->
  <rect x="630" y="304" width="68" height="14" fill="#2a1a0e"/>
  <text x="664" y="314" text-anchor="middle" class="badge">S3 WINS</text>
</svg>
