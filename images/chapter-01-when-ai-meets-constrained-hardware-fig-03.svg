<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 410" role="img" aria-labelledby="t03 d03">
  <title id="t03">Where Does Inference Run?</title>
  <desc id="d03">Three inference placement options left to right: on-device edge, fog/gateway, cloud datacenter.</desc>
  <defs>
    <style>
      .ti  { font-family: Lato, 'Helvetica Neue', Arial, sans-serif; font-size: 13px; font-weight: bold; fill: #000000; }
      .sub { font-family: Lato, 'Helvetica Neue', Arial, sans-serif; font-size: 10px; fill: #555555; }
      .nm  { font-family: Lato, 'Helvetica Neue', Arial, sans-serif; font-size: 11px; font-weight: bold; fill: #000000; }
      .sm  { font-family: Lato, 'Helvetica Neue', Arial, sans-serif; font-size: 10px; fill: #444444; }
      .wh  { font-family: Lato, 'Helvetica Neue', Arial, sans-serif; font-size: 10px; fill: #FFFFFF; }
      .cap { font-family: Lato, 'Helvetica Neue', Arial, sans-serif; font-size: 10px; font-style: italic; fill: #555555; }
    </style>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#444444"/>
    </marker>
  </defs>

  <rect width="760" height="410" fill="#FFFFFF"/>

  <!-- Title -->
  <text x="380" y="26" text-anchor="middle" class="ti">Where Does Inference Run?</text>
  <text x="380" y="42" text-anchor="middle" class="sub">Three placement options — each trades latency, privacy, connectivity, and compute differently.</text>

  <!--
    Layout: 3 equal columns, card width=210, gap=25, margin=20
    Col1 center=125  card x=20
    Col2 center=380  card x=275
    Col3 center=635  card x=530
    Nodes centered at col centers
  -->

  <!-- ══ NODES (y=68–130) ══ -->

  <!-- SENSOR (center x=125) -->
  <rect x="95" y="68" width="60" height="60" rx="4" fill="#111111"/>
  <circle cx="125" cy="98" r="10" fill="#FFFFFF"/>
  <circle cx="125" cy="98" r="4"  fill="#111111"/>
  <text x="125" y="144" text-anchor="middle" class="nm">Sensor</text>
  <text x="125" y="157" text-anchor="middle" class="sm">camera · mic · ECG</text>

  <!-- Arrow sensor → gateway, label above midpoint -->
  <line x1="157" y1="98" x2="340" y2="98" stroke="#444444" stroke-width="1.2" marker-end="url(#arr)"/>
  <text x="248" y="91" text-anchor="middle" class="sm">features / raw</text>

  <!-- GATEWAY (center x=380) -->
  <rect x="352" y="72" width="56" height="52" rx="4" fill="#555555"/>
  <rect x="360" y="80" width="40" height="6" rx="1" fill="#AAAAAA"/>
  <rect x="360" y="90" width="40" height="6" rx="1" fill="#AAAAAA"/>
  <rect x="360" y="100" width="40" height="6" rx="1" fill="#AAAAAA"/>
  <text x="380" y="140" text-anchor="middle" class="nm">Gateway</text>
  <text x="380" y="153" text-anchor="middle" class="sm">router · hub · Pi</text>

  <!-- Arrow gateway → cloud, dashed -->
  <line x1="410" y1="98" x2="596" y2="98" stroke="#444444" stroke-width="1.2" stroke-dasharray="5 3" marker-end="url(#arr)"/>
  <text x="503" y="91" text-anchor="middle" class="sm">raw sensor data</text>

  <!-- CLOUD (center x=635) -->
  <ellipse cx="635" cy="84"  rx="36" ry="16" fill="#333333"/>
  <ellipse cx="613" cy="91"  rx="20" ry="13" fill="#333333"/>
  <ellipse cx="657" cy="90"  rx="20" ry="13" fill="#333333"/>
  <rect    x="594" y="89"  width="82" height="20" fill="#333333"/>
  <rect    x="608" y="103" width="54" height="16" rx="2" fill="#666666"/>
  <line x1="613" y1="108" x2="658" y2="108" stroke="#BBBBBB" stroke-width="0.8"/>
  <line x1="613" y1="114" x2="658" y2="114" stroke="#BBBBBB" stroke-width="0.8"/>
  <text x="635" y="136" text-anchor="middle" class="nm">Cloud</text>
  <text x="635" y="149" text-anchor="middle" class="sm">datacenter · unbounded</text>

  <!-- ══ LATENCY BAND (y=170–188) ══ -->
  <text x="20" y="185" class="sm" font-weight="bold">Latency:</text>
  <!-- Edge band under col1 -->
  <rect x="20"  y="170" width="210" height="18" rx="2" fill="#111111"/>
  <text x="125" y="182" text-anchor="middle" class="wh">&lt; 10 ms · no network</text>
  <!-- Fog band under col2 -->
  <rect x="275" y="170" width="210" height="18" rx="2" fill="#666666"/>
  <text x="380" y="182" text-anchor="middle" class="wh">10 – 50 ms · LAN</text>
  <!-- Cloud band under col3 -->
  <rect x="530" y="170" width="210" height="18" rx="2" fill="#AAAAAA"/>
  <text x="635" y="182" text-anchor="middle" class="sm" fill="#111111">50 – 500+ ms · WAN</text>

  <!-- Connector lines: node → band → card -->
  <line x1="125" y1="160" x2="125" y2="200" stroke="#CCCCCC" stroke-width="0.75" stroke-dasharray="3 2"/>
  <line x1="380" y1="156" x2="380" y2="200" stroke="#CCCCCC" stroke-width="0.75" stroke-dasharray="3 2"/>
  <line x1="635" y1="152" x2="635" y2="200" stroke="#CCCCCC" stroke-width="0.75" stroke-dasharray="3 2"/>

  <!-- ══ CARDS (y=200–358) card width=210 ══ -->

  <!-- EDGE CARD (x=20, center=125) -->
  <rect x="20"  y="200" width="210" height="158" rx="3" fill="#FFFFFF" stroke="#BBBBBB" stroke-width="0.75"/>
  <rect x="20"  y="200" width="210" height="26"  rx="3" fill="#111111"/>
  <rect x="20"  y="214" width="210" height="12"  fill="#111111"/>
  <text x="125" y="217" text-anchor="middle" class="wh" font-weight="bold">On-Device Edge</text>
  <text x="36"  y="242" class="nm">Where:</text>
  <text x="36"  y="256" class="sm">runs on the sensor itself</text>
  <text x="36"  y="274" class="nm">Data sent:</text>
  <text x="36"  y="288" class="sm">result only (no raw data)</text>
  <text x="36"  y="306" class="nm">✓ Satisfies:</text>
  <text x="36"  y="320" class="sm">latency · privacy · connectivity</text>
  <text x="36"  y="334" class="nm">✗ Challenged by:</text>
  <text x="36"  y="348" class="sm">compute · memory limits</text>

  <!-- FOG CARD (x=275, center=380) -->
  <rect x="275" y="200" width="210" height="158" rx="3" fill="#FFFFFF" stroke="#BBBBBB" stroke-width="0.75"/>
  <rect x="275" y="200" width="210" height="26"  rx="3" fill="#555555"/>
  <rect x="275" y="214" width="210" height="12"  fill="#555555"/>
  <text x="380" y="217" text-anchor="middle" class="wh" font-weight="bold">Fog / Gateway</text>
  <text x="291" y="242" class="nm">Where:</text>
  <text x="291" y="256" class="sm">LAN router or hub</text>
  <text x="291" y="274" class="nm">Data sent:</text>
  <text x="291" y="288" class="sm">features or raw</text>
  <text x="291" y="306" class="nm">✓ Satisfies:</text>
  <text x="291" y="320" class="sm">latency (mostly) · partial privacy</text>
  <text x="291" y="334" class="nm">✗ Challenged by:</text>
  <text x="291" y="348" class="sm">connectivity if LAN drops</text>

  <!-- CLOUD CARD (x=530, center=635) -->
  <rect x="530" y="200" width="210" height="158" rx="3" fill="#FFFFFF" stroke="#BBBBBB" stroke-width="0.75"/>
  <rect x="530" y="200" width="210" height="26"  rx="3" fill="#888888"/>
  <rect x="530" y="214" width="210" height="12"  fill="#888888"/>
  <text x="635" y="217" text-anchor="middle" class="wh" font-weight="bold">Cloud Datacenter</text>
  <text x="546" y="242" class="nm">Where:</text>
  <text x="546" y="256" class="sm">remote datacenter</text>
  <text x="546" y="274" class="nm">Data sent:</text>
  <text x="546" y="288" class="sm">raw sensor data</text>
  <text x="546" y="306" class="nm">✓ Satisfies:</text>
  <text x="546" y="320" class="sm">compute · memory · retraining</text>
  <text x="546" y="334" class="nm">✗ Challenged by:</text>
  <text x="546" y="348" class="sm">latency · privacy · cost</text>

  <!-- Caption -->
  <text x="380" y="392" text-anchor="middle" class="cap">Placement is not preference — for some applications, latency floor or privacy law makes the choice for you.</text>
</svg>
