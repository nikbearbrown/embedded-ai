<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 420" role="img" aria-labelledby="t01 d01">
  <title id="t01">Same average power, two current profiles</title>
  <desc id="d01">Two current-vs-time traces. Left: a steady 10 mW draw flatline. Right: tall narrow 200 mW spikes at 5% duty over a 0.5 mW sleep floor. Both have the same average power of 10 mW.</desc>
  <defs>
    <style>
      .ti { font-family: 'Real Head Pro', 'FF Real', Lato, sans-serif; font-size: 13px; font-weight: bold; fill: #000000; }
      .lb { font-family: 'Real Head Pro', 'FF Real', Lato, sans-serif; font-size: 11px; fill: #000000; }
      .sm { font-family: 'Real Head Pro', 'FF Real', Lato, sans-serif; font-size: 10px; fill: #555555; }
      .cap { font-family: 'Real Head Pro', 'FF Real', Lato, sans-serif; font-size: 10px; font-style: italic; fill: #555555; }
    </style>
    <marker id="ar" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#000000"/>
    </marker>
  </defs>
  <rect width="700" height="420" fill="#FFFFFF"/>

  <!-- LEFT PANEL — STEADY 10 mW -->
  <text x="32" y="32" class="ti">Steady draw — 10 mW continuous</text>
  <text x="32" y="48" class="sm">average power = 10 mW</text>
  <!-- axes -->
  <line x1="62" y1="60" x2="62" y2="340" stroke="#787878"/>
  <line x1="62" y1="340" x2="330" y2="340" stroke="#787878"/>
  <!-- y-tick labels: log scale 0.1, 1, 10, 100 mA -->
  <text x="58" y="343" text-anchor="end" class="sm">0.1</text>
  <line x1="60" y1="340" x2="62" y2="340" stroke="#555555"/>
  <text x="58" y="270" text-anchor="end" class="sm">1</text>
  <line x1="60" y1="267" x2="62" y2="267" stroke="#555555"/>
  <text x="58" y="197" text-anchor="end" class="sm">10</text>
  <line x1="60" y1="194" x2="62" y2="194" stroke="#555555"/>
  <text x="58" y="124" text-anchor="end" class="sm">100</text>
  <line x1="60" y1="121" x2="62" y2="121" stroke="#555555"/>
  <!-- y-axis title -->
  <text x="20" y="200" class="sm" transform="rotate(-90 20 200)">current (mA, log)</text>
  <!-- shaded area under steady line — 10 mA at y=194 -->
  <rect x="62" y="194" width="268" height="146" fill="#ADADAD" fill-opacity="0.45"/>
  <line x1="62" y1="194" x2="330" y2="194" stroke="#000000" stroke-width="2"/>
  <!-- annotation -->
  <text x="196" y="186" text-anchor="middle" class="lb">≈ 3 mA at 3.3 V → 10 mW</text>
  <text x="196" y="232" text-anchor="middle" class="cap">shaded area = energy</text>
  <!-- x ticks -->
  <text x="62"  y="356" text-anchor="middle" class="sm">0</text>
  <text x="196" y="356" text-anchor="middle" class="sm">5</text>
  <text x="330" y="356" text-anchor="middle" class="sm">10 s</text>

  <!-- divider -->
  <line x1="350" y1="20" x2="350" y2="400" stroke="#ADADAD" stroke-width="0.75"/>

  <!-- RIGHT PANEL — DUTY-CYCLED 200 mW @ 5% -->
  <text x="370" y="32" class="ti">Duty-cycled — 200 mW for 5%, sleep otherwise</text>
  <text x="370" y="48" class="sm">average power = 10.5 mW</text>
  <line x1="400" y1="60" x2="400" y2="340" stroke="#787878"/>
  <line x1="400" y1="340" x2="670" y2="340" stroke="#787878"/>
  <text x="396" y="343" text-anchor="end" class="sm">0.1</text>
  <line x1="398" y1="340" x2="400" y2="340" stroke="#555555"/>
  <text x="396" y="270" text-anchor="end" class="sm">1</text>
  <line x1="398" y1="267" x2="400" y2="267" stroke="#555555"/>
  <text x="396" y="197" text-anchor="end" class="sm">10</text>
  <line x1="398" y1="194" x2="400" y2="194" stroke="#555555"/>
  <text x="396" y="124" text-anchor="end" class="sm">100</text>
  <line x1="398" y1="121" x2="400" y2="121" stroke="#555555"/>
  <!-- sleep floor 0.15 mA-ish, near bottom -->
  <line x1="400" y1="328" x2="670" y2="328" stroke="#555555" stroke-width="1"/>
  <text x="535" y="324" text-anchor="middle" class="sm">sleep floor ≈ 0.5 mW</text>
  <!-- shaded sleep area -->
  <rect x="400" y="328" width="270" height="12" fill="#ADADAD" fill-opacity="0.45"/>
  <!-- spikes: 5% duty over 10 s = 0.5 s total → split into 3 burst windows -->
  <!-- bursts at x=440 width=18, x=520 width=18, x=600 width=18, top y=85 (≈60 mA → 200 mW) -->
  <rect x="440" y="85"  width="18" height="243" fill="#000000" fill-opacity="0.85"/>
  <rect x="520" y="85"  width="18" height="243" fill="#000000" fill-opacity="0.85"/>
  <rect x="600" y="85"  width="18" height="243" fill="#000000" fill-opacity="0.85"/>
  <!-- spike annotation -->
  <path d="M 458 90 L 510 60 L 580 60" fill="none" stroke="#000000" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#ar)"/>
  <text x="580" y="56" class="lb">200 mW burst</text>
  <!-- x ticks -->
  <text x="400" y="356" text-anchor="middle" class="sm">0</text>
  <text x="535" y="356" text-anchor="middle" class="sm">5</text>
  <text x="670" y="356" text-anchor="middle" class="sm">10 s</text>
  <!-- same total energy callout -->
  <text x="535" y="232" text-anchor="middle" class="cap">same total energy under the curve</text>

  <!-- caption -->
  <text x="350" y="395" text-anchor="middle" class="cap">Identical 10 mW average — and identical battery life — from very different current profiles. Duty cycling buys peak performance at low average cost.</text>
</svg>
