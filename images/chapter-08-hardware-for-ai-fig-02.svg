<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 440" role="img" aria-labelledby="t02 d02">
  <title id="t02">NPU block diagram — MAC array, scratchpad, DMA, sequencer</title>
  <desc id="d02">Block diagram of a microNPU. External memory on the left connects through a DMA engine to a local SRAM scratchpad. The scratchpad feeds a 16-by-16 grid of MAC processing elements. The MAC array writes back to an accumulator and then to the scratchpad. A thin sequencer block on the right issues control signals to all four blocks.</desc>
  <defs>
    <style>
      .ti  { font-family: Lato, 'Helvetica Neue', Arial, sans-serif; font-size: 13px; font-weight: bold; fill: #111111; }
      .lb  { font-family: Lato, 'Helvetica Neue', Arial, sans-serif; font-size: 11px; fill: #111111; }
      .sm  { font-family: Lato, 'Helvetica Neue', Arial, sans-serif; font-size: 10px; fill: #555555; }
      .cap { font-family: Lato, 'Helvetica Neue', Arial, sans-serif; font-size: 10px; font-style: italic; fill: #555555; }
      .blk     { fill: #F5F5F5; stroke: #333333; stroke-width: 1.25; }
      .blk-em  { fill: #DDDDDD; stroke: #111111; stroke-width: 2; }
      .pe      { fill: #888888; stroke: #444444; stroke-width: 0.5; }
      .seq     { fill: #F5F5F5; stroke: #555555; stroke-width: 1.25; }
    </style>
    <marker id="ar" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto">
      <polygon points="0 0, 9 3.5, 0 7" fill="#111111"/>
    </marker>
    <marker id="ar-ctrl" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto">
      <polygon points="0 0, 9 3.5, 0 7" fill="#888888"/>
    </marker>
  </defs>
  <rect width="700" height="440" fill="#FFFFFF"/>

  <text x="32" y="32" class="ti">microNPU dataflow — weights and activations to MACs, back to memory</text>
  <text x="32" y="48" class="sm">representative 16×16 MAC array with on-chip scratchpad and DMA</text>

  <!-- External memory (off-chip) -->
  <rect x="28" y="155" width="100" height="110" class="blk"/>
  <text x="78" y="196" text-anchor="middle" class="lb">External</text>
  <text x="78" y="212" text-anchor="middle" class="lb">memory</text>
  <text x="78" y="230" text-anchor="middle" class="sm">flash / DRAM</text>
  <text x="78" y="246" text-anchor="middle" class="sm">weights, model</text>

  <!-- DMA engine -->
  <rect x="158" y="180" width="90" height="60" class="blk"/>
  <text x="203" y="206" text-anchor="middle" class="lb">DMA</text>
  <text x="203" y="222" text-anchor="middle" class="sm">block xfer</text>

  <!-- SRAM scratchpad -->
  <rect x="278" y="120" width="105" height="180" class="blk-em"/>
  <text x="330" y="146" text-anchor="middle" class="lb">Scratchpad</text>
  <text x="330" y="162" text-anchor="middle" class="sm">SRAM · kB–MB</text>
  <text x="330" y="188" text-anchor="middle" class="sm">weights</text>
  <text x="330" y="210" text-anchor="middle" class="sm">activations</text>
  <text x="330" y="232" text-anchor="middle" class="sm">results</text>
  <text x="330" y="268" text-anchor="middle" class="sm">no cache</text>
  <text x="330" y="284" text-anchor="middle" class="sm">no arb. access</text>

  <!-- MAC array 16x16 grid -->
  <rect x="410" y="120" width="178" height="180" class="blk-em"/>
  <text x="499" y="142" text-anchor="middle" class="lb">MAC array (16×16)</text>
  <!-- 8x8 sample grid of PEs -->
  <g transform="translate(424,154)">
    <rect x="0"   y="0"   width="14" height="14" class="pe"/>
    <rect x="18"  y="0"   width="14" height="14" class="pe"/>
    <rect x="36"  y="0"   width="14" height="14" class="pe"/>
    <rect x="54"  y="0"   width="14" height="14" class="pe"/>
    <rect x="72"  y="0"   width="14" height="14" class="pe"/>
    <rect x="90"  y="0"   width="14" height="14" class="pe"/>
    <rect x="108" y="0"   width="14" height="14" class="pe"/>
    <rect x="126" y="0"   width="14" height="14" class="pe"/>
    <rect x="0"   y="18"  width="14" height="14" class="pe"/>
    <rect x="18"  y="18"  width="14" height="14" class="pe"/>
    <rect x="36"  y="18"  width="14" height="14" class="pe"/>
    <rect x="54"  y="18"  width="14" height="14" class="pe"/>
    <rect x="72"  y="18"  width="14" height="14" class="pe"/>
    <rect x="90"  y="18"  width="14" height="14" class="pe"/>
    <rect x="108" y="18"  width="14" height="14" class="pe"/>
    <rect x="126" y="18"  width="14" height="14" class="pe"/>
    <rect x="0"   y="36"  width="14" height="14" class="pe"/>
    <rect x="18"  y="36"  width="14" height="14" class="pe"/>
    <rect x="36"  y="36"  width="14" height="14" class="pe"/>
    <rect x="54"  y="36"  width="14" height="14" class="pe"/>
    <rect x="72"  y="36"  width="14" height="14" class="pe"/>
    <rect x="90"  y="36"  width="14" height="14" class="pe"/>
    <rect x="108" y="36"  width="14" height="14" class="pe"/>
    <rect x="126" y="36"  width="14" height="14" class="pe"/>
    <rect x="0"   y="54"  width="14" height="14" class="pe"/>
    <rect x="18"  y="54"  width="14" height="14" class="pe"/>
    <rect x="36"  y="54"  width="14" height="14" class="pe"/>
    <rect x="54"  y="54"  width="14" height="14" class="pe"/>
    <rect x="72"  y="54"  width="14" height="14" class="pe"/>
    <rect x="90"  y="54"  width="14" height="14" class="pe"/>
    <rect x="108" y="54"  width="14" height="14" class="pe"/>
    <rect x="126" y="54"  width="14" height="14" class="pe"/>
    <rect x="0"   y="72"  width="14" height="14" class="pe"/>
    <rect x="18"  y="72"  width="14" height="14" class="pe"/>
    <rect x="36"  y="72"  width="14" height="14" class="pe"/>
    <rect x="54"  y="72"  width="14" height="14" class="pe"/>
    <rect x="72"  y="72"  width="14" height="14" class="pe"/>
    <rect x="90"  y="72"  width="14" height="14" class="pe"/>
    <rect x="108" y="72"  width="14" height="14" class="pe"/>
    <rect x="126" y="72"  width="14" height="14" class="pe"/>
    <rect x="0"   y="90"  width="14" height="14" class="pe"/>
    <rect x="18"  y="90"  width="14" height="14" class="pe"/>
    <rect x="36"  y="90"  width="14" height="14" class="pe"/>
    <rect x="54"  y="90"  width="14" height="14" class="pe"/>
    <rect x="72"  y="90"  width="14" height="14" class="pe"/>
    <rect x="90"  y="90"  width="14" height="14" class="pe"/>
    <rect x="108" y="90"  width="14" height="14" class="pe"/>
    <rect x="126" y="90"  width="14" height="14" class="pe"/>
    <rect x="0"   y="108" width="14" height="14" class="pe"/>
    <rect x="18"  y="108" width="14" height="14" class="pe"/>
    <rect x="36"  y="108" width="14" height="14" class="pe"/>
    <rect x="54"  y="108" width="14" height="14" class="pe"/>
    <rect x="72"  y="108" width="14" height="14" class="pe"/>
    <rect x="90"  y="108" width="14" height="14" class="pe"/>
    <rect x="108" y="108" width="14" height="14" class="pe"/>
    <rect x="126" y="108" width="14" height="14" class="pe"/>
    <rect x="0"   y="126" width="14" height="14" class="pe"/>
    <rect x="18"  y="126" width="14" height="14" class="pe"/>
    <rect x="36"  y="126" width="14" height="14" class="pe"/>
    <rect x="54"  y="126" width="14" height="14" class="pe"/>
    <rect x="72"  y="126" width="14" height="14" class="pe"/>
    <rect x="90"  y="126" width="14" height="14" class="pe"/>
    <rect x="108" y="126" width="14" height="14" class="pe"/>
    <rect x="126" y="126" width="14" height="14" class="pe"/>
  </g>
  <text x="499" y="312" text-anchor="middle" class="sm">256 MACs/cycle · int8</text>

  <!-- Sequencer / controller -->
  <rect x="610" y="178" width="62" height="64" class="seq"/>
  <text x="641" y="204" text-anchor="middle" class="lb">Seq.</text>
  <text x="641" y="220" text-anchor="middle" class="sm">controller</text>
  <text x="641" y="235" text-anchor="middle" class="sm">no fetch</text>

  <!-- Arrows: External -> DMA -> Scratchpad -> MAC -->
  <line x1="128" y1="210" x2="154" y2="210" stroke="#111111" stroke-width="1.5" marker-end="url(#ar)"/>
  <line x1="248" y1="210" x2="274" y2="210" stroke="#111111" stroke-width="1.5" marker-end="url(#ar)"/>
  <line x1="383" y1="210" x2="406" y2="210" stroke="#111111" stroke-width="1.5" marker-end="url(#ar)"/>

  <!-- Writeback arc from MAC array top back to scratchpad top -->
  <path d="M 499 116 C 499 88, 330 88, 330 116" fill="none" stroke="#333333" stroke-width="1.5" stroke-dasharray="5 3" marker-end="url(#ar)"/>
  <text x="414" y="82" text-anchor="middle" class="sm">accumulator writeback</text>

  <!-- Control lines from sequencer (gray dashed) -->
  <line x1="610" y1="194" x2="592" y2="194" stroke="#888888" stroke-width="0.75" stroke-dasharray="3 3" marker-end="url(#ar-ctrl)"/>
  <line x1="610" y1="210" x2="383" y2="210" stroke="#888888" stroke-width="0.75" stroke-dasharray="3 3" marker-end="url(#ar-ctrl)"/>
  <line x1="610" y1="226" x2="248" y2="220" stroke="#888888" stroke-width="0.75" stroke-dasharray="3 3" marker-end="url(#ar-ctrl)"/>
  <text x="641" y="258" text-anchor="middle" class="sm">control only</text>
  <text x="641" y="270" text-anchor="middle" class="sm">no per-cycle fetch</text>

  <!-- Caption -->
  <text x="350" y="418" text-anchor="middle" class="cap">Local scratchpad feeds a parallel MAC grid. A thin sequencer replaces the CPU's fetch/decode machine.</text>
</svg>
