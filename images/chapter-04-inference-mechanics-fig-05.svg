<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 460" role="img" aria-labelledby="t05 d05">
  <title id="t05">Latency waterfall — five steps from 367 ms prediction to 45 ms deployed</title>
  <desc id="d05">Horizontal bars showing 367 ms theoretical prediction, 1200 ms first deployment with reference kernels, 420 ms after CMSIS-NN, 140 ms after activations fit in on-chip SRAM, and 45 ms after int8 quantization, with the optimization applied at each step.</desc>
  <defs>
    <style>
      .ti  { font-family: Lato, 'Helvetica Neue', Arial, sans-serif; font-size: 14px; font-weight: bold; fill: #111111; }
      .lb  { font-family: Lato, 'Helvetica Neue', Arial, sans-serif; font-size: 12px; fill: #111111; }
      .sm  { font-family: Lato, 'Helvetica Neue', Arial, sans-serif; font-size: 10px; fill: #555555; }
      .nm  { font-family: Lato, 'Helvetica Neue', Arial, sans-serif; font-size: 10px; font-style: italic; fill: #555555; }
      .cap { font-family: Lato, 'Helvetica Neue', Arial, sans-serif; font-size: 11px; font-style: italic; fill: #555555; }
      .val { font-family: Lato, 'Helvetica Neue', Arial, sans-serif; font-size: 11px; font-weight: bold; fill: #111111; }
      .hd  { font-family: Lato, 'Helvetica Neue', Arial, sans-serif; font-size: 11px; font-weight: bold; fill: #111111; }
    </style>
    <marker id="ar5" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#333333"/>
    </marker>
  </defs>
  <rect width="760" height="460" fill="#FFFFFF"/>

  <text x="24" y="30" class="ti">Keyword-spotting deployment — latency at each optimization step</text>
  <text x="24" y="48" class="nm">Arduino Nano 33 BLE Sense · 64 MHz Cortex-M4 · TFLite Micro</text>

  <!-- scale: 0 ms = x 220, 1200 ms = x 720; 500 px / 1200 ms = 0.4167 px/ms -->
  <!-- 100 ms target = 220 + 41.67 = ~262 -->
  <!-- target line — dark dashed, no color -->
  <line x1="262" y1="82" x2="262" y2="378" stroke="#333333" stroke-width="1" stroke-dasharray="4 3"/>
  <text x="262" y="76" text-anchor="middle" class="sm">100 ms target</text>

  <!-- x axis -->
  <line x1="220" y1="378" x2="720" y2="378" stroke="#555555" stroke-width="0.7"/>
  <line x1="220" y1="376" x2="220" y2="382" stroke="#555555"/>
  <text x="220" y="394" class="sm" text-anchor="middle">0</text>
  <line x1="345" y1="376" x2="345" y2="382" stroke="#555555"/>
  <text x="345" y="394" class="sm" text-anchor="middle">300</text>
  <line x1="470" y1="376" x2="470" y2="382" stroke="#555555"/>
  <text x="470" y="394" class="sm" text-anchor="middle">600</text>
  <line x1="595" y1="376" x2="595" y2="382" stroke="#555555"/>
  <text x="595" y="394" class="sm" text-anchor="middle">900</text>
  <line x1="720" y1="376" x2="720" y2="382" stroke="#555555"/>
  <text x="720" y="394" class="sm" text-anchor="middle">1200</text>
  <text x="470" y="408" text-anchor="middle" class="sm">milliseconds per inference</text>

  <!-- Row 1: prediction 367 ms — lightest bar -->
  <text x="212" y="111" text-anchor="end" class="lb">1. theoretical prediction</text>
  <rect x="220" y="98" width="153" height="22" fill="#BBBBBB" stroke="#888888" stroke-width="0.5"/>
  <text x="381" y="113" class="val">367 ms</text>
  <text x="430" y="125" class="sm">22 M MAC / 60 MMAC/s — naive throughput math</text>

  <!-- Row 2: first deploy 1200 ms — darkest bar (worst result) -->
  <text x="212" y="151" text-anchor="end" class="lb">2. first deploy — reference kernels</text>
  <rect x="220" y="138" width="500" height="22" fill="#333333" stroke="#111111" stroke-width="0.5"/>
  <text x="724" y="153" class="val">1200 ms</text>
  <text x="430" y="170" class="sm">reference C kernels — no FPU, no SIMD — 3x slower than predicted</text>

  <!-- Row 3: CMSIS-NN 420 ms -->
  <text x="212" y="193" text-anchor="end" class="lb">3. swap to CMSIS-NN</text>
  <rect x="220" y="180" width="175" height="22" fill="#555555" stroke="#444444" stroke-width="0.5"/>
  <text x="403" y="195" class="val">420 ms</text>
  <text x="430" y="212" class="sm">DSP/SIMD path engaged; close to predicted, still over budget</text>

  <!-- Row 4: on-chip SRAM 140 ms -->
  <text x="212" y="235" text-anchor="end" class="lb">4. activations fit on chip</text>
  <rect x="220" y="222" width="58" height="22" fill="#777777" stroke="#555555" stroke-width="0.5"/>
  <text x="286" y="237" class="val">140 ms</text>
  <text x="430" y="254" class="sm">feature maps 32→16; activations drop to 28 KB; PSRAM spill ends</text>

  <!-- Row 5: int8 quant 45 ms — smallest bar -->
  <text x="212" y="277" text-anchor="end" class="lb">5. post-training int8 quantization</text>
  <rect x="220" y="264" width="19" height="22" fill="#111111" stroke="#111111" stroke-width="0.5"/>
  <text x="247" y="279" class="val">45 ms</text>
  <text x="430" y="296" class="sm">SIMD 4x throughput; accuracy 94.2→92.8% (within budget)</text>

  <!-- 26x annotation arrow -->
  <path d="M 718 98 Q 738 196 245 268" fill="none" stroke="#333333" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#ar5)"/>
  <text x="686" y="90" class="lb" text-anchor="end">26x faster — same model, same chip</text>

  <!-- summary box -->
  <rect x="20" y="316" width="720" height="52" fill="none" stroke="#AAAAAA" stroke-width="0.7"/>
  <text x="32" y="334" class="hd">prediction → reality → optimization</text>
  <text x="32" y="352" class="sm">the theoretical estimate was directionally correct and quantitatively wrong by 25x at first run. profiling closed the gap twice — kernels, then memory layout — and quantization closed the rest.</text>

  <text x="380" y="440" text-anchor="middle" class="cap">The 100 ms target was unreachable until the kernels, the memory hierarchy, and the numeric precision all agreed.</text>
</svg>
