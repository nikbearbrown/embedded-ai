<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 460" role="img" aria-labelledby="t02 d02">
  <title id="t02">TFLite Micro on-device memory layout</title>
  <desc id="d02">Flash region holds the model byte array, the TFLite Micro engine, and op kernels. SRAM holds the tensor arena with 16-byte alignment marker, the stack, and the heap. Four failure points are called out.</desc>
  <defs>
    <style>
      .ti { font-family: 'Real Head Pro', 'FF Real', Lato, sans-serif; font-size: 14px; font-weight: bold; fill: #000000; }
      .lb { font-family: 'Real Head Pro', 'FF Real', Lato, sans-serif; font-size: 11px; fill: #000000; }
      .sm { font-family: 'Real Head Pro', 'FF Real', Lato, sans-serif; font-size: 10px; fill: #555555; }
      .pin { font-family: 'Real Head Pro', 'FF Real', Lato, sans-serif; font-size: 10px; font-style: italic; fill: #C8102E; }
      .cap { font-family: 'Real Head Pro', 'FF Real', Lato, sans-serif; font-size: 10px; font-style: italic; fill: #555555; }
      .col { font-family: 'Real Head Pro', 'FF Real', Lato, sans-serif; font-size: 12px; font-weight: bold; fill: #000000; }
    </style>
    <marker id="ar2" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#C8102E"/>
    </marker>
  </defs>
  <rect width="700" height="460" fill="#FFFFFF"/>

  <text x="32" y="30" class="ti">TFLite Micro on-device memory layout</text>
  <text x="32" y="48" class="sm">flash holds code and weights; SRAM holds the live activation arena</text>

  <!-- FLASH REGION (left half) -->
  <text x="48" y="76" class="col">Flash (read-only)</text>
  <text x="48" y="90" class="sm">≈ 256 KB typical · MCU rom region</text>

  <g>
    <!-- Outer flash frame -->
    <rect x="48" y="100" width="280" height="280" fill="none" stroke="#555555" stroke-width="1.25"/>

    <!-- Model byte array (largest, top) -->
    <rect x="60" y="112" width="256" height="110" fill="#ADADAD" fill-opacity="0.55" stroke="#555555"/>
    <text x="68" y="130" class="lb">model byte array</text>
    <text x="68" y="146" class="sm">const unsigned char model_data[]</text>
    <text x="68" y="160" class="sm">generated by xxd -i model.tflite</text>
    <text x="68" y="178" class="sm">flatbuffer of layers, weights,</text>
    <text x="68" y="192" class="sm">quantization scales / zero points</text>
    <text x="306" y="216" text-anchor="end" class="sm">≈ 85 KB</text>

    <!-- TFLite Micro engine -->
    <rect x="60" y="232" width="256" height="58" fill="#787878" fill-opacity="0.45" stroke="#555555"/>
    <text x="68" y="250" class="lb">TFLite Micro engine</text>
    <text x="68" y="266" class="sm">interpreter, OpResolver, MemPlanner</text>
    <text x="306" y="284" text-anchor="end" class="sm">≈ 100 KB</text>

    <!-- Op kernels -->
    <rect x="60" y="300" width="256" height="68" fill="#000000" fill-opacity="0.25" stroke="#555555"/>
    <text x="68" y="318" class="lb">op kernels</text>
    <text x="68" y="334" class="sm">only those registered:</text>
    <text x="68" y="348" class="sm">Conv2D · FullyConnected · Softmax …</text>
    <text x="306" y="362" text-anchor="end" class="sm">few KB each</text>
  </g>

  <!-- Arrows from flash to SRAM -->
  <text x="186" y="395" text-anchor="middle" class="cap">linked into firmware ELF</text>

  <!-- SRAM REGION (right half) -->
  <text x="372" y="76" class="col">SRAM (read-write)</text>
  <text x="372" y="90" class="sm">≈ 256 KB on Cortex-M4 · live activations</text>

  <g>
    <!-- Outer SRAM frame -->
    <rect x="372" y="100" width="280" height="280" fill="none" stroke="#555555" stroke-width="1.25"/>

    <!-- Tensor arena -->
    <rect x="384" y="112" width="256" height="160" fill="#ADADAD" fill-opacity="0.65" stroke="#555555"/>
    <text x="392" y="130" class="lb">tensor arena</text>
    <text x="392" y="146" class="sm">alignas(16) uint8_t arena[N]</text>
    <text x="392" y="162" class="sm">all intermediate activations,</text>
    <text x="392" y="176" class="sm">re-used across layers</text>
    <text x="630" y="194" text-anchor="end" class="sm">≈ 80 KB</text>

    <!-- 16-byte alignment marker -->
    <line x1="384" y1="112" x2="384" y2="272" stroke="#C8102E" stroke-width="2"/>
    <text x="378" y="118" text-anchor="end" class="pin">16</text>
    <text x="378" y="130" text-anchor="end" class="pin">byte</text>
    <text x="378" y="142" text-anchor="end" class="pin">align</text>

    <!-- Stack -->
    <rect x="384" y="282" width="256" height="46" fill="#787878" fill-opacity="0.45" stroke="#555555"/>
    <text x="392" y="300" class="lb">stack</text>
    <text x="392" y="316" class="sm">grows down · main loop + ISR frames</text>
    <text x="630" y="316" text-anchor="end" class="sm">≈ 20 KB</text>

    <!-- Heap -->
    <rect x="384" y="338" width="256" height="32" fill="#000000" fill-opacity="0.18" stroke="#555555"/>
    <text x="392" y="357" class="lb">heap (often unused)</text>
    <text x="630" y="357" text-anchor="end" class="sm">avoid</text>
  </g>

  <!-- Four failure callouts (overlaid pins) -->
  <g>
    <!-- 1: arena too small -->
    <circle cx="404" cy="124" r="9" fill="#C8102E"/>
    <text x="404" y="128" text-anchor="middle" class="lb" fill="#FFFFFF">1</text>
    <line x1="414" y1="124" x2="468" y2="412" stroke="#C8102E" stroke-width="0.75" stroke-dasharray="3 2"/>

    <!-- 2: missing op -->
    <circle cx="80" cy="320" r="9" fill="#C8102E"/>
    <text x="80" y="324" text-anchor="middle" class="lb" fill="#FFFFFF">2</text>
    <line x1="80" y1="329" x2="180" y2="412" stroke="#C8102E" stroke-width="0.75" stroke-dasharray="3 2"/>

    <!-- 3: calibration mismatch (on model array) -->
    <circle cx="80" cy="148" r="9" fill="#C8102E"/>
    <text x="80" y="152" text-anchor="middle" class="lb" fill="#FFFFFF">3</text>
    <line x1="80" y1="157" x2="304" y2="412" stroke="#C8102E" stroke-width="0.75" stroke-dasharray="3 2"/>

    <!-- 4: alignment fault -->
    <circle cx="384" cy="112" r="9" fill="#C8102E"/>
    <text x="384" y="116" text-anchor="middle" class="lb" fill="#FFFFFF">4</text>
    <line x1="384" y1="121" x2="592" y2="412" stroke="#C8102E" stroke-width="0.75" stroke-dasharray="3 2"/>
  </g>

  <!-- Failure legend -->
  <g class="pin">
    <text x="468" y="425" text-anchor="middle">1 arena too small</text>
    <text x="180" y="425" text-anchor="middle">2 missing op</text>
    <text x="304" y="425" text-anchor="middle">3 calibration mismatch</text>
    <text x="592" y="425" text-anchor="middle">4 alignment fault</text>
  </g>

  <text x="350" y="450" text-anchor="middle" class="cap">Model → GetModel() → OpResolver → MicroInterpreter → Invoke(). Four failure points; each has a specific error path.</text>
</svg>
