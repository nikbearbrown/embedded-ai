<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 440" role="img" aria-labelledby="t02 d02">
  <title id="t02">Power composition shifts with duty cycle</title>
  <desc id="d02">Two stacked bars showing average power composition. Left bar: 80% active duty cycle — dynamic power dominates, leakage is a sliver. Right bar: 1% active duty cycle — sleep leakage dominates, dynamic is a thin slice.</desc>
  <defs>
    <style>
      .ti  { font-family: Lato, 'Helvetica Neue', Arial, sans-serif; font-size: 13px; font-weight: bold; fill: #111111; }
      .lb  { font-family: Lato, 'Helvetica Neue', Arial, sans-serif; font-size: 11px; fill: #333333; }
      .sm  { font-family: Lato, 'Helvetica Neue', Arial, sans-serif; font-size: 10px; fill: #555555; }
      .cap { font-family: Lato, 'Helvetica Neue', Arial, sans-serif; font-size: 10px; font-style: italic; fill: #555555; }
      .seg { font-family: Lato, 'Helvetica Neue', Arial, sans-serif; font-size: 10px; fill: #FFFFFF; }
    </style>
    <marker id="ar2" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#333333"/>
    </marker>
  </defs>
  <rect width="700" height="440" fill="#FFFFFF"/>

  <text x="350" y="28" text-anchor="middle" class="ti">Average power composition by duty cycle</text>

  <!-- LEFT BAR — high duty cycle (80% active) -->
  <text x="175" y="60" text-anchor="middle" class="lb">High duty cycle (80% active)</text>
  <text x="175" y="76" text-anchor="middle" class="sm">average power ≈ 12 mW</text>
  <!-- dynamic = 96% of bar height 250 → 240px; leakage = 4% → 10px -->
  <rect x="135" y="90"  width="80" height="240" fill="#333333"/>
  <rect x="135" y="330" width="80" height="10"  fill="#AAAAAA"/>
  <text x="175" y="215" text-anchor="middle" class="seg">dynamic power</text>
  <text x="175" y="229" text-anchor="middle" class="seg">≈ 11.5 mW</text>
  <text x="220" y="338" class="sm">leakage ≈ 0.5 mW</text>
  <!-- axis bracket -->
  <line x1="125" y1="90"  x2="130" y2="90"  stroke="#888888"/>
  <line x1="125" y1="340" x2="130" y2="340" stroke="#888888"/>
  <line x1="127" y1="90"  x2="127" y2="340" stroke="#AAAAAA"/>
  <text x="121" y="94"  text-anchor="end" class="sm">12 mW</text>
  <text x="121" y="343" text-anchor="end" class="sm">0</text>

  <!-- arrow pointing right toward reduce V/f strategy -->
  <path d="M 215 210 L 260 210" fill="none" stroke="#333333" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#ar2)"/>
  <text x="265" y="200" class="sm">reduce V and f</text>
  <text x="265" y="214" class="sm">DVFS · accelerator offload</text>

  <!-- divider -->
  <line x1="350" y1="50" x2="350" y2="410" stroke="#DDDDDD" stroke-width="1"/>

  <!-- RIGHT BAR — low duty cycle (1% active) -->
  <text x="525" y="60" text-anchor="middle" class="lb">Low duty cycle (1% active)</text>
  <text x="525" y="76" text-anchor="middle" class="sm">average power ≈ 0.6 mW</text>
  <!-- composition at same bar length: dynamic = 17% → 43px; sleep leakage = 83% → 207px -->
  <rect x="485" y="90"  width="80" height="43"  fill="#333333"/>
  <rect x="485" y="133" width="80" height="207" fill="#888888"/>
  <text x="525" y="116" text-anchor="middle" class="seg">dynamic</text>
  <text x="525" y="128" text-anchor="middle" class="seg">≈ 0.1 mW</text>
  <text x="525" y="228" text-anchor="middle" class="seg">sleep leakage</text>
  <text x="525" y="242" text-anchor="middle" class="seg">≈ 0.5 mW</text>
  <text x="525" y="360" text-anchor="middle" class="sm">bar shows composition share</text>
  <text x="525" y="373" text-anchor="middle" class="sm">(absolute height ≈ 12 mW × 0.05)</text>

  <!-- arrow pointing left toward deepen sleep strategy -->
  <path d="M 485 230 L 440 230" fill="none" stroke="#333333" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#ar2)"/>
  <text x="435" y="220" text-anchor="end" class="sm">deepen sleep</text>
  <text x="435" y="234" text-anchor="end" class="sm">gate peripherals</text>

  <!-- crossover note -->
  <text x="350" y="398" text-anchor="middle" class="cap">Crossover near 5–10% active duty. Above it, attack dynamic power. Below it, attack sleep — active power barely matters.</text>
  <text x="350" y="413" text-anchor="middle" class="cap">Knowing which side you are on determines your optimisation strategy.</text>
</svg>
