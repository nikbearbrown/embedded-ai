<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 460" role="img" aria-labelledby="t04 d04">
  <title id="t04">Tensor arena memory layout — buffer reuse vs. no reuse</title>
  <desc id="d04">A single contiguous SRAM block divided into weights, scratch buffers, I/O tensors, and time-sliced activation buffers showing that Layer 1 and Layer 3 outputs share the same bytes at different times. Contrast with a no-reuse stacked diagram where peak memory equals the sum of all activations.</desc>
  <defs>
    <style>
      .ti    { font-family: Lato, 'Helvetica Neue', Arial, sans-serif; font-size: 14px; font-weight: bold; fill: #111111; }
      .hd    { font-family: Lato, 'Helvetica Neue', Arial, sans-serif; font-size: 11px; font-weight: bold; fill: #111111; }
      .lb    { font-family: Lato, 'Helvetica Neue', Arial, sans-serif; font-size: 11px; fill: #111111; }
      .sm    { font-family: Lato, 'Helvetica Neue', Arial, sans-serif; font-size: 10px; fill: #555555; }
      .nm    { font-family: Lato, 'Helvetica Neue', Arial, sans-serif; font-size: 10px; font-style: italic; fill: #555555; }
      .cap   { font-family: Lato, 'Helvetica Neue', Arial, sans-serif; font-size: 11px; font-style: italic; fill: #555555; }
      .badge { font-family: Lato, 'Helvetica Neue', Arial, sans-serif; font-size: 10px; font-weight: bold; fill: #FFFFFF; }
    </style>
    <marker id="ar4" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#333333"/>
    </marker>
  </defs>
  <rect width="720" height="460" fill="#FFFFFF"/>

  <text x="24" y="30" class="ti">Tensor arena — static, contiguous, reused</text>
  <text x="24" y="48" class="nm">one block allocated at init; the engine slices time, not memory</text>

  <!-- LEFT PANEL: reuse arena -->
  <text x="24" y="74" class="lb">With buffer reuse — single arena, time-sliced</text>

  <!-- arena outline -->
  <rect x="24" y="84" width="320" height="240" fill="#FFFFFF" stroke="#333333" stroke-width="1.3"/>

  <!-- weights region (persistent, lightest) -->
  <rect x="24" y="84" width="320" height="48" fill="#F5F5F5" stroke="#333333" stroke-width="0.6"/>
  <text x="184" y="113" text-anchor="middle" class="lb">model weights — persistent</text>

  <!-- scratch im2col -->
  <rect x="24" y="132" width="320" height="22" fill="#BBBBBB" stroke="#555555" stroke-width="0.4"/>
  <text x="184" y="147" text-anchor="middle" class="sm">scratch — im2col / SIMD packing</text>

  <!-- activation slice t=1 -->
  <text x="24" y="170" class="sm">t = 1   Layer 1 output occupies bytes 156-230</text>
  <rect x="24" y="174" width="200" height="22" fill="#444444"/>
  <text x="124" y="189" text-anchor="middle" class="badge">activation slice A (Layer 1)</text>
  <rect x="224" y="174" width="120" height="22" fill="none" stroke="#AAAAAA" stroke-width="0.5" stroke-dasharray="3 2"/>

  <!-- activation slice t=3, same bytes — distinct shade -->
  <text x="24" y="216" class="sm">t = 3   Layer 3 output reuses bytes 156-230</text>
  <rect x="24" y="220" width="200" height="22" fill="#888888"/>
  <text x="124" y="235" text-anchor="middle" class="badge">activation slice A (Layer 3)</text>
  <rect x="224" y="220" width="120" height="22" fill="none" stroke="#AAAAAA" stroke-width="0.5" stroke-dasharray="3 2"/>

  <!-- I/O tensors -->
  <rect x="24"  y="260" width="158" height="22" fill="#666666"/>
  <text x="103" y="275" text-anchor="middle" class="badge">input tensor</text>
  <rect x="184" y="260" width="160" height="22" fill="#999999"/>
  <text x="264" y="275" text-anchor="middle" class="badge">output tensor</text>

  <text x="24" y="303" class="sm">peak arena = weights + scratch + max(layer outputs)</text>
  <text x="24" y="318" class="lb">~28 KB activation peak</text>

  <!-- divider -->
  <line x1="370" y1="74" x2="370" y2="400" stroke="#BBBBBB" stroke-width="0.75"/>

  <!-- RIGHT PANEL: no reuse -->
  <text x="386" y="74" class="lb">Without reuse — each layer's output kept</text>

  <rect x="386" y="84"  width="310" height="22" fill="#F5F5F5" stroke="#555555" stroke-width="0.4"/>
  <text x="541" y="99"  text-anchor="middle" class="sm">model weights</text>

  <rect x="386" y="110" width="310" height="18" fill="#222222"/>
  <text x="541" y="123" text-anchor="middle" class="badge">Layer 1 output (kept)</text>

  <rect x="386" y="132" width="310" height="20" fill="#333333"/>
  <text x="541" y="146" text-anchor="middle" class="badge">Layer 2 output (kept)</text>

  <rect x="386" y="156" width="310" height="24" fill="#444444"/>
  <text x="541" y="172" text-anchor="middle" class="badge">Layer 3 output (kept)</text>

  <rect x="386" y="184" width="310" height="22" fill="#555555"/>
  <text x="541" y="199" text-anchor="middle" class="badge">Layer 4 output (kept)</text>

  <rect x="386" y="210" width="310" height="20" fill="#666666"/>
  <text x="541" y="224" text-anchor="middle" class="badge">Layer 5 output (kept)</text>

  <rect x="386" y="234" width="310" height="22" fill="#777777"/>
  <text x="541" y="249" text-anchor="middle" class="badge">Layer 6 output (kept)</text>

  <rect x="386" y="260" width="310" height="22" fill="#999999"/>
  <text x="541" y="275" text-anchor="middle" class="badge">I/O tensors</text>

  <text x="386" y="303" class="sm">peak = weights + sum of all layer outputs</text>
  <text x="386" y="318" class="lb">~8-10x larger; usually does not fit</text>

  <!-- compare arrow -->
  <line x1="344" y1="218" x2="384" y2="178" stroke="#333333" stroke-width="1" stroke-dasharray="3 2" marker-end="url(#ar4)"/>

  <!-- bottom note boxes -->
  <rect x="24"  y="344" width="320" height="68" fill="none" stroke="#888888" stroke-width="0.7"/>
  <text x="36"  y="363" class="hd">static allocation = compile-time failure</text>
  <text x="36"  y="380" class="sm">build refuses if arena &gt; SRAM — you debug a number, not a crash.</text>
  <text x="36"  y="396" class="nm">malloc() inside inference is a misconfiguration, not a feature</text>

  <rect x="386" y="344" width="310" height="68" fill="none" stroke="#888888" stroke-width="0.7"/>
  <text x="398" y="363" class="hd">heap exhaustion is the runtime alternative</text>
  <text x="398" y="380" class="sm">fragmented free memory; failed allocation; null return; hardfault.</text>
  <text x="398" y="396" class="nm">no swap. no other process to kill. just a dead device.</text>

  <text x="360" y="442" text-anchor="middle" class="cap">Same network, same intermediate values — the arena layout decides whether it fits at all.</text>
</svg>
