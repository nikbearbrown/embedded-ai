<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 440" role="img" aria-labelledby="t04 d04">
  <title id="t04">Tensor arena memory layout — buffer reuse vs. no reuse</title>
  <desc id="d04">A single contiguous SRAM block divided into weights, scratch buffers, I/O tensors, and time-sliced activation buffers showing that Layer 1 and Layer 3 outputs share the same bytes at different times. Contrast with a no-reuse stacked diagram where peak memory equals the sum of all activations.</desc>
  <defs>
    <style>
      .ti { font-family: 'Real Head Pro', 'FF Real', Lato, sans-serif; font-size: 14px; font-weight: bold; fill: #000000; }
      .lb { font-family: 'Real Head Pro', 'FF Real', Lato, sans-serif; font-size: 11px; fill: #000000; }
      .sm { font-family: 'Real Head Pro', 'FF Real', Lato, sans-serif; font-size: 10px; fill: #555555; }
      .nm { font-family: 'Real Head Pro', 'FF Real', Lato, sans-serif; font-size: 10px; font-style: italic; fill: #555555; }
      .cap { font-family: 'Real Head Pro', 'FF Real', Lato, sans-serif; font-size: 11px; font-style: italic; fill: #555555; }
      .badge { font-family: 'Real Head Pro', 'FF Real', Lato, sans-serif; font-size: 10px; font-weight: bold; fill: #FFFFFF; }
    </style>
    <marker id="ar4" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#000000"/>
    </marker>
  </defs>
  <rect width="720" height="440" fill="#FFFFFF"/>

  <text x="24" y="30" class="ti">Tensor arena — static, contiguous, reused</text>
  <text x="24" y="48" class="nm">one block allocated at init; the engine slices time, not memory</text>

  <!-- LEFT PANEL: reuse arena -->
  <text x="24" y="76" class="lb">With buffer reuse — single arena, time-sliced</text>

  <!-- arena outline -->
  <rect x="24" y="86" width="320" height="240" fill="#FFFFFF" stroke="#000000" stroke-width="1.3"/>

  <!-- weights region (top, persistent) -->
  <rect x="24" y="86" width="320" height="48" fill="#F5F5F5" stroke="#000000" stroke-width="0.6"/>
  <text x="184" y="115" text-anchor="middle" class="lb">model weights — persistent</text>

  <!-- scratch im2col -->
  <rect x="24" y="134" width="320" height="22" fill="#ADADAD" stroke="#000000" stroke-width="0.4"/>
  <text x="184" y="149" text-anchor="middle" class="sm">scratch — im2col / SIMD packing</text>

  <!-- activation slice, time t1 -->
  <text x="24" y="172" class="sm">t = 1   Layer 1 output occupies bytes 156–230</text>
  <rect x="24" y="176" width="200" height="22" fill="#555555"/>
  <text x="124" y="191" text-anchor="middle" class="badge">activation slice A</text>
  <rect x="224" y="176" width="120" height="22" fill="none" stroke="#555555" stroke-width="0.4" stroke-dasharray="3 2"/>

  <!-- activation slice, time t3, same bytes -->
  <text x="24" y="218" class="sm">t = 3   Layer 3 output reuses bytes 156–230</text>
  <rect x="24" y="222" width="200" height="22" fill="#C8102E"/>
  <text x="124" y="237" text-anchor="middle" class="badge">activation slice A (Layer 3)</text>
  <rect x="224" y="222" width="120" height="22" fill="none" stroke="#555555" stroke-width="0.4" stroke-dasharray="3 2"/>

  <!-- I/O tensors -->
  <rect x="24" y="262" width="160" height="22" fill="#787878"/>
  <text x="104" y="277" text-anchor="middle" class="badge">input tensor</text>
  <rect x="184" y="262" width="160" height="22" fill="#787878" opacity="0.7"/>
  <text x="264" y="277" text-anchor="middle" class="badge">output tensor</text>

  <text x="24" y="305" class="sm">peak arena = weights + scratch + max(layer outputs)</text>
  <text x="24" y="320" class="lb">≈ 28 KB activation peak</text>

  <!-- divider -->
  <line x1="370" y1="76" x2="370" y2="400" stroke="#ADADAD" stroke-width="0.75"/>

  <!-- RIGHT PANEL: no reuse -->
  <text x="386" y="76" class="lb">Without reuse — each layer's output kept</text>

  <!-- stacked diagram -->
  <rect x="386" y="86" width="310" height="22" fill="#F5F5F5" stroke="#000000" stroke-width="0.4"/>
  <text x="541" y="101" text-anchor="middle" class="sm">model weights</text>

  <rect x="386" y="112" width="310" height="18" fill="#555555"/>
  <text x="541" y="125" text-anchor="middle" class="badge">Layer 1 output (kept)</text>

  <rect x="386" y="134" width="310" height="20" fill="#555555" opacity="0.85"/>
  <text x="541" y="148" text-anchor="middle" class="badge">Layer 2 output (kept)</text>

  <rect x="386" y="158" width="310" height="24" fill="#555555" opacity="0.75"/>
  <text x="541" y="173" text-anchor="middle" class="badge">Layer 3 output (kept)</text>

  <rect x="386" y="186" width="310" height="22" fill="#555555" opacity="0.65"/>
  <text x="541" y="201" text-anchor="middle" class="badge">Layer 4 output (kept)</text>

  <rect x="386" y="212" width="310" height="20" fill="#555555" opacity="0.55"/>
  <text x="541" y="226" text-anchor="middle" class="badge">Layer 5 output (kept)</text>

  <rect x="386" y="236" width="310" height="22" fill="#555555" opacity="0.45"/>
  <text x="541" y="251" text-anchor="middle" class="badge">Layer 6 output (kept)</text>

  <rect x="386" y="262" width="310" height="22" fill="#787878"/>
  <text x="541" y="277" text-anchor="middle" class="badge">I/O tensors</text>

  <text x="386" y="305" class="sm">peak = weights + Σ all layer outputs</text>
  <text x="386" y="320" class="lb" fill="#C8102E">≈ 8–10× larger; usually does not fit</text>

  <!-- arrows comparing -->
  <line x1="344" y1="220" x2="384" y2="180" stroke="#000000" stroke-width="1" stroke-dasharray="3 2" marker-end="url(#ar4)"/>

  <!-- bottom notes -->
  <rect x="24" y="346" width="320" height="60" fill="none" stroke="#555555" stroke-width="0.6"/>
  <text x="36" y="365" class="lb">static allocation = compile-time failure</text>
  <text x="36" y="383" class="sm">build refuses if arena &gt; SRAM. you debug a number, not a crash.</text>
  <text x="36" y="399" class="nm">malloc() inside inference is a misconfiguration, not a feature</text>

  <rect x="386" y="346" width="310" height="60" fill="none" stroke="#C8102E" stroke-width="0.7"/>
  <text x="398" y="365" class="lb" fill="#C8102E">heap exhaustion is the runtime alternative</text>
  <text x="398" y="383" class="sm">fragmented free memory; failed allocation; null return; hardfault.</text>
  <text x="398" y="399" class="nm">no swap. no other process to kill. just a dead device.</text>

  <text x="360" y="430" text-anchor="middle" class="cap">Same network, same intermediate values — the arena layout decides whether it fits at all.</text>
</svg>
