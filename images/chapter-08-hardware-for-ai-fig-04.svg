<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 460" role="img" aria-labelledby="t04 d04">
  <title id="t04">Cortex-M55 plus Ethos-U55 — supported ops accelerate, the rest fall back</title>
  <desc id="d04">Block diagram. A Cortex-M55 host CPU and an Ethos-U55 NPU share an SRAM pool over an AXI bus. An operation router splits incoming model ops into two streams: accelerated ops go to the NPU, unsupported ops fall back to the CPU.</desc>
  <defs>
    <style>
      .ti       { font-family: Lato, 'Helvetica Neue', Arial, sans-serif; font-size: 13px; font-weight: bold; fill: #111111; }
      .lb       { font-family: Lato, 'Helvetica Neue', Arial, sans-serif; font-size: 11px; fill: #111111; }
      .sm       { font-family: Lato, 'Helvetica Neue', Arial, sans-serif; font-size: 10px; fill: #555555; }
      .cap      { font-family: Lato, 'Helvetica Neue', Arial, sans-serif; font-size: 10px; font-style: italic; fill: #555555; }
      .blk      { fill: #F5F5F5; stroke: #444444; stroke-width: 1.25; }
      .blk-em   { fill: #DDDDDD; stroke: #111111; stroke-width: 2; }
      .blk-npu  { fill: #DDDDDD; stroke: #333333; stroke-width: 1.25; }
      .blk-cpu  { fill: #F5F5F5; stroke: #555555; stroke-width: 1.25; }
      .blk-mem  { fill: #BBBBBB; stroke: #333333; stroke-width: 1.25; }
    </style>
    <marker id="ar" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto">
      <polygon points="0 0, 9 3.5, 0 7" fill="#111111"/>
    </marker>
    <marker id="ar-fb" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto">
      <polygon points="0 0, 9 3.5, 0 7" fill="#777777"/>
    </marker>
  </defs>
  <rect width="700" height="460" fill="#FFFFFF"/>

  <text x="32" y="32" class="ti">Cortex-M55 + Ethos-U55 — the speedup is the routing</text>
  <text x="32" y="48" class="sm">supported ops accelerate; the rest fall back to the host CPU</text>

  <!-- Op router (top centre) -->
  <rect x="280" y="78" width="140" height="50" class="blk-em"/>
  <text x="350" y="100" text-anchor="middle" class="lb">Operation router</text>
  <text x="350" y="116" text-anchor="middle" class="sm">Vela compiler · TFLM delegate</text>

  <!-- Incoming model arrow -->
  <line x1="350" y1="50" x2="350" y2="74" stroke="#111111" stroke-width="1.5" marker-end="url(#ar)"/>
  <text x="350" y="44" text-anchor="middle" class="sm">model graph</text>

  <!-- NPU block (left lower) -->
  <rect x="55" y="192" width="225" height="118" class="blk-npu"/>
  <text x="167" y="216" text-anchor="middle" class="lb">Ethos-U55 microNPU</text>
  <text x="167" y="234" text-anchor="middle" class="sm">32 / 64 / 128 / 256 MACs</text>
  <text x="167" y="254" text-anchor="middle" class="sm">accelerated ops:</text>
  <text x="167" y="270" text-anchor="middle" class="sm">conv2d · depthwise · FC</text>
  <text x="167" y="286" text-anchor="middle" class="sm">pooling · element-wise</text>

  <!-- Host CPU block (right lower) -->
  <rect x="420" y="192" width="225" height="118" class="blk-cpu"/>
  <text x="532" y="216" text-anchor="middle" class="lb">Cortex-M55 host</text>
  <text x="532" y="234" text-anchor="middle" class="sm">scalar + Helium SIMD</text>
  <text x="532" y="254" text-anchor="middle" class="sm">fallback ops:</text>
  <text x="532" y="270" text-anchor="middle" class="sm">attention · custom activations</text>
  <text x="532" y="286" text-anchor="middle" class="sm">sparse · dynamic control flow</text>

  <!-- Router → NPU -->
  <path d="M 292 128 L 178 188" fill="none" stroke="#111111" stroke-width="1.5" marker-end="url(#ar)"/>
  <text x="200" y="164" text-anchor="middle" class="lb">accelerated</text>

  <!-- Router → CPU (dashed, lighter) -->
  <path d="M 408 128 L 522 188" fill="none" stroke="#777777" stroke-width="1.5" stroke-dasharray="5 3" marker-end="url(#ar-fb)"/>
  <text x="500" y="164" text-anchor="middle" class="lb">fallback</text>

  <!-- AXI bus -->
  <rect x="55" y="330" width="590" height="22" class="blk"/>
  <text x="350" y="345" text-anchor="middle" class="sm">AXI bus</text>

  <!-- Shared SRAM pool -->
  <rect x="240" y="366" width="220" height="44" class="blk-mem"/>
  <text x="350" y="386" text-anchor="middle" class="lb">Shared SRAM pool</text>
  <text x="350" y="400" text-anchor="middle" class="sm">128 KB – 2 MB · weights + activations</text>

  <!-- Connections to bus -->
  <line x1="167" y1="310" x2="167" y2="330" stroke="#333333" stroke-width="1"/>
  <line x1="532" y1="310" x2="532" y2="330" stroke="#555555" stroke-width="1"/>
  <line x1="350" y1="352" x2="350" y2="366" stroke="#333333" stroke-width="1"/>

  <!-- Speedup callout -->
  <text x="668" y="118" text-anchor="end" class="lb">80% accelerated → only 3–5×</text>
  <text x="668" y="132" text-anchor="end" class="sm">unaccelerated % sets the ceiling</text>

  <!-- Caption -->
  <text x="350" y="438" text-anchor="middle" class="cap">The mapping of model ops to accelerator decides realised speedup. Peak throughput is the ceiling, not the floor.</text>
</svg>
