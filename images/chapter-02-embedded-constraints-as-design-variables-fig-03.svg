<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" role="img" aria-labelledby="t03 d03" font-family="Lato, Arial, sans-serif">
  <title id="t03">Three duty-cycle current profiles for the nRF52840 wearable</title>
  <desc id="d03">Three side-by-side current-vs-time strips showing the active-current spike and idle baseline for an nRF52840 wearable. Case A: 80 ms every 5 s, 104 days. Case B: 160 ms every 5 s, 53 days. Case C: 160 ms every 1 s, 11 days. A two-week battery-life threshold is marked.</desc>

  <style>
    text { font-family: Lato, Arial, sans-serif; }
    .title  { font-size:15px; font-weight:700; fill:#111; }
    .sub    { font-size:11px; fill:#444; }
    .plabel { font-size:12px; font-weight:700; fill:#111; }
    .psub   { font-size:10px; fill:#444; }
    .pass   { font-size:11px; font-weight:400; fill:#111; }
    .fail   { font-size:11px; font-weight:700; fill:#333; }
    .ax     { font-size:9px;  fill:#555; }
    .ll     { font-size:10px; fill:#333; }
    .cap    { font-size:10px; fill:#666; font-style:italic; }
    .annot  { font-size:8px;  fill:#555; }
  </style>

  <!-- Title -->
  <text x="400" y="28" text-anchor="middle" class="title">Same hardware, same model — duty cycle decides battery life</text>
  <text x="400" y="46" text-anchor="middle" class="sub">nRF52840 · 5.3 mA active · 2.8 µA idle · 220 mAh coin cell</text>

  <!-- ===== PANEL A: x=20–260 center=140 ===== -->
  <rect x="20" y="68" width="240" height="200" rx="4" fill="#f7f7f7" stroke="#bbb" stroke-width="1"/>
  <text x="140" y="85"  text-anchor="middle" class="plabel">Case A</text>
  <text x="140" y="99"  text-anchor="middle" class="psub">80 ms / 5 s</text>
  <!-- axes -->
  <line x1="55" y1="108" x2="55"  y2="248" stroke="#999" stroke-width="1"/>
  <line x1="55" y1="248" x2="250" y2="248" stroke="#999" stroke-width="1"/>
  <!-- idle dashed -->
  <line x1="55" y1="238" x2="250" y2="238" stroke="#aaa" stroke-width="0.8" stroke-dasharray="3,3"/>
  <!-- active spike: 3.2px wide -->
  <rect x="65" y="118" width="3.2" height="120" fill="#111"/>
  <!-- annotation -->
  <text x="72" y="128" class="annot">3.2 px = 80 ms</text>
  <!-- current labels -->
  <text x="51" y="122" text-anchor="end" class="ax">5.3 mA</text>
  <text x="51" y="241" text-anchor="end" class="ax">≈0 mA</text>
  <!-- result -->
  <text x="140" y="268" text-anchor="middle" class="psub">I_avg ≈ 0.088 mA → ~104 days</text>
  <text x="140" y="282" text-anchor="middle" class="pass">✓ PASS</text>

  <!-- ===== PANEL B: x=280–520 center=400 ===== -->
  <rect x="280" y="68" width="240" height="200" rx="4" fill="#f7f7f7" stroke="#bbb" stroke-width="1"/>
  <text x="400" y="85"  text-anchor="middle" class="plabel">Case B</text>
  <text x="400" y="99"  text-anchor="middle" class="psub">160 ms / 5 s</text>
  <line x1="315" y1="108" x2="315" y2="248" stroke="#999" stroke-width="1"/>
  <line x1="315" y1="248" x2="510" y2="248" stroke="#999" stroke-width="1"/>
  <line x1="315" y1="238" x2="510" y2="238" stroke="#aaa" stroke-width="0.8" stroke-dasharray="3,3"/>
  <!-- active spike: ~6.4px wide (double A) -->
  <rect x="325" y="118" width="6.4" height="120" fill="#111"/>
  <text x="311" y="122" text-anchor="end" class="ax">5.3 mA</text>
  <text x="311" y="241" text-anchor="end" class="ax">≈0 mA</text>
  <text x="400" y="268" text-anchor="middle" class="psub">I_avg ≈ 0.172 mA → ~53 days</text>
  <text x="400" y="282" text-anchor="middle" class="pass">✓ PASS</text>

  <!-- ===== PANEL C: x=540–780 center=660 ===== -->
  <rect x="540" y="68" width="240" height="200" rx="4" fill="#888" fill-opacity="0.12" stroke="#888" stroke-width="1.5"/>
  <text x="660" y="85"  text-anchor="middle" class="plabel">Case C</text>
  <text x="660" y="99"  text-anchor="middle" class="psub">160 ms / 1 s</text>
  <line x1="575" y1="108" x2="575" y2="248" stroke="#999" stroke-width="1"/>
  <line x1="575" y1="248" x2="770" y2="248" stroke="#999" stroke-width="1"/>
  <line x1="575" y1="238" x2="770" y2="238" stroke="#aaa" stroke-width="0.8" stroke-dasharray="3,3"/>
  <!-- active spike: 32px wide, fill #888888 -->
  <rect x="585" y="118" width="32" height="120" fill="#888888"/>
  <text x="571" y="122" text-anchor="end" class="ax">5.3 mA</text>
  <text x="571" y="241" text-anchor="end" class="ax">≈0 mA</text>
  <text x="660" y="268" text-anchor="middle" class="psub">I_avg ≈ 0.85 mA → ~11 days</text>
  <text x="660" y="282" text-anchor="middle" class="fail">✗ FAIL</text>

  <!-- ===== LOG SCALE BAR ===== -->
  <text x="400" y="318" text-anchor="middle" font-size="11" font-weight="700" fill="#111">Battery Life Summary (log scale)</text>

  <!-- axis line -->
  <line x1="60" y1="380" x2="740" y2="380" stroke="#333" stroke-width="1.5"/>

  <!-- ticks: 1d x=60, 10d x=286.7, 100d x=513.3, 1000d x=740 -->
  <line x1="60"    y1="376" x2="60"    y2="384" stroke="#333" stroke-width="1.5"/>
  <text x="60"    y="396" text-anchor="middle" class="ll">1 d</text>

  <line x1="286.7" y1="376" x2="286.7" y2="384" stroke="#333" stroke-width="1.5"/>
  <text x="286.7" y="396" text-anchor="middle" class="ll">10 d</text>

  <line x1="513.3" y1="376" x2="513.3" y2="384" stroke="#333" stroke-width="1.5"/>
  <text x="513.3" y="396" text-anchor="middle" class="ll">100 d</text>

  <line x1="740"   y1="376" x2="740"   y2="384" stroke="#333" stroke-width="1.5"/>
  <text x="740"   y="396" text-anchor="middle" class="ll">1000 d</text>

  <!-- 2-week threshold: x=319.8, label above at y=355 -->
  <line x1="319.8" y1="340" x2="319.8" y2="392" stroke="#333" stroke-width="1.5" stroke-dasharray="5,4"/>
  <text x="319.8" y="335" text-anchor="middle" class="ll" font-weight="600">2-week threshold</text>

  <!-- Case C dot: x=296.1, #555555 (fail, left of threshold) -->
  <circle cx="296.1" cy="380" r="7" fill="#555555"/>
  <text x="296.1" y="413" text-anchor="middle" class="ll" fill="#555555" font-size="9">C · 11 d</text>

  <!-- Case B dot: x=450.8, #111111 -->
  <circle cx="450.8" cy="380" r="7" fill="#111111"/>
  <text x="450.8" y="413" text-anchor="middle" class="ll" fill="#111" font-size="9">B · 53 d</text>

  <!-- Case A dot: x=517.0, #111111 -->
  <circle cx="517.0" cy="380" r="7" fill="#111111"/>
  <text x="517.0" y="413" text-anchor="middle" class="ll" fill="#111" font-size="9">A · 104 d</text>

  <!-- Caption -->
  <text x="400" y="482" text-anchor="middle" class="cap">Figure 2-3. Same nRF52840, same model — changing duty cycle from 1.6 % (A) to 16 % (C) cuts battery life from 104 days to 11 days, crossing the 2-week threshold.</text>

</svg>
