<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 460" role="img" aria-labelledby="t03 d03">
  <title id="t03">Three duty-cycle current profiles for the nRF52840 wearable</title>
  <desc id="d03">Three side-by-side current-vs-time strips showing the active-current spike and idle baseline for an nRF52840 wearable. Case A: 80 ms every 5 s, 104 days. Case B: 160 ms every 5 s, 53 days. Case C: 160 ms every 1 s, 11 days. A two-week battery-life threshold is marked.</desc>
  <defs>
    <style>
      .ti { font-family: 'Real Head Pro', 'FF Real', Lato, sans-serif; font-size: 13px; font-weight: bold; fill: #000000; }
      .lb { font-family: 'Real Head Pro', 'FF Real', Lato, sans-serif; font-size: 11px; fill: #000000; }
      .sm { font-family: 'Real Head Pro', 'FF Real', Lato, sans-serif; font-size: 9.5px; fill: #555555; }
      .cap { font-family: 'Real Head Pro', 'FF Real', Lato, sans-serif; font-size: 10px; font-style: italic; fill: #555555; }
      .val { font-family: 'Real Head Pro', 'FF Real', Lato, sans-serif; font-size: 11px; font-weight: bold; fill: #000000; }
      .pass { fill: #000000; font-weight: bold; }
      .fail { fill: #C8102E; font-weight: bold; }
    </style>
    <marker id="ar3" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#000000"/>
    </marker>
  </defs>
  <rect width="700" height="460" fill="#FFFFFF"/>

  <text x="350" y="28" text-anchor="middle" class="ti">Same hardware, same model — duty cycle decides whether the device runs two weeks</text>
  <text x="350" y="44" text-anchor="middle" class="sm">nRF52840 · 5.3 mA active · 2.8 µA idle · 220 mAh coin cell</text>

  <!-- Panels: x ranges 30-230, 250-450, 470-670; baseline y = 220 -->
  <!-- Each panel shows one cycle. Active spike up to y=80 (5.3 mA top), idle bottom y=220 -->

  <!-- === PANEL A: 80 ms / 5 s — 104 days === -->
  <text x="130" y="76" text-anchor="middle" class="ti">Case A</text>
  <text x="130" y="92" text-anchor="middle" class="sm">80 ms inference every 5 s</text>

  <!-- axis -->
  <line x1="30" y1="220" x2="230" y2="220" stroke="#555555" stroke-width="1"/>
  <line x1="30" y1="100" x2="30" y2="220" stroke="#555555" stroke-width="1"/>
  <text x="26" y="106" text-anchor="end" class="sm">5.3 mA</text>
  <text x="26" y="223" text-anchor="end" class="sm">idle</text>
  <!-- active pulse: 80 ms out of 5 s = 1.6% of width 200 = 3.2 px starting at x=40 -->
  <rect x="40" y="100" width="3.2" height="120" fill="#000000"/>
  <!-- idle baseline rectangle (very thin) -->
  <line x1="43.2" y1="218" x2="230" y2="218" stroke="#787878" stroke-width="2"/>
  <text x="40" y="248" class="sm">active</text>
  <path d="M 50 252 L 90 252" stroke="#000000" stroke-width="1" marker-end="url(#ar3)"/>
  <text x="130" y="255" text-anchor="middle" class="sm">idle</text>
  <text x="130" y="280" text-anchor="middle" class="val">I_avg ≈ 0.088 mA</text>
  <text x="130" y="296" text-anchor="middle" class="lb pass">~104 days</text>
  <text x="130" y="312" text-anchor="middle" class="sm pass">passes 2-week target</text>

  <!-- === PANEL B: 160 ms / 5 s — 53 days === -->
  <text x="350" y="76" text-anchor="middle" class="ti">Case B</text>
  <text x="350" y="92" text-anchor="middle" class="sm">160 ms inference every 5 s</text>

  <line x1="250" y1="220" x2="450" y2="220" stroke="#555555" stroke-width="1"/>
  <line x1="250" y1="100" x2="250" y2="220" stroke="#555555" stroke-width="1"/>
  <text x="246" y="106" text-anchor="end" class="sm">5.3 mA</text>
  <text x="246" y="223" text-anchor="end" class="sm">idle</text>
  <!-- 160 ms out of 5 s = 3.2% of 200 = 6.4 px -->
  <rect x="260" y="100" width="6.4" height="120" fill="#000000"/>
  <line x1="266.4" y1="218" x2="450" y2="218" stroke="#787878" stroke-width="2"/>
  <text x="260" y="248" class="sm">active 2×</text>
  <path d="M 282 252 L 320 252" stroke="#000000" stroke-width="1" marker-end="url(#ar3)"/>
  <text x="350" y="255" text-anchor="middle" class="sm">idle</text>
  <text x="350" y="280" text-anchor="middle" class="val">I_avg ≈ 0.172 mA</text>
  <text x="350" y="296" text-anchor="middle" class="lb pass">~53 days</text>
  <text x="350" y="312" text-anchor="middle" class="sm pass">still passes</text>

  <!-- === PANEL C: 160 ms / 1 s — 11 days === -->
  <text x="570" y="76" text-anchor="middle" class="ti">Case C</text>
  <text x="570" y="92" text-anchor="middle" class="sm">160 ms inference every 1 s</text>

  <line x1="470" y1="220" x2="670" y2="220" stroke="#555555" stroke-width="1"/>
  <line x1="470" y1="100" x2="470" y2="220" stroke="#555555" stroke-width="1"/>
  <text x="466" y="106" text-anchor="end" class="sm">5.3 mA</text>
  <text x="466" y="223" text-anchor="end" class="sm">idle</text>
  <!-- 160 ms out of 1 s = 16% of 200 = 32 px -->
  <rect x="480" y="100" width="32" height="120" fill="#C8102E"/>
  <line x1="512" y1="218" x2="670" y2="218" stroke="#787878" stroke-width="2"/>
  <text x="480" y="248" class="sm">active 16% of time</text>
  <text x="570" y="280" text-anchor="middle" class="val">I_avg ≈ 0.85 mA</text>
  <text x="570" y="296" text-anchor="middle" class="lb fail">~11 days</text>
  <text x="570" y="312" text-anchor="middle" class="sm fail">misses 2-week threshold</text>

  <!-- threshold bar across the bottom showing all 3 outcomes -->
  <text x="350" y="350" text-anchor="middle" class="ti">battery life · log scale</text>
  <line x1="60" y1="380" x2="640" y2="380" stroke="#555555" stroke-width="1"/>
  <!-- log scale: 1 day -> x=60, 1000 days -> x=640; range 580 over 3 decades -->
  <!-- 14 days -> 60 + log10(14)*193.3 = 60 + 1.146*193.3 = 281.5 -->
  <line x1="281.5" y1="370" x2="281.5" y2="395" stroke="#C8102E" stroke-width="1.5" stroke-dasharray="4 2"/>
  <text x="281.5" y="406" text-anchor="middle" class="lb">2-week threshold</text>
  <g class="sm">
    <text x="60" y="395" text-anchor="middle">1 d</text>
    <text x="253.3" y="395" text-anchor="middle">10 d</text>
    <text x="446.6" y="395" text-anchor="middle">100 d</text>
    <text x="640" y="395" text-anchor="middle">1000 d</text>
  </g>
  <!-- markers for the three cases -->
  <!-- 11 days -> 60 + log10(11)*193.3 = 60 + 1.041*193.3 = 261.3 -->
  <!-- 53 days -> 60 + log10(53)*193.3 = 60 + 1.724*193.3 = 393.2 -->
  <!-- 104 days -> 60 + log10(104)*193.3 = 60 + 2.017*193.3 = 449.9 -->
  <circle cx="261.3" cy="380" r="5" fill="#C8102E"/>
  <text x="261.3" y="365" text-anchor="middle" class="lb fail">C · 11 d</text>
  <circle cx="393.2" cy="380" r="5" fill="#000000"/>
  <text x="393.2" y="365" text-anchor="middle" class="lb pass">B · 53 d</text>
  <circle cx="449.9" cy="380" r="5" fill="#000000"/>
  <text x="449.9" y="365" text-anchor="middle" class="lb pass">A · 104 d</text>

  <text x="350" y="438" text-anchor="middle" class="cap">Nothing about the model, hardware, or firmware changed. The duty cycle alone took the device out of spec.</text>
</svg>
