<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg" font-family="Lato, Arial, sans-serif">

  <!-- Background -->
  <rect width="800" height="500" fill="#FFFFFF"/>

  <!-- Title -->
  <text x="400" y="24" text-anchor="middle" font-size="15" font-weight="bold" fill="#111111">nRF52840 Memory Map</text>
  <text x="400" y="42" text-anchor="middle" font-size="11" fill="#555555">Flash 1024 KB · SRAM 256 KB — int8 model fits; float32 does not</text>

  <!-- ═══════════════════════════════════════════════════════ -->
  <!-- FLASH BAR (x=110, width=110, total height=300px)       -->
  <!-- ═══════════════════════════════════════════════════════ -->

  <!-- Flash bar header label -->
  <text x="165" y="72" text-anchor="middle" font-size="11" font-weight="bold" fill="#333333">Flash 1024 KB</text>

  <!-- firmware 250 KB → 73.2px, y=80 -->
  <rect x="110" y="80" width="110" height="73" fill="#333333"/>
  <text x="165" y="113" text-anchor="middle" font-size="10" fill="#FFFFFF">Firmware</text>
  <text x="165" y="126" text-anchor="middle" font-size="9" fill="#CCCCCC">250 KB</text>

  <!-- int8 weights 300 KB → 87.9px, y=153 -->
  <rect x="110" y="153" width="110" height="88" fill="#111111"/>
  <text x="165" y="191" text-anchor="middle" font-size="10" fill="#FFFFFF">int8 Weights</text>
  <text x="165" y="204" text-anchor="middle" font-size="9" fill="#AAAAAA">300 KB</text>

  <!-- free flash 474 KB → 138.9px, y=241 -->
  <rect x="110" y="241" width="110" height="139" fill="#BBBBBB"/>
  <text x="165" y="305" text-anchor="middle" font-size="10" fill="#444444">Free Flash</text>
  <text x="165" y="318" text-anchor="middle" font-size="9" fill="#444444">474 KB</text>

  <!-- Bar outline -->
  <rect x="110" y="80" width="110" height="300" fill="none" stroke="#333333" stroke-width="1.5"/>

  <!-- Flash label below -->
  <text x="165" y="398" text-anchor="middle" font-size="11" fill="#333333">Flash</text>

  <!-- ═══════════════════════════════════════════════════════ -->
  <!-- FLOAT32 GHOST BAR (x=240, width=50, height=352px)      -->
  <!-- ═══════════════════════════════════════════════════════ -->

  <!-- Ghost bar from y=80, height=300 (capped to match Flash bar visual) -->
  <rect x="240" y="80" width="50" height="300" fill="none" stroke="#555555" stroke-width="1.5" stroke-dasharray="6,4"/>

  <!-- Overflow indicator — jagged bottom -->
  <polyline points="240,380 248,390 256,375 264,390 272,375 280,385 290,380" fill="none" stroke="#555555" stroke-width="1.5" stroke-dasharray="6,4"/>

  <!-- "FAILS" label above ghost bar -->
  <text x="265" y="70" text-anchor="middle" font-size="10" font-weight="bold" fill="#333333">FAILS</text>
  <text x="265" y="57" text-anchor="middle" font-size="9" fill="#555555">float32 weights</text>
  <text x="265" y="46" text-anchor="middle" font-size="9" fill="#555555">1.2 MB &gt; 1 MB</text>

  <!-- Rotated label inside ghost bar -->
  <text transform="translate(265,240) rotate(-90)" text-anchor="middle" font-size="9" fill="#777777">1200 KB — over budget</text>

  <!-- ═══════════════════════════════════════════════════════ -->
  <!-- SRAM BAR (x=520, width=110, total height=270px used)   -->
  <!-- ═══════════════════════════════════════════════════════ -->

  <!-- SRAM bar header label -->
  <text x="575" y="72" text-anchor="middle" font-size="11" font-weight="bold" fill="#333333">SRAM 256 KB</text>

  <!-- BLE stack 30 KB → 31.6px, y=80 -->
  <rect x="520" y="80" width="110" height="32" fill="#555555"/>
  <text x="575" y="100" text-anchor="middle" font-size="10" fill="#FFFFFF">BLE Stack 30 KB</text>

  <!-- activations 180 KB → 189.9px, y=112 -->
  <rect x="520" y="112" width="110" height="190" fill="#111111"/>
  <text x="575" y="199" text-anchor="middle" font-size="10" fill="#FFFFFF">Activations</text>
  <text x="575" y="213" text-anchor="middle" font-size="9" fill="#AAAAAA">180 KB</text>

  <!-- remaining 46 KB → 48.5px, y=302 -->
  <rect x="520" y="302" width="110" height="48" fill="#AAAAAA"/>
  <text x="575" y="330" text-anchor="middle" font-size="10" fill="#444444">Remaining 46 KB</text>

  <!-- Bar outline -->
  <rect x="520" y="80" width="110" height="270" fill="none" stroke="#333333" stroke-width="1.5"/>

  <!-- SRAM label below -->
  <text x="575" y="398" text-anchor="middle" font-size="11" fill="#333333">SRAM</text>

  <!-- ═══════════════════════════════════════════════════════ -->
  <!-- DANGER BRACKET — right of SRAM, spanning activations   -->
  <!-- Activations: y=112 to y=302 (190px tall)               -->
  <!-- ═══════════════════════════════════════════════════════ -->

  <!-- Bracket lines -->
  <line x1="634" y1="112" x2="650" y2="112" stroke="#333333" stroke-width="1.5"/>
  <line x1="650" y1="112" x2="650" y2="302" stroke="#333333" stroke-width="1.5"/>
  <line x1="634" y1="302" x2="650" y2="302" stroke="#333333" stroke-width="1.5"/>

  <!-- Arrow pointing right at midpoint -->
  <line x1="650" y1="207" x2="668" y2="207" stroke="#333333" stroke-width="1.5"/>
  <polygon points="668,203 676,207 668,211" fill="#333333"/>

  <!-- Danger text -->
  <text x="679" y="200" font-size="10" font-weight="bold" fill="#333333">arena +20 KB</text>
  <text x="679" y="214" font-size="10" fill="#555555">→ fails</text>

  <!-- ═══════════════════════════════════════════════════════ -->
  <!-- CAPTION                                                 -->
  <!-- ═══════════════════════════════════════════════════════ -->

  <text x="400" y="460" text-anchor="middle" font-size="10" fill="#777777">Figure 2-1. nRF52840 memory layout with int8 model (fits) vs. float32 model (overflows Flash). SRAM arena cannot grow by 20 KB.</text>

</svg>
