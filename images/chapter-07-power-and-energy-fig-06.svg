<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 460" role="img" aria-labelledby="t06 d06">
  <title id="t06">Battery life vs inference period — the radio sets the ceiling</title>
  <desc id="d06">Battery-life curve for the agricultural sensor on two AA cells. X-axis: inference period from 1 second to 600 seconds, log scale. Y-axis: battery life in days, log scale. Four overlaid curves for LoRa transmission intervals: 1 per hour, 1 per 6 hours, 1 per day, no radio. A horizontal dashed line marks the 180-day target.</desc>
  <defs>
    <style>
      .ti { font-family: 'EB Garamond', Georgia, 'Times New Roman', serif; font-size: 13px; font-weight: bold; fill: #2a1a0e; }
      .lb { font-family: 'EB Garamond', Georgia, 'Times New Roman', serif; font-size: 11px; fill: #2a1a0e; }
      .sm { font-family: 'EB Garamond', Georgia, 'Times New Roman', serif; font-size: 10px; fill: #4a4540; }
      .cap { font-family: 'EB Garamond', Georgia, 'Times New Roman', serif; font-size: 10px; font-style: italic; fill: #4a4540; }
    </style>
    <marker id="ar6" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#2a1a0e"/>
    </marker>
  </defs>
  <rect width="700" height="460" fill="#fdfcfb"/>
  <text x="350" y="28" text-anchor="middle" class="ti">Battery life vs inference period — agricultural sensor on 2 × AA</text>
  <text x="350" y="44" text-anchor="middle" class="sm">8,550 mWh budget · STM32L4 + LoRa</text>

  <!-- chart area: x 90..660 (570 px), y 70..360 (290 px) -->
  <!-- x log scale: 1 s..600 s, log10 → 0..2.78. 570/2.78 = 205 px per decade -->
  <!-- 1→90, 10→295, 100→500, 600→90+log10(600)*205=90+2.778*205=659.5 -->
  <!-- y log scale: 1 day..10000 days, log10 → 0..4. 290/4 = 72.5 px per decade -->
  <!-- 1→360, 10→287.5, 100→215, 1000→142.5, 10000→70 -->
  <line x1="90" y1="70" x2="90" y2="360" stroke="#8a8480"/>
  <line x1="90" y1="360" x2="660" y2="360" stroke="#8a8480"/>

  <!-- gridlines (light) -->
  <line x1="90" y1="287.5" x2="660" y2="287.5" stroke="#d8d4d0" stroke-width="0.6"/>
  <line x1="90" y1="215"   x2="660" y2="215"   stroke="#d8d4d0" stroke-width="0.6"/>
  <line x1="90" y1="142.5" x2="660" y2="142.5" stroke="#d8d4d0" stroke-width="0.6"/>
  <line x1="295" y1="70" x2="295" y2="360" stroke="#d8d4d0" stroke-width="0.6"/>
  <line x1="500" y1="70" x2="500" y2="360" stroke="#d8d4d0" stroke-width="0.6"/>

  <!-- y tick labels -->
  <text x="84" y="363" text-anchor="end" class="sm">1 d</text>
  <text x="84" y="290" text-anchor="end" class="sm">10</text>
  <text x="84" y="218" text-anchor="end" class="sm">100</text>
  <text x="84" y="145" text-anchor="end" class="sm">1,000</text>
  <text x="84" y="73"  text-anchor="end" class="sm">10,000</text>
  <text x="38" y="215" class="sm" transform="rotate(-90 38 215)">battery life (days)</text>

  <!-- x tick labels -->
  <text x="90"  y="376" text-anchor="middle" class="sm">1 s</text>
  <text x="295" y="376" text-anchor="middle" class="sm">10 s</text>
  <text x="500" y="376" text-anchor="middle" class="sm">100 s</text>
  <text x="660" y="376" text-anchor="middle" class="sm">600 s</text>
  <text x="375" y="392" text-anchor="middle" class="sm">inference period (log)</text>

  <!-- 180-day dashed target -->
  <!-- y for 180 days: 215 - log10(180/100)*72.5 = 215 - 0.2553*72.5 = 196.5 -->
  <line x1="90" y1="196.5" x2="660" y2="196.5" stroke="#8a6a3e" stroke-width="1" stroke-dasharray="6 4"/>
  <text x="654" y="190" text-anchor="end" class="lb" fill="#8a6a3e">180-day target</text>

  <!-- Four curves. Compute approximate (period_s, days) anchors using sensor model. -->
  <!-- Helper: average power ≈ (inference 7.92 mJ + sensor 7.5 mJ + sleep small) / period + LoRa avg power -->
  <!-- LoRa per tx = 60 mJ; avg power = 60/T_lora -->
  <!-- battery = 30780 J / avg_power_W / 86400 -->

  <!-- Curve A: 1/hour (3600 s) → LoRa avg = 60mJ/3600s = 16.7 mW always -->
  <!-- For T=1: inf+sens avg = 15.4 mW; total ≈ 32 mW → days ≈ 30780/0.032/86400 ≈ 11 -->
  <!-- For T=10: 1.54 mW; total ≈ 18.3 mW → days ≈ 19.5 -->
  <!-- For T=60: 0.26 mW; total ≈ 17 mW → days ≈ 21 -->
  <!-- For T=600: 0.026 mW; total ≈ 16.7 mW → days ≈ 21.3 -->
  <!-- Convert to plot: log scale; x = 90 + log10(T)*205; y = 215 - log10(days/100)*72.5 -->
  <!-- Curve A: 1/hour — flat-ish around 11..21 days -->
  <path d="M 90 286 Q 200 251 295 234 Q 400 224 500 222 L 660 222" fill="none" stroke="#2a1a0e" stroke-width="1.8"/>
  <text x="650" y="216" text-anchor="end" class="lb">1 / hour</text>

  <!-- Curve B: 1/6 hours (21600 s) — LoRa avg = 2.78 mW -->
  <!-- T=1: 15.4+2.78=18.2 → 19.6 days; T=60: 0.26+2.78=3.04 → 117 days -->
  <!-- T=600: 0.026+2.78=2.8 → 127 days -->
  <path d="M 90 256 Q 200 220 295 200 Q 400 185 500 184 L 660 184" fill="none" stroke="#2a1a0e" stroke-width="1.8" stroke-dasharray="6 3"/>
  <text x="650" y="178" text-anchor="end" class="lb">1 / 6 h</text>

  <!-- Curve C: 1/day (86400 s) — LoRa avg = 0.69 mW -->
  <!-- T=60: 0.26+0.69=0.95 → 374 d; T=600: 0.026+0.69=0.72 → 494 d -->
  <!-- T=1: 15.4+0.69=16.1 → 22 days -->
  <path d="M 90 251 Q 200 200 295 165 Q 400 142 500 132 L 660 130" fill="none" stroke="#2a1a0e" stroke-width="1.8" stroke-dasharray="2 3"/>
  <text x="650" y="124" text-anchor="end" class="lb">1 / day</text>

  <!-- Curve D: no radio — just inf+sensor -->
  <!-- T=1: 15.4 mW → 23 d; T=10: 1.54 → 232 d; T=60: 0.26 → 1371 d; T=600: 0.026 → 13700 d -->
  <path d="M 90 250 Q 200 165 295 110 Q 400 90 500 78 L 660 72" fill="none" stroke="#c8860e" stroke-width="2"/>
  <text x="650" y="66" text-anchor="end" class="lb" fill="#c8860e">no radio</text>

  <!-- Mark the three scheduling examples (1s, 60s, 600s) at the 1/hour curve -->
  <!-- 1s @ Curve A: x=90, y=286 -->
  <circle cx="90"  cy="286" r="4" fill="#2a1a0e"/>
  <!-- 60s @ Curve A: x = 90+log10(60)*205=90+364.4=454, but log10(60)=1.778 → x=455; y on curve A ≈ 224 -->
  <circle cx="455" cy="224" r="4" fill="#2a1a0e"/>
  <!-- 600s @ Curve A: x=660, y=222 -->
  <circle cx="660" cy="222" r="4" fill="#2a1a0e"/>

  <!-- annotations for the three example points -->
  <path d="M 90 286 L 130 302" stroke="#2a1a0e" stroke-width="0.8" fill="none" marker-end="url(#ar6)"/>
  <text x="134" y="306" class="sm">1 s · 11 days · FAILS</text>
  <path d="M 455 224 L 410 240" stroke="#2a1a0e" stroke-width="0.8" fill="none" marker-end="url(#ar6)"/>
  <text x="406" y="244" text-anchor="end" class="sm">60 s · 21 days · still radio-bound</text>
  <path d="M 660 222 L 615 208" stroke="#2a1a0e" stroke-width="0.8" fill="none" marker-end="url(#ar6)"/>
  <text x="611" y="204" text-anchor="end" class="sm">600 s · 21 days · radio sets ceiling</text>

  <!-- caption -->
  <text x="350" y="430" text-anchor="middle" class="cap">Above the 180-day line lives only when LoRa drops to 1/day or vanishes. The inference axis barely matters once the radio is set.</text>
</svg>
