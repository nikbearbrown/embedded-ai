<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 460" role="img" aria-labelledby="t04 d04">
  <title id="t04">Four-constraint coupling diagram for embedded AI design</title>
  <desc id="d04">A four-node diagram with memory, compute, power, and real-time at the corners. Directed arrows between nodes carry annotations naming the cross-constraint effects of common optimizations such as clocking faster, moving to external PSRAM, quantizing to int8, and locking memory into TCM.</desc>
  <defs>
    <style>
      .ti { font-family: 'EB Garamond', Georgia, 'Times New Roman', serif; font-size: 14px; font-weight: bold; fill: #2a1a0e; }
      .nl { font-family: 'EB Garamond', Georgia, 'Times New Roman', serif; font-size: 13px; font-weight: bold; fill: #fdfcfb; }
      .ns { font-family: 'EB Garamond', Georgia, 'Times New Roman', serif; font-size: 10px; fill: #fdfcfb; }
      .lb { font-family: 'EB Garamond', Georgia, 'Times New Roman', serif; font-size: 10.5px; fill: #2a1a0e; }
      .sm { font-family: 'EB Garamond', Georgia, 'Times New Roman', serif; font-size: 9.5px; fill: #4a4540; }
      .cap { font-family: 'EB Garamond', Georgia, 'Times New Roman', serif; font-size: 10px; font-style: italic; fill: #4a4540; }
    </style>
    <marker id="ar4" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto">
      <polygon points="0 0, 9 3.5, 0 7" fill="#2a1a0e"/>
    </marker>
  </defs>
  <rect width="700" height="460" fill="#fdfcfb"/>

  <text x="350" y="28" text-anchor="middle" class="ti">The four constraints are a connected surface, not independent axes</text>
  <text x="350" y="44" text-anchor="middle" class="sm">every optimization that improves one constraint touches the others</text>

  <!-- Four nodes at corners of a square — use ellipses -->
  <!-- Memory: top-left (170, 130) -->
  <!-- Compute: top-right (530, 130) -->
  <!-- Power: bottom-left (170, 350) -->
  <!-- Real-time: bottom-right (530, 350) -->

  <g>
    <ellipse cx="170" cy="130" rx="86" ry="42" fill="#2a1a0e" stroke="#2a1a0e" stroke-width="1.5"/>
    <text x="170" y="128" text-anchor="middle" class="nl">memory</text>
    <text x="170" y="146" text-anchor="middle" class="ns">flash · SRAM · PSRAM</text>
  </g>
  <g>
    <ellipse cx="530" cy="130" rx="86" ry="42" fill="#2a1a0e" stroke="#2a1a0e" stroke-width="1.5"/>
    <text x="530" y="128" text-anchor="middle" class="nl">compute</text>
    <text x="530" y="146" text-anchor="middle" class="ns">MACs · clock · SIMD</text>
  </g>
  <g>
    <ellipse cx="170" cy="350" rx="86" ry="42" fill="#2a1a0e" stroke="#2a1a0e" stroke-width="1.5"/>
    <text x="170" y="348" text-anchor="middle" class="nl">power</text>
    <text x="170" y="366" text-anchor="middle" class="ns">avg · peak · duty cycle</text>
  </g>
  <g>
    <ellipse cx="530" cy="350" rx="86" ry="42" fill="#2a1a0e" stroke="#2a1a0e" stroke-width="1.5"/>
    <text x="530" y="348" text-anchor="middle" class="nl">real-time</text>
    <text x="530" y="366" text-anchor="middle" class="ns">WCET · jitter · deadline</text>
  </g>

  <!-- Arrows (curved) with labels -->
  <!-- memory ↔ compute (top edge) -->
  <path d="M 256 120 Q 350 90 444 120" fill="none" stroke="#2a1a0e" stroke-width="1.25" marker-end="url(#ar4)"/>
  <text x="350" y="85" text-anchor="middle" class="lb">int8 quantize → −bytes, −cycles</text>
  <path d="M 444 140 Q 350 170 256 140" fill="none" stroke="#2a1a0e" stroke-width="1.25" marker-end="url(#ar4)"/>
  <text x="350" y="175" text-anchor="middle" class="lb">larger model → more activation RAM</text>

  <!-- memory ↔ power (left edge) -->
  <path d="M 158 172 Q 130 240 158 308" fill="none" stroke="#2a1a0e" stroke-width="1.25" marker-end="url(#ar4)"/>
  <text x="116" y="244" text-anchor="middle" class="lb" transform="rotate(-90 116 244)">PSRAM → +energy/access</text>
  <path d="M 182 308 Q 210 240 182 172" fill="none" stroke="#2a1a0e" stroke-width="1.25" marker-end="url(#ar4)"/>
  <text x="226" y="244" text-anchor="middle" class="lb" transform="rotate(-90 226 244)">int8 weights → −flash, −energy</text>

  <!-- compute ↔ real-time (right edge) -->
  <path d="M 518 172 Q 490 240 518 308" fill="none" stroke="#2a1a0e" stroke-width="1.25" marker-end="url(#ar4)"/>
  <text x="476" y="244" text-anchor="middle" class="lb" transform="rotate(-90 476 244)">dynamic graph → +WCET variance</text>
  <path d="M 542 308 Q 570 240 542 172" fill="none" stroke="#2a1a0e" stroke-width="1.25" marker-end="url(#ar4)"/>
  <text x="586" y="244" text-anchor="middle" class="lb" transform="rotate(-90 586 244)">deadline tight → forces faster code</text>

  <!-- compute ↔ power (diagonal) -->
  <path d="M 470 168 Q 350 240 230 312" fill="none" stroke="#2a1a0e" stroke-width="1.25" stroke-dasharray="4 2" marker-end="url(#ar4)"/>
  <text x="358" y="232" text-anchor="middle" class="lb">clock faster → +active current</text>

  <!-- power ↔ real-time (bottom edge) -->
  <path d="M 256 340 Q 350 310 444 340" fill="none" stroke="#2a1a0e" stroke-width="1.25" marker-end="url(#ar4)"/>
  <text x="350" y="305" text-anchor="middle" class="lb">peak current spike → brown-out reset</text>
  <path d="M 444 360 Q 350 390 256 360" fill="none" stroke="#2a1a0e" stroke-width="1.25" marker-end="url(#ar4)"/>
  <text x="350" y="405" text-anchor="middle" class="lb">lock to TCM → −WCET, +area</text>

  <!-- memory ↔ real-time (diagonal) -->
  <path d="M 230 168 Q 350 240 470 312" fill="none" stroke="#2a1a0e" stroke-width="1.25" stroke-dasharray="4 2" marker-end="url(#ar4)"/>
  <text x="350" y="262" text-anchor="middle" class="lb">cache misses → +WCET variance</text>

  <text x="350" y="440" text-anchor="middle" class="cap">Pick a corner to optimize and the arrows tell you what else moves. The deployment lives where all four agree.</text>
</svg>
