<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 420" role="img" aria-labelledby="t03 d03">
  <title id="t03">Activation footprint across CNN layers — naive allocation vs buffer reuse</title>
  <desc id="d03">Line chart of intermediate tensor memory across six CNN layer positions. Top line plots the cumulative naive per-layer allocation reaching 2.27 MB. Bottom line plots buffer-reuse strategy peaking at 1.15 MB on Conv1 output. The shaded gap between the two lines shows the savings.</desc>
  <defs>
    <style>
      .ti { font-family: 'EB Garamond', Georgia, 'Times New Roman', serif; font-size: 14px; font-weight: bold; fill: #2a1a0e; }
      .lb { font-family: 'EB Garamond', Georgia, 'Times New Roman', serif; font-size: 11px; fill: #2a1a0e; }
      .sm { font-family: 'EB Garamond', Georgia, 'Times New Roman', serif; font-size: 10px; fill: #4a4540; }
      .cap { font-family: 'EB Garamond', Georgia, 'Times New Roman', serif; font-size: 10px; font-style: italic; fill: #4a4540; }
      .ax { font-family: 'EB Garamond', Georgia, 'Times New Roman', serif; font-size: 10px; fill: #4a4540; }
      .pt { font-family: 'EB Garamond', Georgia, 'Times New Roman', serif; font-size: 9px; fill: #2a1a0e; }
    </style>
    <marker id="ar3" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#2a1a0e"/>
    </marker>
  </defs>
  <rect width="700" height="420" fill="#fdfcfb"/>

  <text x="32" y="28" class="ti">Activation footprint across a small CNN</text>
  <text x="32" y="44" class="sm">naive allocation sums every buffer · reuse keeps only the largest live tensor</text>

  <!-- plot area: x 80→650, y 80→340 -->
  <!-- y scale: 0 KB → y=340, 2500 KB → y=80; 260 px / 2500 KB = 0.104 px/KB -->
  <!-- y axis -->
  <line x1="80" y1="80" x2="80" y2="340" stroke="#8a8480"/>
  <line x1="80" y1="340" x2="650" y2="340" stroke="#8a8480"/>
  <!-- y ticks: 0, 500, 1000, 1500, 2000, 2500 KB -->
  <g class="ax">
    <text x="74" y="343" text-anchor="end">0</text>
    <line x1="78" y1="288" x2="80" y2="288" stroke="#4a4540"/>
    <text x="74" y="291" text-anchor="end">500 KB</text>
    <line x1="78" y1="236" x2="80" y2="236" stroke="#4a4540"/>
    <text x="74" y="239" text-anchor="end">1000</text>
    <line x1="78" y1="184" x2="80" y2="184" stroke="#4a4540"/>
    <text x="74" y="187" text-anchor="end">1500</text>
    <line x1="78" y1="132" x2="80" y2="132" stroke="#4a4540"/>
    <text x="74" y="135" text-anchor="end">2000</text>
    <line x1="78" y1="80" x2="80" y2="80" stroke="#4a4540"/>
    <text x="74" y="83" text-anchor="end">2500</text>
  </g>

  <!-- layer positions (x) -->
  <!-- 6 positions evenly spaced from 130 to 600 -->
  <!-- Input 110, Conv1 1150, Pool1 288, Conv2 576, Pool2 144, FC 0.04 -->
  <!-- Naive cumulative: 110, 1260, 1548, 2124, 2268, 2268 (approx as 2270) -->
  <!-- Reuse peak per step: 110, 1150, 1150, 1150, 1150, 1150 (running max) — but the layer's live tensor = its largest output? we show 110, 1150, 288, 576, 144, 0 -->

  <!-- naive line (cumulative, top) -->
  <polyline points="130,328.6 224,209.0 318,178.0 412,118.1 506,103.1 600,103.1" fill="none" stroke="#2a1a0e" stroke-width="2"/>
  <!-- reuse line (per-layer live) -->
  <polyline points="130,328.6 224,220.4 318,310.1 412,280.1 506,325.0 600,340" fill="none" stroke="#4a4540" stroke-width="2" stroke-dasharray="4 3"/>

  <!-- shading between -->
  <polygon points="130,328.6 224,209.0 318,178.0 412,118.1 506,103.1 600,103.1 600,340 506,325.0 412,280.1 318,310.1 224,220.4 130,328.6" fill="#c8c4c0" opacity="0.45"/>

  <!-- redraw lines on top -->
  <polyline points="130,328.6 224,209.0 318,178.0 412,118.1 506,103.1 600,103.1" fill="none" stroke="#2a1a0e" stroke-width="2"/>
  <polyline points="130,328.6 224,220.4 318,310.1 412,280.1 506,325.0 600,340" fill="none" stroke="#4a4540" stroke-width="2" stroke-dasharray="4 3"/>

  <!-- data points naive -->
  <g>
    <circle cx="130" cy="328.6" r="3" fill="#2a1a0e"/>
    <circle cx="224" cy="209.0" r="3" fill="#2a1a0e"/>
    <circle cx="318" cy="178.0" r="3" fill="#2a1a0e"/>
    <circle cx="412" cy="118.1" r="3" fill="#2a1a0e"/>
    <circle cx="506" cy="103.1" r="3" fill="#2a1a0e"/>
    <circle cx="600" cy="103.1" r="3" fill="#2a1a0e"/>
  </g>
  <!-- data points reuse -->
  <g>
    <circle cx="130" cy="328.6" r="3" fill="#4a4540"/>
    <circle cx="224" cy="220.4" r="3" fill="#4a4540"/>
    <circle cx="318" cy="310.1" r="3" fill="#4a4540"/>
    <circle cx="412" cy="280.1" r="3" fill="#4a4540"/>
    <circle cx="506" cy="325.0" r="3" fill="#4a4540"/>
    <circle cx="600" cy="340.0" r="3" fill="#4a4540"/>
  </g>

  <!-- x labels (layer names) -->
  <g class="sm">
    <text x="130" y="355" text-anchor="middle">Input</text>
    <text x="130" y="367" text-anchor="middle">96×96×3</text>
    <text x="224" y="355" text-anchor="middle">Conv1</text>
    <text x="224" y="367" text-anchor="middle">96×96×32</text>
    <text x="318" y="355" text-anchor="middle">Pool1</text>
    <text x="318" y="367" text-anchor="middle">48×48×32</text>
    <text x="412" y="355" text-anchor="middle">Conv2</text>
    <text x="412" y="367" text-anchor="middle">48×48×64</text>
    <text x="506" y="355" text-anchor="middle">Pool2</text>
    <text x="506" y="367" text-anchor="middle">24×24×64</text>
    <text x="600" y="355" text-anchor="middle">FC</text>
    <text x="600" y="367" text-anchor="middle">10</text>
  </g>

  <!-- peak callouts -->
  <line x1="600" y1="103.1" x2="650" y2="103.1" stroke="#2a1a0e" stroke-dasharray="2 3"/>
  <text x="640" y="100" text-anchor="end" class="pt">naive peak 2.27 MB</text>

  <line x1="224" y1="220.4" x2="280" y2="220.4" stroke="#4a4540" stroke-dasharray="2 3"/>
  <text x="282" y="218" class="pt">reuse peak 1.15 MB (Conv1)</text>

  <!-- legend -->
  <line x1="450" y1="62" x2="478" y2="62" stroke="#2a1a0e" stroke-width="2"/>
  <text x="484" y="65" class="lb">naive cumulative</text>
  <line x1="568" y1="62" x2="596" y2="62" stroke="#4a4540" stroke-width="2" stroke-dasharray="4 3"/>
  <text x="600" y="65" class="lb">buffer reuse</text>

  <!-- caption -->
  <text x="350" y="395" text-anchor="middle" class="cap">The gap is the savings: peak SRAM drops from 2.27 MB (dead on a 256 KB part) to 1.15 MB by reusing buffers across layers.</text>
</svg>
