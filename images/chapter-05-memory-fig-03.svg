<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 440" role="img" aria-labelledby="t03 d03">
  <title id="t03">Activation footprint across a small CNN</title>
  <desc id="d03">Line chart comparing naive cumulative allocation vs buffer reuse across CNN layers. Naive peak reaches 2.27 MB; reuse peak is 1.15 MB at Conv1. The shaded gap between the two lines represents the savings.</desc>
  <defs>
    <style>
      text { font-family: Lato, 'Helvetica Neue', Arial, sans-serif; }
      .title  { font-size: 14px; font-weight: 700; fill: #111111; }
      .sub    { font-size: 10px; fill: #555555; }
      .axis   { font-size: 10px; fill: #555555; }
      .label  { font-size: 10px; fill: #555555; }
      .legend { font-size: 11px; fill: #111111; }
      .note   { font-size: 9px; fill: #333333; }
      .cap    { font-size: 10px; font-style: italic; fill: #555555; }
    </style>
  </defs>

  <rect width="700" height="440" fill="#FFFFFF"/>

  <text x="32" y="28" class="title">Activation footprint across a small CNN</text>
  <text x="32" y="44" class="sub">naive allocation sums every buffer · reuse keeps only the largest live tensor</text>

  <!-- axes -->
  <line x1="80" y1="80" x2="80" y2="340" stroke="#888888" stroke-width="1.5"/>
  <line x1="80" y1="340" x2="650" y2="340" stroke="#888888" stroke-width="1.5"/>

  <!-- y-axis ticks and labels -->
  <line x1="76" y1="340" x2="80" y2="340" stroke="#888888"/>
  <text x="72" y="343" text-anchor="end" class="axis">0</text>

  <line x1="76" y1="288" x2="80" y2="288" stroke="#888888"/>
  <text x="72" y="291" text-anchor="end" class="axis">500 KB</text>

  <line x1="76" y1="236" x2="80" y2="236" stroke="#888888"/>
  <text x="72" y="239" text-anchor="end" class="axis">1000</text>

  <line x1="76" y1="184" x2="80" y2="184" stroke="#888888"/>
  <text x="72" y="187" text-anchor="end" class="axis">1500</text>

  <line x1="76" y1="132" x2="80" y2="132" stroke="#888888"/>
  <text x="72" y="135" text-anchor="end" class="axis">2000</text>

  <line x1="76" y1="80" x2="80" y2="80" stroke="#888888"/>
  <text x="72" y="83" text-anchor="end" class="axis">2500</text>

  <!-- horizontal grid lines -->
  <line x1="80" y1="288" x2="650" y2="288" stroke="#EEEEEE" stroke-width="0.75"/>
  <line x1="80" y1="236" x2="650" y2="236" stroke="#EEEEEE" stroke-width="0.75"/>
  <line x1="80" y1="184" x2="650" y2="184" stroke="#EEEEEE" stroke-width="0.75"/>
  <line x1="80" y1="132" x2="650" y2="132" stroke="#EEEEEE" stroke-width="0.75"/>
  <line x1="80" y1="80"  x2="650" y2="80"  stroke="#EEEEEE" stroke-width="0.75"/>

  <!-- shaded gap between naive and reuse -->
  <polygon points="130,328.6 224,209 318,178 412,118.1 506,103.1 600,103.1
                   600,340 506,325 412,280.1 318,310.1 224,220.4 130,328.6"
           fill="#BBBBBB" opacity="0.4"/>

  <!-- naive cumulative line (solid, dark) -->
  <polyline points="130,328.6 224,209 318,178 412,118.1 506,103.1 600,103.1"
            fill="none" stroke="#111111" stroke-width="2"/>

  <!-- buffer reuse line (dashed, medium gray) -->
  <polyline points="130,328.6 224,220.4 318,310.1 412,280.1 506,325 600,340"
            fill="none" stroke="#666666" stroke-width="2" stroke-dasharray="5 3"/>

  <!-- data points — naive -->
  <circle cx="130" cy="328.6" r="3" fill="#111111"/>
  <circle cx="224" cy="209"   r="3" fill="#111111"/>
  <circle cx="318" cy="178"   r="3" fill="#111111"/>
  <circle cx="412" cy="118.1" r="3" fill="#111111"/>
  <circle cx="506" cy="103.1" r="3" fill="#111111"/>
  <circle cx="600" cy="103.1" r="3" fill="#111111"/>

  <!-- data points — reuse -->
  <circle cx="130" cy="328.6" r="3" fill="#666666"/>
  <circle cx="224" cy="220.4" r="3" fill="#666666"/>
  <circle cx="318" cy="310.1" r="3" fill="#666666"/>
  <circle cx="412" cy="280.1" r="3" fill="#666666"/>
  <circle cx="506" cy="325"   r="3" fill="#666666"/>
  <circle cx="600" cy="340"   r="3" fill="#666666"/>

  <!-- x-axis labels -->
  <text x="130" y="358" text-anchor="middle" class="label">Input</text>
  <text x="130" y="370" text-anchor="middle" class="label">96×96×3</text>
  <text x="224" y="358" text-anchor="middle" class="label">Conv1</text>
  <text x="224" y="370" text-anchor="middle" class="label">96×96×32</text>
  <text x="318" y="358" text-anchor="middle" class="label">Pool1</text>
  <text x="318" y="370" text-anchor="middle" class="label">48×48×32</text>
  <text x="412" y="358" text-anchor="middle" class="label">Conv2</text>
  <text x="412" y="370" text-anchor="middle" class="label">48×48×64</text>
  <text x="506" y="358" text-anchor="middle" class="label">Pool2</text>
  <text x="506" y="370" text-anchor="middle" class="label">24×24×64</text>
  <text x="600" y="358" text-anchor="middle" class="label">FC</text>
  <text x="600" y="370" text-anchor="middle" class="label">10</text>

  <!-- naive peak annotation -->
  <line x1="600" y1="103.1" x2="650" y2="103.1" stroke="#333333" stroke-width="1" stroke-dasharray="2 3"/>
  <text x="605" y="88" class="note">naive peak 2.27 MB</text>

  <!-- reuse peak annotation -->
  <line x1="224" y1="220.4" x2="280" y2="220.4" stroke="#666666" stroke-width="1" stroke-dasharray="2 3"/>
  <text x="282" y="218" class="note">reuse peak 1.15 MB (Conv1)</text>

  <!-- legend -->
  <line x1="400" y1="62" x2="428" y2="62" stroke="#111111" stroke-width="2"/>
  <text x="434" y="65" class="legend">naive cumulative</text>
  <line x1="530" y1="62" x2="558" y2="62" stroke="#666666" stroke-width="2" stroke-dasharray="5 3"/>
  <text x="564" y="65" class="legend">buffer reuse</text>

  <!-- caption -->
  <text x="350" y="410" text-anchor="middle" class="cap">The gap is the savings: peak SRAM drops from 2.27 MB (dead on a 256 KB part) to 1.15 MB by reusing buffers across layers.</text>
</svg>
