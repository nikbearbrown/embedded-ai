  <!-- ghost columns showing removed channels -->
  <rect x="566" y="110" width="18" height="144" fill="none" stroke="#BBBBBB" stroke-dasharray="3 2"/>
  <rect x="584" y="110" width="18" height="144" fill="none" stroke="#BBBBBB" stroke-dasharray="3 2"/>
  <rect x="602" y="110" width="18" height="144" fill="none" stroke="#BBBBBB" stroke-dasharray="3 2"/>
  <text x="585" y="192" text-anchor="middle" class="nm">removed</text>

  <text x="530" y="270" text-anchor="middle" class="sm">smaller dense matrix · 5 × 8</text>

  <g transform="translate(458,288)">
    <text x="0"   y="0"  class="lb">Storage</text>
    <text x="160" y="0"  text-anchor="end" class="good">shrinks</text>
    <text x="0"   y="18" class="lb">SRAM</text>
    <text x="160" y="18" text-anchor="end" class="good">shrinks (fewer activation channels)</text>
    <text x="0"   y="36" class="lb">Latency</text>
    <text x="160" y="36" text-anchor="end" class="good">shrinks (fewer MACs)</text>
  </g>

  <rect x="460" y="352" width="140" height="22" fill="#333333"/>
  <text x="530" y="367" text-anchor="middle" class="badge">WHAT EMBEDDED USES</text>

  <text x="350" y="428" text-anchor="middle" class="cap">Sparse matrices live in papers. Dense smaller matrices live in firmware. Structured pruning is the one that ships.</text>
</svg>
