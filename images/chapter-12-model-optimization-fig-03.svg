  </g>

  <text x="170" y="270" text-anchor="middle" class="sm">same dimensions · 8 × 8</text>

  <g transform="translate(98,288)">
    <text x="0"   y="0"  class="lb">Storage</text>
    <text x="145" y="0"  text-anchor="end" class="good">shrinks (non-zeros only)</text>
    <text x="0"   y="18" class="lb">SRAM</text>
    <text x="145" y="18" text-anchor="end" class="bad">unchanged</text>
    <text x="0"   y="36" class="lb">Latency</text>
    <text x="145" y="36" text-anchor="end" class="bad">unchanged</text>
  </g>

  <rect x="100" y="352" width="140" height="22" fill="#888888"/>
  <text x="170" y="367" text-anchor="middle" class="badge">PAPER WIN, MCU LOSS</text>

  <!-- divider -->
  <line x1="350" y1="70" x2="350" y2="400" stroke="#DDDDDD" stroke-width="1"/>

  <!-- RIGHT: Structured pruning -->
  <text x="530" y="82" text-anchor="middle" class="ph">Structured pruning</text>
  <text x="530" y="97" text-anchor="middle" class="sm">drop whole output channels</text>

