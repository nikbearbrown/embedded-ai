    <rect x="98"  y="236" width="18" height="18" fill="#555555"/>
    <rect x="116" y="236" width="18" height="18" fill="#F5F5F5" stroke="#BBBBBB"/>
    <rect x="134" y="236" width="18" height="18" fill="#555555"/>
    <rect x="152" y="236" width="18" height="18" fill="#555555"/>
