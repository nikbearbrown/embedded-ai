<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 440" role="img" aria-labelledby="t03 d03">
  <title id="t03">Unstructured vs structured pruning — what actually shrinks on an MCU</title>
  <desc id="d03">Two weight-matrix diagrams side by side. The left shows unstructured pruning with scattered zero values throughout a same-sized matrix; the right shows structured pruning with entire output channels removed, leaving a smaller dense matrix. Annotations indicate which version saves SRAM and latency.</desc>
  <defs>
    <style>
      .ti { font-family: 'EB Garamond', Georgia, 'Times New Roman', serif; font-size: 14px; font-weight: bold; fill: #2a1a0e; }
      .ph { font-family: 'EB Garamond', Georgia, 'Times New Roman', serif; font-size: 13px; font-weight: bold; fill: #2a1a0e; }
      .lb { font-family: 'EB Garamond', Georgia, 'Times New Roman', serif; font-size: 11px; fill: #2a1a0e; }
      .sm { font-family: 'EB Garamond', Georgia, 'Times New Roman', serif; font-size: 10px; fill: #4a4540; }
      .nm { font-family: 'EB Garamond', Georgia, 'Times New Roman', serif; font-size: 10px; font-style: italic; fill: #6a6560; }
      .cap { font-family: 'EB Garamond', Georgia, 'Times New Roman', serif; font-size: 11px; font-style: italic; fill: #4a4540; }
      .badge { font-family: 'EB Garamond', Georgia, 'Times New Roman', serif; font-size: 10px; font-weight: bold; fill: #fdfcfb; }
      .verdict-good { font-family: 'EB Garamond', Georgia, 'Times New Roman', serif; font-size: 11px; font-weight: bold; fill: #2a1a0e; }
      .verdict-bad { font-family: 'EB Garamond', Georgia, 'Times New Roman', serif; font-size: 11px; font-weight: bold; fill: #8a1f1f; }
    </style>
    <marker id="ar" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#2a1a0e"/>
    </marker>
  </defs>
  <rect width="700" height="440" fill="#fdfcfb"/>

  <text x="32" y="32" class="ti">Two ways to remove weights — only one shrinks the dense kernel</text>
  <text x="32" y="50" class="nm">embedded inference assumes dense GEMM · sparse formats almost never ship to an MCU</text>

  <!-- ============ LEFT: Unstructured pruning ============ -->
  <text x="170" y="82" text-anchor="middle" class="ph">Unstructured pruning</text>
  <text x="170" y="98" text-anchor="middle" class="sm">drop individual weights below threshold</text>

  <!-- Matrix: 8x10 grid centered around (170, 200), cell 18px, dimensions 144x180 -->
  <!-- top-left at (98, 110), cells at i*18, j*18 -->
  <g>
    <!-- non-zero cells (dark) and zero cells (white with border) -->
    <!-- Simple pattern: ~30% zeros scattered -->
    <!-- Row 0 -->
    <rect x="98"  y="110" width="18" height="18" fill="#4a4540"/>
    <rect x="116" y="110" width="18" height="18" fill="#fdfcfb" stroke="#c8c4c0"/>
    <rect x="134" y="110" width="18" height="18" fill="#4a4540"/>
    <rect x="152" y="110" width="18" height="18" fill="#4a4540"/>
    <rect x="170" y="110" width="18" height="18" fill="#fdfcfb" stroke="#c8c4c0"/>
    <rect x="188" y="110" width="18" height="18" fill="#4a4540"/>
    <rect x="206" y="110" width="18" height="18" fill="#4a4540"/>
    <rect x="224" y="110" width="18" height="18" fill="#fdfcfb" stroke="#c8c4c0"/>
    <!-- Row 1 -->
    <rect x="98"  y="128" width="18" height="18" fill="#fdfcfb" stroke="#c8c4c0"/>
    <rect x="116" y="128" width="18" height="18" fill="#4a4540"/>
    <rect x="134" y="128" width="18" height="18" fill="#4a4540"/>
    <rect x="152" y="128" width="18" height="18" fill="#fdfcfb" stroke="#c8c4c0"/>
    <rect x="170" y="128" width="18" height="18" fill="#4a4540"/>
    <rect x="188" y="128" width="18" height="18" fill="#fdfcfb" stroke="#c8c4c0"/>
    <rect x="206" y="128" width="18" height="18" fill="#4a4540"/>
    <rect x="224" y="128" width="18" height="18" fill="#4a4540"/>
    <!-- Row 2 -->
    <rect x="98"  y="146" width="18" height="18" fill="#4a4540"/>
    <rect x="116" y="146" width="18" height="18" fill="#4a4540"/>
    <rect x="134" y="146" width="18" height="18" fill="#fdfcfb" stroke="#c8c4c0"/>
    <rect x="152" y="146" width="18" height="18" fill="#4a4540"/>
    <rect x="170" y="146" width="18" height="18" fill="#fdfcfb" stroke="#c8c4c0"/>
    <rect x="188" y="146" width="18" height="18" fill="#4a4540"/>
    <rect x="206" y="146" width="18" height="18" fill="#fdfcfb" stroke="#c8c4c0"/>
    <rect x="224" y="146" width="18" height="18" fill="#4a4540"/>
    <!-- Row 3 -->
    <rect x="98"  y="164" width="18" height="18" fill="#fdfcfb" stroke="#c8c4c0"/>
    <rect x="116" y="164" width="18" height="18" fill="#4a4540"/>
    <rect x="134" y="164" width="18" height="18" fill="#4a4540"/>
    <rect x="152" y="164" width="18" height="18" fill="#4a4540"/>
    <rect x="170" y="164" width="18" height="18" fill="#4a4540"/>
    <rect x="188" y="164" width="18" height="18" fill="#fdfcfb" stroke="#c8c4c0"/>
    <rect x="206" y="164" width="18" height="18" fill="#4a4540"/>
    <rect x="224" y="164" width="18" height="18" fill="#4a4540"/>
    <!-- Row 4 -->
    <rect x="98"  y="182" width="18" height="18" fill="#4a4540"/>
    <rect x="116" y="182" width="18" height="18" fill="#fdfcfb" stroke="#c8c4c0"/>
    <rect x="134" y="182" width="18" height="18" fill="#4a4540"/>
    <rect x="152" y="182" width="18" height="18" fill="#fdfcfb" stroke="#c8c4c0"/>
    <rect x="170" y="182" width="18" height="18" fill="#4a4540"/>
    <rect x="188" y="182" width="18" height="18" fill="#4a4540"/>
    <rect x="206" y="182" width="18" height="18" fill="#fdfcfb" stroke="#c8c4c0"/>
    <rect x="224" y="182" width="18" height="18" fill="#4a4540"/>
    <!-- Row 5 -->
    <rect x="98"  y="200" width="18" height="18" fill="#4a4540"/>
    <rect x="116" y="200" width="18" height="18" fill="#4a4540"/>
    <rect x="134" y="200" width="18" height="18" fill="#fdfcfb" stroke="#c8c4c0"/>
    <rect x="152" y="200" width="18" height="18" fill="#4a4540"/>
    <rect x="170" y="200" width="18" height="18" fill="#4a4540"/>
