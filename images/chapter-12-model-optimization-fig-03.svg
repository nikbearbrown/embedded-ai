    <rect x="206" y="200" width="18" height="18" fill="#4a4540"/>
    <rect x="224" y="200" width="18" height="18" fill="#fdfcfb" stroke="#c8c4c0"/>
    <!-- Row 6 -->
    <rect x="98"  y="218" width="18" height="18" fill="#fdfcfb" stroke="#c8c4c0"/>
    <rect x="116" y="218" width="18" height="18" fill="#4a4540"/>
    <rect x="134" y="218" width="18" height="18" fill="#4a4540"/>
    <rect x="152" y="218" width="18" height="18" fill="#fdfcfb" stroke="#c8c4c0"/>
    <rect x="170" y="218" width="18" height="18" fill="#4a4540"/>
    <rect x="188" y="218" width="18" height="18" fill="#4a4540"/>
    <rect x="206" y="218" width="18" height="18" fill="#fdfcfb" stroke="#c8c4c0"/>
    <rect x="224" y="218" width="18" height="18" fill="#4a4540"/>
    <!-- Row 7 -->
    <rect x="98"  y="236" width="18" height="18" fill="#4a4540"/>
    <rect x="116" y="236" width="18" height="18" fill="#fdfcfb" stroke="#c8c4c0"/>
    <rect x="134" y="236" width="18" height="18" fill="#4a4540"/>
    <rect x="152" y="236" width="18" height="18" fill="#4a4540"/>
    <rect x="170" y="236" width="18" height="18" fill="#fdfcfb" stroke="#c8c4c0"/>
    <rect x="188" y="236" width="18" height="18" fill="#4a4540"/>
    <rect x="206" y="236" width="18" height="18" fill="#4a4540"/>
    <rect x="224" y="236" width="18" height="18" fill="#fdfcfb" stroke="#c8c4c0"/>
  </g>

  <!-- dimensions label -->
  <text x="170" y="270" text-anchor="middle" class="sm">same dimensions · 8 columns × 8 rows</text>

  <!-- effect lines -->
  <g transform="translate(98, 290)">
    <text x="0" y="0" class="lb">Storage</text>
    <text x="160" y="0" text-anchor="end" class="verdict-good">shrinks (only non-zeros stored)</text>
    <text x="0" y="20" class="lb">SRAM</text>
    <text x="160" y="20" text-anchor="end" class="verdict-bad">unchanged</text>
    <text x="0" y="40" class="lb">Latency</text>
    <text x="160" y="40" text-anchor="end" class="verdict-bad">unchanged</text>
  </g>

  <rect x="100" y="355" width="140" height="22" fill="#8a1f1f"/>
  <text x="170" y="370" text-anchor="middle" class="badge">PAPER WIN, MCU LOSS</text>

  <!-- divider -->
  <line x1="350" y1="70" x2="350" y2="400" stroke="#c8c4c0" stroke-width="0.75"/>

  <!-- ============ RIGHT: Structured pruning ============ -->
  <text x="530" y="82" text-anchor="middle" class="ph">Structured pruning</text>
  <text x="530" y="98" text-anchor="middle" class="sm">drop whole output channels (columns)</text>

  <!-- Matrix: 5 columns × 8 rows (3 channels removed from original 8) -->
  <g>
    <!-- All cells dark (no zeros visible — fully dense) -->
    <!-- Row 0 -->
    <rect x="476" y="110" width="18" height="18" fill="#4a4540"/>
    <rect x="494" y="110" width="18" height="18" fill="#4a4540"/>
    <rect x="512" y="110" width="18" height="18" fill="#4a4540"/>
    <rect x="530" y="110" width="18" height="18" fill="#4a4540"/>
    <rect x="548" y="110" width="18" height="18" fill="#4a4540"/>
    <!-- Row 1 -->
    <rect x="476" y="128" width="18" height="18" fill="#4a4540"/>
    <rect x="494" y="128" width="18" height="18" fill="#4a4540"/>
    <rect x="512" y="128" width="18" height="18" fill="#4a4540"/>
    <rect x="530" y="128" width="18" height="18" fill="#4a4540"/>
    <rect x="548" y="128" width="18" height="18" fill="#4a4540"/>
    <!-- Row 2 -->
    <rect x="476" y="146" width="18" height="18" fill="#4a4540"/>
    <rect x="494" y="146" width="18" height="18" fill="#4a4540"/>
    <rect x="512" y="146" width="18" height="18" fill="#4a4540"/>
    <rect x="530" y="146" width="18" height="18" fill="#4a4540"/>
    <rect x="548" y="146" width="18" height="18" fill="#4a4540"/>
    <!-- Row 3 -->
    <rect x="476" y="164" width="18" height="18" fill="#4a4540"/>
    <rect x="494" y="164" width="18" height="18" fill="#4a4540"/>
    <rect x="512" y="164" width="18" height="18" fill="#4a4540"/>
    <rect x="530" y="164" width="18" height="18" fill="#4a4540"/>
    <rect x="548" y="164" width="18" height="18" fill="#4a4540"/>
    <!-- Row 4 -->
    <rect x="476" y="182" width="18" height="18" fill="#4a4540"/>
    <rect x="494" y="182" width="18" height="18" fill="#4a4540"/>
    <rect x="512" y="182" width="18" height="18" fill="#4a4540"/>
    <rect x="530" y="182" width="18" height="18" fill="#4a4540"/>
    <rect x="548" y="182" width="18" height="18" fill="#4a4540"/>
    <!-- Row 5 -->
    <rect x="476" y="200" width="18" height="18" fill="#4a4540"/>
    <rect x="494" y="200" width="18" height="18" fill="#4a4540"/>
    <rect x="512" y="200" width="18" height="18" fill="#4a4540"/>
    <rect x="530" y="200" width="18" height="18" fill="#4a4540"/>
    <rect x="548" y="200" width="18" height="18" fill="#4a4540"/>
    <!-- Row 6 -->
    <rect x="476" y="218" width="18" height="18" fill="#4a4540"/>
    <rect x="494" y="218" width="18" height="18" fill="#4a4540"/>
    <rect x="512" y="218" width="18" height="18" fill="#4a4540"/>
    <rect x="530" y="218" width="18" height="18" fill="#4a4540"/>
    <rect x="548" y="218" width="18" height="18" fill="#4a4540"/>
    <!-- Row 7 -->
    <rect x="476" y="236" width="18" height="18" fill="#4a4540"/>
    <rect x="494" y="236" width="18" height="18" fill="#4a4540"/>
    <rect x="512" y="236" width="18" height="18" fill="#4a4540"/>
    <rect x="530" y="236" width="18" height="18" fill="#4a4540"/>
    <rect x="548" y="236" width="18" height="18" fill="#4a4540"/>
  </g>
  <!-- ghost columns: dashed outlines showing removed -->
  <g>
    <rect x="566" y="110" width="18" height="144" fill="none" stroke="#c8c4c0" stroke-dasharray="3 2"/>
    <rect x="584" y="110" width="18" height="144" fill="none" stroke="#c8c4c0" stroke-dasharray="3 2"/>
    <rect x="602" y="110" width="18" height="144" fill="none" stroke="#c8c4c0" stroke-dasharray="3 2"/>
  </g>
  <text x="585" y="186" text-anchor="middle" class="nm">removed</text>

  <text x="530" y="270" text-anchor="middle" class="sm">smaller dense matrix · 5 columns × 8 rows</text>

  <!-- effect lines -->
  <g transform="translate(458, 290)">
    <text x="0" y="0" class="lb">Storage</text>
    <text x="160" y="0" text-anchor="end" class="verdict-good">shrinks</text>
    <text x="0" y="20" class="lb">SRAM</text>
    <text x="160" y="20" text-anchor="end" class="verdict-good">shrinks (fewer activation channels)</text>
    <text x="0" y="40" class="lb">Latency</text>
    <text x="160" y="40" text-anchor="end" class="verdict-good">shrinks (fewer MACs)</text>
  </g>

  <rect x="460" y="355" width="140" height="22" fill="#2a1a0e"/>
  <text x="530" y="370" text-anchor="middle" class="badge">WHAT EMBEDDED USES</text>

  <text x="350" y="416" text-anchor="middle" class="cap">Sparse matrices live in papers. Dense smaller matrices live in firmware. Structured pruning is the one that ships.</text>
</svg>
