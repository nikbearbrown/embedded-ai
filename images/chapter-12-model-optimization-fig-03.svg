<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 450" role="img" aria-labelledby="t03 d03">
  <title id="t03">Unstructured vs structured pruning — what actually shrinks on an MCU</title>
  <desc id="d03">Two weight-matrix diagrams side by side. Left: unstructured pruning with scattered zero values throughout a same-sized matrix. Right: structured pruning with entire output channels removed, leaving a smaller dense matrix.</desc>
  <defs>
    <style>
      .ti  { font-family: Lato, 'Helvetica Neue', Arial, sans-serif; font-size: 14px; font-weight: bold; fill: #111111; }
      .ph  { font-family: Lato, 'Helvetica Neue', Arial, sans-serif; font-size: 13px; font-weight: bold; fill: #111111; }
      .lb  { font-family: Lato, 'Helvetica Neue', Arial, sans-serif; font-size: 11px; fill: #333333; }
      .sm  { font-family: Lato, 'Helvetica Neue', Arial, sans-serif; font-size: 10px; fill: #555555; }
      .nm  { font-family: Lato, 'Helvetica Neue', Arial, sans-serif; font-size: 10px; font-style: italic; fill: #555555; }
      .cap { font-family: Lato, 'Helvetica Neue', Arial, sans-serif; font-size: 11px; font-style: italic; fill: #555555; }
      .badge{ font-family: Lato, 'Helvetica Neue', Arial, sans-serif; font-size: 10px; font-weight: bold; fill: #FFFFFF; }
      .good { font-family: Lato, 'Helvetica Neue', Arial, sans-serif; font-size: 11px; font-weight: bold; fill: #333333; }
      .bad  { font-family: Lato, 'Helvetica Neue', Arial, sans-serif; font-size: 11px; font-weight: bold; fill: #888888; }
    </style>
    <marker id="ar" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0,8 3,0 6" fill="#333333"/>
    </marker>
  </defs>
  <rect width="700" height="450" fill="#FFFFFF"/>

  <text x="32" y="32" class="ti">Two ways to remove weights — only one shrinks the dense kernel</text>
  <text x="32" y="50" class="nm">embedded inference assumes dense GEMM · sparse formats almost never ship to an MCU</text>

  <!-- LEFT: Unstructured pruning -->
  <text x="170" y="82" text-anchor="middle" class="ph">Unstructured pruning</text>
  <text x="170" y="97" text-anchor="middle" class="sm">drop individual weights below threshold</text>

  <!-- 8x8 grid, cell 18px, top-left (98,110) -->
  <!-- non-zero = #555555, zero = #F5F5F5 with border #BBBBBB -->
