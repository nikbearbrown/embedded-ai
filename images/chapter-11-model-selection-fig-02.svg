<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 450" role="img" aria-labelledby="t11b d11b">
  <title id="t11b">Standard versus depthwise-separable convolution — where the ~9× saving comes from</title>
  <desc id="d11b">Side-by-side block diagram. Left: standard 3x3 convolution costs 9C² mults/pixel. Right: depthwise-separable factorization costs 9C + C² mults/pixel, roughly 9× cheaper at C=64.</desc>
  <defs>
    <style>
      .ti  { font-family: Lato, 'Helvetica Neue', Arial, sans-serif; font-size: 13px; font-weight: bold; fill: #111111; }
      .sm  { font-family: Lato, 'Helvetica Neue', Arial, sans-serif; font-size: 10px; fill: #555555; }
      .cap { font-family: Lato, 'Helvetica Neue', Arial, sans-serif; font-size: 10px; font-style: italic; fill: #666666; }
      .nm  { font-family: Lato, 'Helvetica Neue', Arial, sans-serif; font-size: 11px; font-weight: bold; fill: #111111; }
      .eq  { font-family: Lato, 'Helvetica Neue', Arial, sans-serif; font-size: 12px; font-style: italic; fill: #111111; }
    </style>
    <marker id="ar2" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#333333"/>
    </marker>
  </defs>
  <rect width="700" height="450" fill="#FFFFFF"/>

  <text x="32" y="30" class="ti">Standard vs depthwise-separable convolution</text>
  <text x="32" y="46" class="sm">Cost per output pixel, C input channels and C output channels.</text>

  <!-- LEFT — Standard 3x3 -->
  <text x="160" y="76" text-anchor="middle" class="nm">Standard 3×3 convolution</text>

  <!-- Input channels stack -->
  <text x="48" y="106" class="sm">input: C channels</text>
  <rect x="48" y="112" width="40" height="28" fill="#FFFFFF" stroke="#AAAAAA"/>
  <rect x="56" y="120" width="40" height="28" fill="#DDDDDD" stroke="#AAAAAA"/>
  <rect x="64" y="128" width="40" height="28" fill="#BBBBBB" stroke="#AAAAAA"/>
  <rect x="72" y="136" width="40" height="28" fill="#888888" stroke="#AAAAAA"/>

  <!-- Dense block -->
  <rect x="148" y="116" width="80" height="80" fill="#111111"/>
  <text x="188" y="152" text-anchor="middle" font-family="Lato,'Helvetica Neue',Arial,sans-serif" font-size="11" font-weight="bold" fill="#FFFFFF">3×3 dense</text>
  <text x="188" y="166" text-anchor="middle" font-family="Lato,'Helvetica Neue',Arial,sans-serif" font-size="10" fill="#BBBBBB">all-channel</text>
  <text x="188" y="180" text-anchor="middle" font-family="Lato,'Helvetica Neue',Arial,sans-serif" font-size="10" fill="#BBBBBB">+ spatial</text>

  <!-- Output stack -->
  <text x="276" y="106" class="sm">output: C channels</text>
  <rect x="248" y="112" width="40" height="28" fill="#FFFFFF" stroke="#AAAAAA"/>
  <rect x="256" y="120" width="40" height="28" fill="#DDDDDD" stroke="#AAAAAA"/>
  <rect x="264" y="128" width="40" height="28" fill="#BBBBBB" stroke="#AAAAAA"/>
  <rect x="272" y="136" width="40" height="28" fill="#888888" stroke="#AAAAAA"/>

  <line x1="112" y1="156" x2="148" y2="156" stroke="#333333" stroke-width="1" marker-end="url(#ar2)"/>
  <line x1="228" y1="156" x2="248" y2="156" stroke="#333333" stroke-width="1" marker-end="url(#ar2)"/>

  <!-- Cost box -->
  <rect x="48" y="224" width="264" height="58" fill="#F5F5F5" stroke="#AAAAAA" stroke-width="0.75"/>
  <text x="180" y="246" text-anchor="middle" class="eq">cost = 9C² mults / pixel</text>
  <text x="180" y="262" text-anchor="middle" class="sm">every output channel mixes every input</text>
  <text x="180" y="276" text-anchor="middle" class="sm">at C=64: 36,864 mults / pixel</text>

  <!-- Divider -->
  <line x1="350" y1="58" x2="350" y2="376" stroke="#DDDDDD" stroke-width="0.75"/>

  <!-- RIGHT — Depthwise separable -->
  <text x="528" y="76" text-anchor="middle" class="nm">Depthwise-separable convolution</text>

  <text x="384" y="106" class="sm">input: C</text>
  <rect x="384" y="112" width="32" height="44" fill="#888888" stroke="#AAAAAA"/>

  <rect x="436" y="116" width="56" height="40" fill="#444444"/>
  <text x="464" y="134" text-anchor="middle" font-family="Lato,'Helvetica Neue',Arial,sans-serif" font-size="11" font-weight="bold" fill="#FFFFFF">depthwise</text>
  <text x="464" y="148" text-anchor="middle" font-family="Lato,'Helvetica Neue',Arial,sans-serif" font-size="10" fill="#DDDDDD">3×3 per ch</text>

  <rect x="510" y="112" width="32" height="44" fill="#AAAAAA" stroke="#888888"/>

  <rect x="558" y="116" width="56" height="40" fill="#111111"/>
  <text x="586" y="134" text-anchor="middle" font-family="Lato,'Helvetica Neue',Arial,sans-serif" font-size="11" font-weight="bold" fill="#FFFFFF">pointwise</text>
  <text x="586" y="148" text-anchor="middle" font-family="Lato,'Helvetica Neue',Arial,sans-serif" font-size="10" fill="#DDDDDD">1×1 mix</text>

  <rect x="632" y="112" width="32" height="44" fill="#AAAAAA" stroke="#888888"/>
  <text x="648" y="106" text-anchor="middle" class="sm">output: C</text>

  <line x1="416" y1="134" x2="436" y2="134" stroke="#333333" stroke-width="1" marker-end="url(#ar2)"/>
  <line x1="492" y1="134" x2="510" y2="134" stroke="#333333" stroke-width="1" marker-end="url(#ar2)"/>
  <line x1="542" y1="134" x2="558" y2="134" stroke="#333333" stroke-width="1" marker-end="url(#ar2)"/>
  <line x1="614" y1="134" x2="632" y2="134" stroke="#333333" stroke-width="1" marker-end="url(#ar2)"/>

  <text x="464" y="178" text-anchor="middle" class="sm">9C mults</text>
  <text x="464" y="190" text-anchor="middle" class="sm">spatial only</text>
  <text x="586" y="178" text-anchor="middle" class="sm">C² mults</text>
  <text x="586" y="190" text-anchor="middle" class="sm">channel mix only</text>

  <!-- Cost box -->
  <rect x="370" y="224" width="296" height="58" fill="#F5F5F5" stroke="#AAAAAA" stroke-width="0.75"/>
  <text x="518" y="246" text-anchor="middle" class="eq">cost = 9C + C² mults / pixel</text>
  <text x="518" y="262" text-anchor="middle" class="sm">spatial then channel — never both at once</text>
  <text x="518" y="276" text-anchor="middle" class="sm">at C=64: 4,672 mults / pixel</text>

  <!-- Ratio callout -->
  <rect x="160" y="308" width="380" height="44" fill="#DDDDDD" stroke="#333333" stroke-width="1"/>
  <text x="350" y="328" text-anchor="middle" class="nm">ratio = 9C² / (9C + C²)  ≈  9× cheaper at C = 64</text>
  <text x="350" y="344" text-anchor="middle" class="sm">the C² term dominates the standard cost at any reasonable channel count</text>

  <text x="350" y="390" text-anchor="middle" class="cap">Lose some expressiveness (channels cannot mix during the spatial filter).</text>
  <text x="350" y="406" text-anchor="middle" class="cap">MobileNetV2's inverted residuals and linear bottlenecks patch the gap.</text>
  <text x="350" y="428" text-anchor="middle" class="cap"> </text>
</svg>
