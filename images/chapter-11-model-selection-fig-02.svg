<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 440" role="img" aria-labelledby="t11b d11b">
  <title id="t11b">Standard versus depthwise-separable convolution — where the ~9× saving comes from</title>
  <desc id="d11b">A side-by-side block diagram. The left panel shows a standard 3x3 convolution as a single dense block costing 9C² multiplications per output pixel. The right panel shows the depthwise-separable factorization: a per-channel 3x3 depthwise filter at 9C, then a 1x1 pointwise mix at C², for total 9C plus C² — roughly nine times cheaper at C=64.</desc>
  <defs>
    <style>
      .ti { font-family: 'EB Garamond', Georgia, 'Times New Roman', serif; font-size: 13px; font-weight: bold; fill: #2a1a0e; }
      .lb { font-family: 'EB Garamond', Georgia, 'Times New Roman', serif; font-size: 11px; fill: #2a1a0e; }
      .sm { font-family: 'EB Garamond', Georgia, 'Times New Roman', serif; font-size: 10px; fill: #4a4540; }
      .cap { font-family: 'EB Garamond', Georgia, 'Times New Roman', serif; font-size: 10px; font-style: italic; fill: #4a4540; }
      .nm { font-family: 'EB Garamond', Georgia, 'Times New Roman', serif; font-size: 11px; font-weight: bold; fill: #2a1a0e; }
      .eq { font-family: 'EB Garamond', Georgia, 'Times New Roman', serif; font-size: 12px; font-style: italic; fill: #2a1a0e; }
    </style>
    <marker id="ar2" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#2a1a0e"/>
    </marker>
  </defs>
  <rect width="700" height="440" fill="#fdfcfb"/>

  <text x="32" y="30" class="ti">Standard vs depthwise-separable convolution — substitute cheap ops for expensive ones</text>
  <text x="32" y="46" class="sm">Cost per output pixel, C input channels and C output channels.</text>

  <!-- LEFT — Standard 3x3 -->
  <text x="160" y="78" text-anchor="middle" class="nm">Standard 3×3 convolution</text>

  <!-- Input channels stack -->
  <text x="48" y="110" class="sm">input: C channels</text>
  <g>
    <rect x="48" y="116" width="40" height="28" fill="#fdfcfb" stroke="#8a8480"/>
    <rect x="56" y="124" width="40" height="28" fill="#f5f2ee" stroke="#8a8480"/>
    <rect x="64" y="132" width="40" height="28" fill="#e8e2dc" stroke="#8a8480"/>
    <rect x="72" y="140" width="40" height="28" fill="#c8c4c0" stroke="#8a8480"/>
  </g>

  <!-- Dense block -->
  <rect x="148" y="120" width="80" height="80" fill="#2a1a0e"/>
  <text x="188" y="156" text-anchor="middle" class="nm" fill="#fdfcfb">3×3 dense</text>
  <text x="188" y="172" text-anchor="middle" class="sm" fill="#c8c4c0">all-channel mix</text>
  <text x="188" y="186" text-anchor="middle" class="sm" fill="#c8c4c0">+ spatial</text>

  <!-- Output stack -->
  <text x="276" y="110" class="sm">output: C channels</text>
  <g>
    <rect x="248" y="116" width="40" height="28" fill="#fdfcfb" stroke="#8a8480"/>
    <rect x="256" y="124" width="40" height="28" fill="#f5f2ee" stroke="#8a8480"/>
    <rect x="264" y="132" width="40" height="28" fill="#e8e2dc" stroke="#8a8480"/>
    <rect x="272" y="140" width="40" height="28" fill="#c8c4c0" stroke="#8a8480"/>
  </g>

  <line x1="112" y1="160" x2="148" y2="160" stroke="#2a1a0e" stroke-width="1" marker-end="url(#ar2)"/>
  <line x1="228" y1="160" x2="248" y2="160" stroke="#2a1a0e" stroke-width="1" marker-end="url(#ar2)"/>

  <!-- Cost equation -->
  <rect x="48" y="230" width="264" height="60" fill="#fdfcfb" stroke="#8a8480" stroke-width="0.75"/>
  <text x="180" y="252" text-anchor="middle" class="eq">cost = 9C² mults / pixel</text>
  <text x="180" y="270" text-anchor="middle" class="sm">every output channel mixes every input channel</text>
  <text x="180" y="284" text-anchor="middle" class="sm">at C=64: 36,864 mults / pixel</text>

  <!-- Divider -->
  <line x1="350" y1="60" x2="350" y2="380" stroke="#c8c4c0" stroke-width="0.75"/>

  <!-- RIGHT — Depthwise separable -->
  <text x="528" y="78" text-anchor="middle" class="nm">Depthwise separable convolution</text>

  <!-- Input -->
  <text x="384" y="110" class="sm">input: C</text>
  <rect x="384" y="116" width="32" height="44" fill="#c8c4c0" stroke="#8a8480"/>

  <!-- Depthwise -->
  <rect x="436" y="120" width="56" height="40" fill="#4a4540"/>
  <text x="464" y="138" text-anchor="middle" class="nm" fill="#fdfcfb">depthwise</text>
  <text x="464" y="152" text-anchor="middle" class="sm" fill="#c8c4c0">3×3 per ch</text>

  <!-- Intermediate -->
  <rect x="510" y="116" width="32" height="44" fill="#c8c4c0" stroke="#8a8480"/>

  <!-- Pointwise -->
  <rect x="558" y="120" width="56" height="40" fill="#2a1a0e"/>
  <text x="586" y="138" text-anchor="middle" class="nm" fill="#fdfcfb">pointwise</text>
  <text x="586" y="152" text-anchor="middle" class="sm" fill="#c8c4c0">1×1 mix</text>

  <!-- Output -->
  <rect x="632" y="116" width="32" height="44" fill="#c8c4c0" stroke="#8a8480"/>
  <text x="648" y="110" text-anchor="middle" class="sm">output: C</text>

  <line x1="416" y1="138" x2="436" y2="138" stroke="#2a1a0e" stroke-width="1" marker-end="url(#ar2)"/>
  <line x1="492" y1="138" x2="510" y2="138" stroke="#2a1a0e" stroke-width="1" marker-end="url(#ar2)"/>
  <line x1="542" y1="138" x2="558" y2="138" stroke="#2a1a0e" stroke-width="1" marker-end="url(#ar2)"/>
  <line x1="614" y1="138" x2="632" y2="138" stroke="#2a1a0e" stroke-width="1" marker-end="url(#ar2)"/>

  <!-- per-step cost -->
  <text x="464" y="182" text-anchor="middle" class="sm">9C mults</text>
  <text x="464" y="194" text-anchor="middle" class="sm">spatial only</text>
  <text x="586" y="182" text-anchor="middle" class="sm">C² mults</text>
  <text x="586" y="194" text-anchor="middle" class="sm">channel mix only</text>

  <!-- Cost equation -->
  <rect x="384" y="230" width="280" height="60" fill="#fdfcfb" stroke="#8a8480" stroke-width="0.75"/>
  <text x="524" y="252" text-anchor="middle" class="eq">cost = 9C + C² mults / pixel</text>
  <text x="524" y="270" text-anchor="middle" class="sm">spatial filter, then channel mix — never both at once</text>
  <text x="524" y="284" text-anchor="middle" class="sm">at C=64: 4,672 mults / pixel</text>

  <!-- Ratio callout -->
  <rect x="160" y="320" width="380" height="56" fill="#f5f2ee" stroke="#2a1a0e" stroke-width="1"/>
  <text x="350" y="342" text-anchor="middle" class="nm">cost ratio = 9C² / (9C + C²)  ≈  9× cheaper at C = 64</text>
  <text x="350" y="360" text-anchor="middle" class="sm">— for any reasonable channel count the C² term dominates the standard cost —</text>

  <text x="350" y="404" text-anchor="middle" class="cap">Lose a little expressiveness (channels can't mix during the spatial filter).</text>
  <text x="350" y="420" text-anchor="middle" class="cap">MobileNetV2's inverted residuals and linear bottlenecks patch the gap.</text>
</svg>
