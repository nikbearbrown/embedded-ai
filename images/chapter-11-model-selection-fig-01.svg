<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 480" role="img" aria-labelledby="t11a d11a">
  <title id="t11a">Five deployment-aware metrics — what to measure before choosing a model</title>
  <desc id="d11a">A central candidate-model node surrounded by five deployment-aware metrics: latency on target hardware, memory footprint at int8, energy per inference, accuracy on your dataset, and accuracy under quantization.</desc>
  <defs>
    <style>
      .ti { font-family: Lato, 'Helvetica Neue', Arial, sans-serif; font-size: 13px; font-weight: bold; fill: #111111; }
      .sm { font-family: Lato, 'Helvetica Neue', Arial, sans-serif; font-size: 10px; fill: #555555; }
      .cap { font-family: Lato, 'Helvetica Neue', Arial, sans-serif; font-size: 10px; font-style: italic; fill: #666666; }
      .nm { font-family: Lato, 'Helvetica Neue', Arial, sans-serif; font-size: 11px; font-weight: bold; fill: #111111; }
    </style>
  </defs>
  <rect width="700" height="480" fill="#FFFFFF"/>

  <text x="32" y="30" class="ti">Five deployment-aware metrics — what predicts embedded success</text>
  <text x="32" y="46" class="sm">Each must be measured on your hardware, with your data, before you choose.</text>

  <!-- Center node -->
  <rect x="290" y="200" width="120" height="60" fill="#111111"/>
  <text x="350" y="225" text-anchor="middle" font-family="Lato,'Helvetica Neue',Arial,sans-serif" font-size="11" font-weight="bold" fill="#FFFFFF">candidate</text>
  <text x="350" y="240" text-anchor="middle" font-family="Lato,'Helvetica Neue',Arial,sans-serif" font-size="11" font-weight="bold" fill="#FFFFFF">model</text>
  <text x="350" y="254" text-anchor="middle" font-family="Lato,'Helvetica Neue',Arial,sans-serif" font-size="10" fill="#BBBBBB">on target hardware</text>

  <!-- Spoke lines -->
  <line x1="290" y1="210" x2="160" y2="100" stroke="#888888" stroke-width="1" stroke-dasharray="3 2"/>
  <line x1="410" y1="210" x2="540" y2="100" stroke="#888888" stroke-width="1" stroke-dasharray="3 2"/>
  <line x1="290" y1="240" x2="160" y2="260" stroke="#888888" stroke-width="1" stroke-dasharray="3 2"/>
  <line x1="410" y1="240" x2="540" y2="260" stroke="#888888" stroke-width="1" stroke-dasharray="3 2"/>
  <line x1="350" y1="260" x2="350" y2="370" stroke="#888888" stroke-width="1" stroke-dasharray="3 2"/>

  <!-- Metric 1 — Latency (top left) -->
  <rect x="32" y="68" width="248" height="64" fill="#FFFFFF" stroke="#AAAAAA" stroke-width="0.75"/>
  <rect x="32" y="68" width="6" height="64" fill="#111111"/>
  <text x="48" y="86" class="nm">Latency on target</text>
  <text x="48" y="100" class="sm">ms wall-clock; mean, p95, max / 100 runs</text>
  <text x="48" y="114" class="sm">skip → trust FLOPs, miss deadline</text>
  <text x="48" y="126" class="cap">"FLOPs predict CPU latency badly."</text>

  <!-- Metric 2 — Memory (top right) -->
  <rect x="420" y="68" width="248" height="64" fill="#FFFFFF" stroke="#AAAAAA" stroke-width="0.75"/>
  <rect x="420" y="68" width="6" height="64" fill="#444444"/>
  <text x="436" y="86" class="nm">Memory footprint (int8)</text>
  <text x="436" y="100" class="sm">flash from linker map; SRAM from arena</text>
  <text x="436" y="114" class="sm">skip → param count lies, link fails</text>
  <text x="436" y="126" class="cap">"Not parameter count alone."</text>

  <!-- Metric 3 — Energy (left middle) -->
  <rect x="32" y="228" width="248" height="64" fill="#F5F5F5" stroke="#AAAAAA" stroke-width="0.75"/>
  <rect x="32" y="228" width="6" height="64" fill="#888888"/>
  <text x="48" y="246" class="nm">Energy per inference</text>
  <text x="48" y="260" class="sm">mJ via sense resistor + scope, full cycle</text>
  <text x="48" y="274" class="sm">skip → battery dies early</text>
  <text x="48" y="286" class="cap">"Average draw sets battery life."</text>

  <!-- Metric 4 — Accuracy on your data (right middle) -->
  <rect x="420" y="228" width="248" height="64" fill="#F5F5F5" stroke="#AAAAAA" stroke-width="0.75"/>
  <rect x="420" y="228" width="6" height="64" fill="#666666"/>
  <text x="436" y="246" class="nm">Accuracy on your dataset</text>
  <text x="436" y="260" class="sm">your camera, your lighting, your noise</text>
  <text x="436" y="274" class="sm">skip → 5–20% drop from domain gap</text>
  <text x="436" y="286" class="cap">"ImageNet ≠ stamping defects."</text>

  <!-- Metric 5 — Quantized accuracy (bottom center) -->
  <rect x="226" y="370" width="248" height="64" fill="#F5F5F5" stroke="#AAAAAA" stroke-width="0.75"/>
  <rect x="226" y="370" width="6" height="64" fill="#BBBBBB"/>
  <text x="242" y="388" class="nm">Accuracy under quantization</text>
  <text x="242" y="402" class="sm">float32 → int8 gap on validation set</text>
  <text x="242" y="416" class="sm">skip → ship a model you never measured</text>
  <text x="242" y="428" class="cap">"Gap &gt; 3–5% = something is wrong."</text>

  <!-- bottom caption -->
  <text x="350" y="462" text-anchor="middle" class="cap">Five empirical questions. None answerable from a paper or datasheet.</text>
</svg>
