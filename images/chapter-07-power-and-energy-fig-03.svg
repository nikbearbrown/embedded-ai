<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 440" role="img" aria-labelledby="t03 d03">
  <title id="t03">Race to sleep — faster clock wins on average power</title>
  <desc id="d03">Two overlaid current-vs-time traces. Trace A at 64 MHz draws 20 mA for 400 ms then sleeps. Trace B at 128 MHz draws 35 mA for only 200 ms then sleeps. Trace B has 12% lower average current.</desc>
  <defs>
    <style>
      .ti  { font-family: Lato, 'Helvetica Neue', Arial, sans-serif; font-size: 13px; font-weight: bold; fill: #111111; }
      .lb  { font-family: Lato, 'Helvetica Neue', Arial, sans-serif; font-size: 11px; fill: #333333; }
      .sm  { font-family: Lato, 'Helvetica Neue', Arial, sans-serif; font-size: 10px; fill: #555555; }
      .cap { font-family: Lato, 'Helvetica Neue', Arial, sans-serif; font-size: 10px; font-style: italic; fill: #555555; }
    </style>
    <marker id="ar3" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#333333"/>
    </marker>
  </defs>
  <rect width="700" height="440" fill="#FFFFFF"/>
  <text x="350" y="28" text-anchor="middle" class="ti">Race to sleep — same model, two clocks</text>
  <text x="350" y="44" text-anchor="middle" class="sm">10-second duty cycle · sleep floor 5 µA</text>

  <!-- chart area: x 70..660, y 70..340 -->
  <line x1="70" y1="70" x2="70" y2="340" stroke="#888888"/>
  <line x1="70" y1="340" x2="660" y2="340" stroke="#888888"/>
  <!-- y ticks 0,10,20,30,40 mA -->
  <text x="64" y="343" text-anchor="end" class="sm">0</text>
  <line x1="68" y1="340" x2="70" y2="340" stroke="#888888"/>
  <text x="64" y="278" text-anchor="end" class="sm">10</text>
  <line x1="68" y1="275" x2="70" y2="275" stroke="#888888"/>
  <text x="64" y="213" text-anchor="end" class="sm">20</text>
  <line x1="68" y1="210" x2="70" y2="210" stroke="#888888"/>
  <text x="64" y="148" text-anchor="end" class="sm">30</text>
  <line x1="68" y1="145" x2="70" y2="145" stroke="#888888"/>
  <text x="64" y="83" text-anchor="end" class="sm">40</text>
  <line x1="68" y1="80" x2="70" y2="80" stroke="#888888"/>
  <text x="28" y="200" class="sm" transform="rotate(-90 28 200)">current (mA)</text>

  <!-- x ticks -->
  <text x="70"  y="356" text-anchor="middle" class="sm">0</text>
  <text x="129" y="356" text-anchor="middle" class="sm">0.5</text>
  <text x="188" y="356" text-anchor="middle" class="sm">1.0</text>
  <text x="365" y="356" text-anchor="middle" class="sm">5.0</text>
  <text x="660" y="356" text-anchor="middle" class="sm">10.0 s</text>
  <text x="365" y="370" text-anchor="middle" class="sm">time</text>

  <!-- Trace A: 64 MHz — lighter fill, drawn first (behind) -->
  <!-- 20 mA → y = 340 - 20*6.5 = 210; 400 ms → 47.2 px -->
  <rect x="70" y="210" width="47" height="130" fill="#BBBBBB"/>
  <line x1="70"  y1="210" x2="117" y2="210" stroke="#555555" stroke-width="2"/>
  <line x1="117" y1="210" x2="117" y2="338" stroke="#555555" stroke-width="2"/>
  <line x1="117" y1="338" x2="660" y2="338" stroke="#555555" stroke-width="2"/>

  <!-- Trace B: 128 MHz — darker fill, drawn on top -->
  <!-- 35 mA → y = 340 - 35*6.5 = 112.5; 200 ms → 23.6 px -->
  <rect x="70" y="113" width="24" height="227" fill="#888888" fill-opacity="0.7"/>
  <line x1="70"  y1="113" x2="94"  y2="113" stroke="#333333" stroke-width="2"/>
  <line x1="94"  y1="113" x2="94"  y2="338" stroke="#333333" stroke-width="2"/>
  <line x1="94"  y1="338" x2="660" y2="338" stroke="#333333" stroke-width="2"/>

  <!-- annotations -->
  <path d="M 120 220 L 200 175" fill="none" stroke="#555555" stroke-width="1" marker-end="url(#ar3)"/>
  <text x="206" y="172" class="lb">64 MHz · 20 mA · 400 ms · 8.0 mJ</text>
  <text x="206" y="186" class="sm">average ≈ 0.85 mA</text>

  <path d="M 96 128 L 200 105" fill="none" stroke="#333333" stroke-width="1" marker-end="url(#ar3)"/>
  <text x="206" y="102" class="lb">128 MHz · 35 mA · 200 ms · 7.0 mJ</text>
  <text x="206" y="116" class="sm">average ≈ 0.75 mA — 12% lower</text>

  <!-- legend -->
  <rect x="500" y="80" width="14" height="10" fill="#BBBBBB" stroke="#555555" stroke-width="1"/>
  <text x="520" y="89" class="sm">Trace A · 64 MHz</text>
  <rect x="500" y="98" width="14" height="10" fill="#888888"/>
  <text x="520" y="107" class="sm">Trace B · 128 MHz</text>

  <!-- caption -->
  <text x="350" y="400" text-anchor="middle" class="cap">Shorter and taller wins because sleep is far cheaper than slowed-down activity.</text>
  <text x="350" y="414" text-anchor="middle" class="cap">Race to sleep is the dominant rule when duty cycles are low.</text>
</svg>
