<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 480" role="img" aria-labelledby="t10f5 d10f5">
  <title id="t10f5">CNC milling integration timeline — three tracks showing how AI is removed from the hard real-time path</title>
  <desc id="d10f5">A three-track timeline. The top track is a 1 kHz control loop reading fault_probability and fault_flag every millisecond. The middle track is an asynchronous AI inference firing every 50 milliseconds. The bottom track is the RMS backup detector running every millisecond. A fault onset event triggers the RMS detector at +2 ms while the AI does not finish until +38 ms.</desc>
  <defs>
    <style>
      .ti { font-family: Lato, 'Helvetica Neue', Arial, sans-serif; font-size: 13px; font-weight: bold; fill: #111111; }
      .lb { font-family: Lato, 'Helvetica Neue', Arial, sans-serif; font-size: 11px; fill: #111111; }
      .sm { font-family: Lato, 'Helvetica Neue', Arial, sans-serif; font-size: 10px; fill: #555555; }
      .cap { font-family: Lato, 'Helvetica Neue', Arial, sans-serif; font-size: 10px; font-style: italic; fill: #555555; }
      .nm { font-family: Lato, 'Helvetica Neue', Arial, sans-serif; font-size: 11px; font-weight: bold; fill: #111111; }
      .eb { font-family: Lato, 'Helvetica Neue', Arial, sans-serif; font-size: 9px; letter-spacing: 0.5px; fill: #555555; }
      .ax { font-family: Lato, 'Helvetica Neue', Arial, sans-serif; font-size: 9px; fill: #555555; }
    </style>
    <marker id="ar1f5" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#111111"/>
    </marker>
    <marker id="ar2f5" markerWidth="6" markerHeight="4" refX="5" refY="2" orient="auto">
      <polygon points="0 0, 6 2, 0 4" fill="#666666"/>
    </marker>
  </defs>
  <rect width="700" height="480" fill="#FFFFFF"/>

  <text x="32" y="30" class="ti">CNC milling integration — three tracks, three deadlines, one safety outcome</text>
  <text x="32" y="48" class="sm">Spindle 10,000 RPM · 1 ms control loop · 5 ms shutdown budget · AI takes 35–55 ms per inference</text>

  <!-- Time axis: x=60..640 covers 0..60 ms. px/ms = 580/60 = 9.667 -->
  <!-- Gridlines at 0,10,20,30,40,50,60 ms -->
  <g stroke="#DDDDDD" stroke-width="0.5" stroke-dasharray="2 3">
    <line x1="60"  y1="80" x2="60"  y2="345"/>
    <line x1="157" y1="80" x2="157" y2="345"/>
    <line x1="253" y1="80" x2="253" y2="345"/>
    <line x1="350" y1="80" x2="350" y2="345"/>
    <line x1="447" y1="80" x2="447" y2="345"/>
    <line x1="543" y1="80" x2="543" y2="345"/>
    <line x1="640" y1="80" x2="640" y2="345"/>
  </g>

  <!-- x-axis -->
  <line x1="60" y1="345" x2="640" y2="345" stroke="#555555"/>
  <text x="60"  y="361" text-anchor="middle" class="ax">0</text>
  <text x="157" y="361" text-anchor="middle" class="ax">10</text>
  <text x="253" y="361" text-anchor="middle" class="ax">20</text>
  <text x="350" y="361" text-anchor="middle" class="ax">30</text>
  <text x="447" y="361" text-anchor="middle" class="ax">40</text>
  <text x="543" y="361" text-anchor="middle" class="ax">50</text>
  <text x="640" y="361" text-anchor="middle" class="ax">60 ms</text>
  <text x="350" y="377" text-anchor="middle" class="sm">time after fault onset</text>

  <!-- Track 1: control loop 1 kHz, y≈88–122 -->
  <text x="32" y="88" class="eb">CONTROL LOOP · 1 kHz</text>
  <text x="32" y="100" class="nm">reads fault_flag, fault_probability</text>
  <text x="32" y="112" class="sm">deadline 1 ms · deterministic</text>
  <line x1="60" y1="122" x2="640" y2="122" stroke="#555555" stroke-width="0.75"/>
  <g fill="#111111">
    <rect x="60"   y="118" width="2" height="8"/>
    <rect x="69.7" y="118" width="2" height="8"/>
    <rect x="79.3" y="118" width="2" height="8"/>
    <rect x="89.0" y="118" width="2" height="8"/>
    <rect x="98.7" y="118" width="2" height="8"/>
    <rect x="108.3" y="118" width="2" height="8"/>
    <rect x="118.0" y="118" width="2" height="8"/>
    <rect x="127.7" y="118" width="2" height="8"/>
    <rect x="137.3" y="118" width="2" height="8"/>
