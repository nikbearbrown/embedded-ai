    <rect x="253.3" y="118" width="2" height="8"/>
    <rect x="263.0" y="118" width="2" height="8"/>
    <rect x="272.7" y="118" width="2" height="8"/>
    <rect x="282.3" y="118" width="2" height="8"/>
    <rect x="292.0" y="118" width="2" height="8"/>
    <rect x="301.7" y="118" width="2" height="8"/>
    <rect x="311.3" y="118" width="2" height="8"/>
    <rect x="321.0" y="118" width="2" height="8"/>
    <rect x="330.7" y="118" width="2" height="8"/>
    <rect x="340.3" y="118" width="2" height="8"/>
    <rect x="350.0" y="118" width="2" height="8"/>
    <rect x="359.7" y="118" width="2" height="8"/>
    <rect x="369.3" y="118" width="2" height="8"/>
    <rect x="379.0" y="118" width="2" height="8"/>
    <rect x="388.7" y="118" width="2" height="8"/>
    <rect x="398.3" y="118" width="2" height="8"/>
