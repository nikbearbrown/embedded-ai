    <rect x="572.3" y="118" width="2" height="8"/>
    <rect x="582.0" y="118" width="2" height="8"/>
    <rect x="591.7" y="118" width="2" height="8"/>
    <rect x="601.3" y="118" width="2" height="8"/>
    <rect x="611.0" y="118" width="2" height="8"/>
    <rect x="620.7" y="118" width="2" height="8"/>
    <rect x="630.3" y="118" width="2" height="8"/>
  </g>

  <!-- Track 2: AI inference async every 50 ms, y≈150–210 -->
  <text x="32" y="152" class="eb">AI INFERENCE · every 50 ms</text>
  <text x="32" y="164" class="nm">updates fault_probability</text>
  <text x="32" y="176" class="sm">no hard deadline · advisory only</text>
  <!-- inference bar: t=0 to t=38ms → x=60 to x=60+38*9.667=427 -->
  <rect x="60" y="188" width="367" height="20" fill="#F5F5F5" stroke="#666666" stroke-width="0.75"/>
  <text x="244" y="202" text-anchor="middle" class="sm">inference run · 38 ms</text>
  <!-- second inference scheduled at 50 ms -->
  <rect x="543" y="188" width="97" height="20" fill="#F5F5F5" stroke="#888888" stroke-width="0.75" stroke-dasharray="3 2"/>
  <text x="591" y="202" text-anchor="middle" class="sm">next · scheduled</text>
  <!-- fault_probability update dot -->
  <circle cx="427" cy="198" r="4" fill="#111111"/>
  <text x="432" y="182" class="sm">fault_probability ← 0.97 (at +38 ms)</text>

  <!-- Track 3: RMS backup detector every 1 ms, y≈232–290 -->
  <text x="32" y="236" class="eb">RMS BACKUP DETECTOR · 1 kHz</text>
  <text x="32" y="248" class="nm">deterministic, in-loop</text>
  <text x="32" y="260" class="sm">trips fault_flag on threshold</text>
  <line x1="60" y1="275" x2="640" y2="275" stroke="#555555" stroke-width="0.75"/>
  <g fill="#666666">
    <rect x="60"   y="271" width="2" height="8"/>
    <rect x="69.7" y="271" width="2" height="8"/>
    <rect x="79.3" y="271" width="2" height="8"/>
    <rect x="89.0" y="271" width="2" height="8"/>
    <rect x="98.7" y="271" width="2" height="8"/>
    <rect x="108.3" y="271" width="2" height="8"/>
    <rect x="118.0" y="271" width="2" height="8"/>
    <rect x="127.7" y="271" width="2" height="8"/>
    <rect x="137.3" y="271" width="2" height="8"/>
    <rect x="147.0" y="271" width="2" height="8"/>
    <rect x="156.7" y="271" width="2" height="8"/>
    <rect x="166.3" y="271" width="2" height="8"/>
    <rect x="176.0" y="271" width="2" height="8"/>
    <rect x="185.7" y="271" width="2" height="8"/>
    <rect x="195.3" y="271" width="2" height="8"/>
    <rect x="205.0" y="271" width="2" height="8"/>
    <rect x="214.7" y="271" width="2" height="8"/>
    <rect x="224.3" y="271" width="2" height="8"/>
    <rect x="234.0" y="271" width="2" height="8"/>
    <rect x="243.7" y="271" width="2" height="8"/>
    <rect x="253.3" y="271" width="2" height="8"/>
    <rect x="263.0" y="271" width="2" height="8"/>
    <rect x="272.7" y="271" width="2" height="8"/>
    <rect x="282.3" y="271" width="2" height="8"/>
    <rect x="292.0" y="271" width="2" height="8"/>
    <rect x="301.7" y="271" width="2" height="8"/>
    <rect x="311.3" y="271" width="2" height="8"/>
    <rect x="321.0" y="271" width="2" height="8"/>
    <rect x="330.7" y="271" width="2" height="8"/>
    <rect x="340.3" y="271" width="2" height="8"/>
    <rect x="350.0" y="271" width="2" height="8"/>
  </g>
  <!-- detection point at t=2 ms → x = 60 + 2*9.667 = 79.3 -->
  <circle cx="79.3" cy="275" r="5" fill="#111111"/>
  <text x="88" y="268" class="sm">fault_flag ← true (at +2 ms)</text>

  <!-- Vertical event lines -->
  <!-- t=0 fault onset -->
  <line x1="60" y1="76" x2="60" y2="325" stroke="#111111" stroke-width="1.5"/>
  <text x="60" y="72" text-anchor="middle" class="nm">fault onset</text>

  <!-- t=5 ms shutdown deadline -->
  <line x1="108.3" y1="76" x2="108.3" y2="325" stroke="#333333" stroke-width="1" stroke-dasharray="4 3"/>
  <text x="108.3" y="72" text-anchor="middle" class="nm">5 ms deadline</text>

  <!-- t=38 ms AI advisory -->
  <line x1="427" y1="76" x2="427" y2="325" stroke="#888888" stroke-width="1" stroke-dasharray="3 2"/>
  <text x="427" y="72" text-anchor="middle" class="sm">AI advisory · +38 ms</text>

  <!-- Outcome annotation box -->
  <rect x="60" y="390" width="580" height="42" fill="#F5F5F5" stroke="#333333"/>
  <text x="76" y="408" class="lb">Shutdown triggered by RMS at +2 ms — well inside the 5 ms budget.</text>
  <text x="76" y="424" class="sm">AI advisory arrives at +38 ms and would have missed; it serves as early-warning on slower-developing faults, not as the guarantee.</text>

  <text x="350" y="462" text-anchor="middle" class="cap">The AI is in the system. The deadline is met by something else. That is the architecture, not a workaround.</text>
</svg>
