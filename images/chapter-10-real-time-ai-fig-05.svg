<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 460" role="img" aria-labelledby="t10f5 d10f5">
  <title id="t10f5">CNC milling integration timeline — three tracks showing how AI is removed from the hard real-time path</title>
  <desc id="d10f5">A three-track timeline. The top track is a 1 kHz control loop reading fault_probability and fault_flag every millisecond. The middle track is an asynchronous AI inference firing every 50 milliseconds with 35 to 55 millisecond execution bars. The bottom track is the RMS backup detector running every millisecond. A fault onset event triggers the RMS detector at +2 ms while the AI does not finish until +40 ms.</desc>
  <defs>
    <style>
      .ti { font-family: 'EB Garamond', Georgia, 'Times New Roman', serif; font-size: 13px; font-weight: bold; fill: #2a1a0e; }
      .lb { font-family: 'EB Garamond', Georgia, 'Times New Roman', serif; font-size: 11px; fill: #2a1a0e; }
      .sm { font-family: 'EB Garamond', Georgia, 'Times New Roman', serif; font-size: 10px; fill: #4a4540; }
      .cap { font-family: 'EB Garamond', Georgia, 'Times New Roman', serif; font-size: 10px; font-style: italic; fill: #4a4540; }
      .nm { font-family: 'EB Garamond', Georgia, 'Times New Roman', serif; font-size: 11px; font-weight: bold; fill: #2a1a0e; }
      .eb { font-family: 'EB Garamond', Georgia, 'Times New Roman', serif; font-size: 9px; letter-spacing: 0.5px; fill: #4a4540; }
      .ax { font-family: 'EB Garamond', Georgia, 'Times New Roman', serif; font-size: 9px; fill: #4a4540; }
    </style>
    <marker id="ar1f5" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#2a1a0e"/>
    </marker>
    <marker id="ar2f5" markerWidth="6" markerHeight="4" refX="5" refY="2" orient="auto">
      <polygon points="0 0, 6 2, 0 4" fill="#4a4540"/>
    </marker>
  </defs>
  <rect width="700" height="460" fill="#fdfcfb"/>

  <text x="32" y="30" class="ti">CNC milling integration — three tracks, three deadlines, one safety outcome</text>
  <text x="32" y="48" class="sm">Spindle 10,000 RPM · 1 ms control loop · 5 ms shutdown budget · AI takes 35–55 ms per inference</text>

  <!-- Time axis 60..640 covers 0..60 ms. 1 ms = 9.67 px ~ 10 px (use 60..640 = 580 px / 60 ms = 9.667 px/ms) -->
  <!-- Use scale: t_ms → x = 60 + t*9.667 -->
  <!-- gridlines at 0, 10, 20, 30, 40, 50, 60 ms -->
  <g stroke="#c8c4c0" stroke-width="0.5" stroke-dasharray="2 3">
    <line x1="60"  y1="80" x2="60"  y2="340"/>
    <line x1="157" y1="80" x2="157" y2="340"/>
    <line x1="253" y1="80" x2="253" y2="340"/>
    <line x1="350" y1="80" x2="350" y2="340"/>
    <line x1="447" y1="80" x2="447" y2="340"/>
    <line x1="543" y1="80" x2="543" y2="340"/>
    <line x1="640" y1="80" x2="640" y2="340"/>
  </g>

  <!-- x-axis at y=340 -->
  <line x1="60" y1="340" x2="640" y2="340" stroke="#4a4540"/>
  <text x="60"  y="356" text-anchor="middle" class="ax">0</text>
  <text x="157" y="356" text-anchor="middle" class="ax">10</text>
  <text x="253" y="356" text-anchor="middle" class="ax">20</text>
  <text x="350" y="356" text-anchor="middle" class="ax">30</text>
  <text x="447" y="356" text-anchor="middle" class="ax">40</text>
  <text x="543" y="356" text-anchor="middle" class="ax">50</text>
  <text x="640" y="356" text-anchor="middle" class="ax">60 ms</text>
  <text x="350" y="372" text-anchor="middle" class="sm">time after fault onset</text>

  <!-- Track 1: control loop 1 kHz, tick at every ms, y=92 -->
  <text x="32" y="88" class="eb">CONTROL LOOP · 1 kHz</text>
  <text x="32" y="100" class="nm">reads fault_flag, fault_probability</text>
  <text x="32" y="112" class="sm">deadline 1 ms · deterministic</text>
  <g>
    <line x1="60" y1="118" x2="640" y2="118" stroke="#4a4540" stroke-width="0.75"/>
    <!-- 60 ticks: every ~9.67 px -->
    <g fill="#2a1a0e">
      <rect x="60"   y="114" width="2" height="8"/>
      <rect x="69.7" y="114" width="2" height="8"/>
      <rect x="79.3" y="114" width="2" height="8"/>
      <rect x="89.0" y="114" width="2" height="8"/>
      <rect x="98.7" y="114" width="2" height="8"/>
      <rect x="108.3" y="114" width="2" height="8"/>
      <rect x="118.0" y="114" width="2" height="8"/>
      <rect x="127.7" y="114" width="2" height="8"/>
      <rect x="137.3" y="114" width="2" height="8"/>
      <rect x="147.0" y="114" width="2" height="8"/>
      <rect x="156.7" y="114" width="2" height="8"/>
      <rect x="166.3" y="114" width="2" height="8"/>
      <rect x="176.0" y="114" width="2" height="8"/>
      <rect x="185.7" y="114" width="2" height="8"/>
      <rect x="195.3" y="114" width="2" height="8"/>
      <rect x="205.0" y="114" width="2" height="8"/>
      <rect x="214.7" y="114" width="2" height="8"/>
      <rect x="224.3" y="114" width="2" height="8"/>
      <rect x="234.0" y="114" width="2" height="8"/>
      <rect x="243.7" y="114" width="2" height="8"/>
      <rect x="253.3" y="114" width="2" height="8"/>
      <rect x="263.0" y="114" width="2" height="8"/>
      <rect x="272.7" y="114" width="2" height="8"/>
      <rect x="282.3" y="114" width="2" height="8"/>
      <rect x="292.0" y="114" width="2" height="8"/>
      <rect x="301.7" y="114" width="2" height="8"/>
      <rect x="311.3" y="114" width="2" height="8"/>
      <rect x="321.0" y="114" width="2" height="8"/>
      <rect x="330.7" y="114" width="2" height="8"/>
      <rect x="340.3" y="114" width="2" height="8"/>
      <rect x="350.0" y="114" width="2" height="8"/>
      <rect x="359.7" y="114" width="2" height="8"/>
      <rect x="369.3" y="114" width="2" height="8"/>
      <rect x="379.0" y="114" width="2" height="8"/>
      <rect x="388.7" y="114" width="2" height="8"/>
      <rect x="398.3" y="114" width="2" height="8"/>
      <rect x="408.0" y="114" width="2" height="8"/>
      <rect x="417.7" y="114" width="2" height="8"/>
      <rect x="427.3" y="114" width="2" height="8"/>
      <rect x="437.0" y="114" width="2" height="8"/>
      <rect x="446.7" y="114" width="2" height="8"/>
      <rect x="456.3" y="114" width="2" height="8"/>
      <rect x="466.0" y="114" width="2" height="8"/>
      <rect x="475.7" y="114" width="2" height="8"/>
      <rect x="485.3" y="114" width="2" height="8"/>
      <rect x="495.0" y="114" width="2" height="8"/>
      <rect x="504.7" y="114" width="2" height="8"/>
      <rect x="514.3" y="114" width="2" height="8"/>
      <rect x="524.0" y="114" width="2" height="8"/>
      <rect x="533.7" y="114" width="2" height="8"/>
      <rect x="543.3" y="114" width="2" height="8"/>
      <rect x="553.0" y="114" width="2" height="8"/>
      <rect x="562.7" y="114" width="2" height="8"/>
      <rect x="572.3" y="114" width="2" height="8"/>
      <rect x="582.0" y="114" width="2" height="8"/>
      <rect x="591.7" y="114" width="2" height="8"/>
      <rect x="601.3" y="114" width="2" height="8"/>
      <rect x="611.0" y="114" width="2" height="8"/>
      <rect x="620.7" y="114" width="2" height="8"/>
      <rect x="630.3" y="114" width="2" height="8"/>
    </g>
  </g>

  <!-- Track 2: AI inference asynchronous every 50 ms, runs 35-55 ms -->
  <text x="32" y="148" class="eb">AI INFERENCE · every 50 ms</text>
  <text x="32" y="160" class="nm">updates fault_probability</text>
  <text x="32" y="172" class="sm">no hard deadline · advisory only</text>

  <g>
    <!-- inference bar starting at t=0 ms, running 38 ms -> from x=60 to x=60+38*9.67=427 -->
    <rect x="60" y="184" width="367" height="20" fill="#f5f2ee" stroke="#4a4540" stroke-width="0.75"/>
    <text x="244" y="198" text-anchor="middle" class="sm">inference run · 38 ms</text>
    <!-- second inference scheduled at 50 ms -->
    <rect x="543" y="184" width="100" height="20" fill="#f5f2ee" stroke="#4a4540" stroke-width="0.75" stroke-dasharray="3 2"/>
    <text x="593" y="198" text-anchor="middle" class="sm">next run · scheduled</text>
    <!-- fault_probability update point at end of inference -->
    <circle cx="427" cy="194" r="4" fill="#2a1a0e"/>
    <text x="438" y="178" class="sm">fault_probability ← 0.97 (set at +38 ms)</text>
  </g>

  <!-- Track 3: RMS backup detector every 1 ms -->
  <text x="32" y="232" class="eb">RMS BACKUP DETECTOR · 1 kHz</text>
  <text x="32" y="244" class="nm">deterministic, in-loop</text>
  <text x="32" y="256" class="sm">trips fault_flag on threshold</text>

  <g>
    <line x1="60" y1="270" x2="640" y2="270" stroke="#4a4540" stroke-width="0.75"/>
    <!-- Sample points at every 1 ms - draw as a step curve with small ticks below the line, going up after threshold trip at t=2 ms -->
    <g fill="#4a4540">
      <rect x="60"   y="266" width="2" height="8"/>
      <rect x="69.7" y="266" width="2" height="8"/>
      <rect x="79.3" y="266" width="2" height="8"/>
      <rect x="89.0" y="266" width="2" height="8"/>
      <rect x="98.7" y="266" width="2" height="8"/>
      <rect x="108.3" y="266" width="2" height="8"/>
      <rect x="118.0" y="266" width="2" height="8"/>
      <rect x="127.7" y="266" width="2" height="8"/>
      <rect x="137.3" y="266" width="2" height="8"/>
      <rect x="147.0" y="266" width="2" height="8"/>
      <rect x="156.7" y="266" width="2" height="8"/>
      <rect x="166.3" y="266" width="2" height="8"/>
      <rect x="176.0" y="266" width="2" height="8"/>
      <rect x="185.7" y="266" width="2" height="8"/>
      <rect x="195.3" y="266" width="2" height="8"/>
      <rect x="205.0" y="266" width="2" height="8"/>
      <rect x="214.7" y="266" width="2" height="8"/>
      <rect x="224.3" y="266" width="2" height="8"/>
      <rect x="234.0" y="266" width="2" height="8"/>
      <rect x="243.7" y="266" width="2" height="8"/>
      <rect x="253.3" y="266" width="2" height="8"/>
      <rect x="263.0" y="266" width="2" height="8"/>
      <rect x="272.7" y="266" width="2" height="8"/>
      <rect x="282.3" y="266" width="2" height="8"/>
      <rect x="292.0" y="266" width="2" height="8"/>
      <rect x="301.7" y="266" width="2" height="8"/>
      <rect x="311.3" y="266" width="2" height="8"/>
      <rect x="321.0" y="266" width="2" height="8"/>
      <rect x="330.7" y="266" width="2" height="8"/>
      <rect x="340.3" y="266" width="2" height="8"/>
      <rect x="350.0" y="266" width="2" height="8"/>
    </g>
    <!-- detection point at t=2 ms -> x = 60 + 2*9.67 = 79.3 -->
    <circle cx="79.3" cy="270" r="5" fill="#2a1a0e"/>
    <text x="84" y="262" class="sm">fault_flag ← true (at +2 ms)</text>
  </g>

  <!-- Vertical event lines -->
  <!-- t=0 fault onset, x=60 -->
  <line x1="60" y1="76" x2="60" y2="320" stroke="#2a1a0e" stroke-width="1.5"/>
  <text x="60" y="72" text-anchor="middle" class="nm">fault onset</text>

  <!-- t=2 ms RMS trip -->
  <line x1="79.3" y1="296" x2="79.3" y2="320" stroke="#2a1a0e" stroke-width="1" stroke-dasharray="3 2"/>
  <text x="79.3" y="312" text-anchor="start" class="sm" transform="rotate(0 79.3 312)"> </text>

  <!-- t=5 ms deadline -->
  <line x1="108.3" y1="76" x2="108.3" y2="320" stroke="#2a1a0e" stroke-width="1" stroke-dasharray="4 3"/>
  <text x="108.3" y="72" text-anchor="middle" class="nm">5 ms deadline</text>

  <!-- t=38 ms AI signal -->
  <line x1="427" y1="76" x2="427" y2="320" stroke="#4a4540" stroke-width="1" stroke-dasharray="3 2"/>
  <text x="427" y="72" text-anchor="middle" class="sm">AI advisory · +38 ms</text>

  <!-- Outcome annotation -->
  <rect x="60" y="384" width="580" height="32" fill="#f5f2ee" stroke="#2a1a0e"/>
  <text x="76" y="404" class="lb">shutdown triggered by RMS at +2 ms — well inside the 5 ms budget.</text>
  <text x="76" y="416" class="sm">AI advisory arrives at +38 ms and would have missed; it serves as early-warning on slower-developing faults, not as the guarantee.</text>

  <text x="350" y="440" text-anchor="middle" class="cap">The AI is in the system. The deadline is met by something else. That is the architecture, not a workaround.</text>
</svg>
