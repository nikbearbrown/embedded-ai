<svg viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg" font-family="Lato, Arial, sans-serif">

  <!-- Background -->
  <rect width="800" height="400" fill="#FFFFFF"/>

  <!-- Title -->
  <text x="400" y="24" text-anchor="middle" font-size="15" font-weight="bold" fill="#111111">Inference Latency vs. 100 ms Budget</text>
  <text x="400" y="42" text-anchor="middle" font-size="11" fill="#555555">50M-MAC model · log scale · three embedded targets</text>

  <!-- ═══════════════════════════════════════════════════════ -->
  <!-- BARS                                                    -->
  <!-- x=120 (10ms) to x=700 (1000ms)                        -->
  <!-- formula: x = 120 + (log10(v) - 1) × 290               -->
  <!-- ═══════════════════════════════════════════════════════ -->

  <!-- Row 1: RPi Zero 2 W — 25ms → x=235.4, fill=#111111 -->
  <rect x="120" y="100" width="115" height="28" fill="#111111"/>

  <!-- Row 2: STM32H7A3 — 250ms → x=525.4, fill=#555555 -->
  <rect x="120" y="165" width="405" height="28" fill="#555555"/>

  <!-- Row 3: STM32F411 — 830ms → x=676.5, fill=#888888 -->
  <rect x="120" y="230" width="557" height="28" fill="#888888"/>

  <!-- ═══════════════════════════════════════════════════════ -->
  <!-- LEFT LABELS                                             -->
  <!-- ═══════════════════════════════════════════════════════ -->

  <!-- RPi Zero 2 W -->
  <text x="115" y="110" text-anchor="end" font-size="10" font-weight="bold" fill="#111111">RPi Zero 2 W</text>
  <text x="115" y="123" text-anchor="end" font-size="9" fill="#555555">A53 · NEON · int8</text>

  <!-- STM32H7A3 -->
  <text x="115" y="175" text-anchor="end" font-size="10" font-weight="bold" fill="#111111">STM32H7A3</text>
  <text x="115" y="188" text-anchor="end" font-size="9" fill="#555555">M7 · 280 MHz · FPU</text>

  <!-- STM32F411 -->
  <text x="115" y="240" text-anchor="end" font-size="10" font-weight="bold" fill="#111111">STM32F411</text>
  <text x="115" y="253" text-anchor="end" font-size="9" fill="#555555">M4 · 100 MHz · FPU</text>

  <!-- ═══════════════════════════════════════════════════════ -->
  <!-- VALUE + VERDICT LABELS (right of bars)                 -->
  <!-- ═══════════════════════════════════════════════════════ -->

  <!-- RPi: 25ms PASS — bar ends at x=235, label at x=245 -->
  <text x="245" y="119" font-size="10" font-weight="bold" fill="#111111">25 ms ✓ PASS</text>

  <!-- H7A3: 250ms — bar ends at x=525, label at x=535 -->
  <text x="535" y="184" font-size="10" fill="#333333">250 ms — needs int8</text>

  <!-- F411: 830ms — bar ends at x=677, label at x=686 -->
  <text x="686" y="249" font-size="10" font-weight="bold" fill="#333333">830 ms ✗ FAIL</text>

  <!-- ═══════════════════════════════════════════════════════ -->
  <!-- BUDGET LINE at x=410 (100ms)                           -->
  <!-- ═══════════════════════════════════════════════════════ -->

  <line x1="410" y1="75" x2="410" y2="290" stroke="#333333" stroke-width="1.5" stroke-dasharray="6,4"/>
  <text x="410" y="70" text-anchor="middle" font-size="10" font-weight="bold" fill="#333333">100 ms budget</text>

  <!-- ═══════════════════════════════════════════════════════ -->
  <!-- X-AXIS                                                  -->
  <!-- ═══════════════════════════════════════════════════════ -->

  <line x1="120" y1="290" x2="700" y2="290" stroke="#333333" stroke-width="1.5"/>

  <!-- Tick at 10ms → x=120 -->
  <line x1="120" y1="290" x2="120" y2="297" stroke="#333333" stroke-width="1.5"/>
  <text x="120" y="310" text-anchor="middle" font-size="10" fill="#555555">10 ms</text>

  <!-- Tick at 100ms → x=410 -->
  <line x1="410" y1="290" x2="410" y2="297" stroke="#333333" stroke-width="1.5"/>
  <text x="410" y="310" text-anchor="middle" font-size="10" fill="#555555">100 ms</text>

  <!-- Tick at 1000ms → x=700 -->
  <line x1="700" y1="290" x2="700" y2="297" stroke="#333333" stroke-width="1.5"/>
  <text x="700" y="310" text-anchor="middle" font-size="10" fill="#555555">1000 ms</text>

  <!-- X-axis label -->
  <text x="410" y="330" text-anchor="middle" font-size="10" fill="#555555">Latency (log scale)</text>

  <!-- ═══════════════════════════════════════════════════════ -->
  <!-- CAPTION                                                 -->
  <!-- ═══════════════════════════════════════════════════════ -->

  <text x="400" y="370" text-anchor="middle" font-size="10" fill="#777777">Figure 2-2. Inference latency on three targets. RPi Zero 2 W meets the 100 ms budget; STM32H7A3 needs int8/SIMD; STM32F411 misses by 8×.</text>

</svg>
