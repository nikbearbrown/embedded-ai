  <text x="62" y="214" text-anchor="end" class="axis">1-2 cycles</text>
  <text x="62" y="290" text-anchor="end" class="axis">10-50 cycles</text>
  <text x="62" y="380" text-anchor="end" class="axis">100s cycles</text>

  <g id="row-registers">
    <line x1="96" y1="144" x2="860" y2="144" class="guide"/>
    <text x="142" y="138" class="tier-name">Registers</text>
    <text x="142" y="156" class="small">bytes to words</text>
    <rect x="322" y="127" width="88" height="34" class="bar" fill="#C8102E"/>
    <text x="660" y="138" class="body">Active working set</text>
    <text x="660" y="156" class="small">fastest access; compiler and CPU owned</text>
  </g>

  <g id="row-sram">
    <line x1="96" y1="212" x2="860" y2="212" class="guide"/>
    <text x="142" y="206" class="tier-name">SRAM</text>
    <text x="142" y="224" class="small">64 KB-2 MB</text>
    <rect x="322" y="187" width="146" height="50" class="bar" fill="#000000"/>
    <text x="660" y="206" class="body">Stack, heap, activations</text>
    <text x="660" y="224" class="small">DMA scratch; volatile runtime state</text>
  </g>

  <g id="row-flash">
    <line x1="96" y1="290" x2="860" y2="290" class="guide"/>
