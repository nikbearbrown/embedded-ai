<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 420" role="img" aria-labelledby="t01 d01">
  <title id="t01">Embedded memory hierarchy pyramid — registers, SRAM, flash, external memory</title>
  <desc id="d01">A four-tier pyramid showing register file at the apex, SRAM beneath it, on-chip flash next, and external PSRAM or SDRAM at the base. Each tier labeled with size range, access latency, volatility, and what lives there.</desc>
  <defs>
    <style>
      .ti { font-family: 'EB Garamond', Georgia, 'Times New Roman', serif; font-size: 14px; font-weight: bold; fill: #2a1a0e; }
      .lb { font-family: 'EB Garamond', Georgia, 'Times New Roman', serif; font-size: 11px; fill: #2a1a0e; }
      .sm { font-family: 'EB Garamond', Georgia, 'Times New Roman', serif; font-size: 10px; fill: #4a4540; }
      .cap { font-family: 'EB Garamond', Georgia, 'Times New Roman', serif; font-size: 10px; font-style: italic; fill: #4a4540; }
      .ax { font-family: 'EB Garamond', Georgia, 'Times New Roman', serif; font-size: 10px; fill: #4a4540; }
    </style>
    <marker id="ar1" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#2a1a0e"/>
    </marker>
  </defs>
  <rect width="700" height="420" fill="#fdfcfb"/>

  <text x="32" y="28" class="ti">Embedded memory hierarchy</text>
  <text x="32" y="44" class="sm">faster, smaller, more expensive per byte at the top</text>

  <!-- pyramid centered around x=300; tiers stacked top to bottom -->
  <!-- tier 1: registers (apex) -->
  <polygon points="280,70 320,70 330,110 270,110" fill="#2a1a0e"/>
  <text x="300" y="93" text-anchor="middle" class="lb" fill="#fdfcfb">REGISTERS</text>

  <!-- tier 2: SRAM -->
  <polygon points="270,110 330,110 360,180 240,180" fill="#4a4540"/>
  <text x="300" y="138" text-anchor="middle" class="lb" fill="#fdfcfb">SRAM</text>
  <text x="300" y="154" text-anchor="middle" class="sm" fill="#fdfcfb">64 KB – 2 MB · 1–2 cycle</text>
  <text x="300" y="168" text-anchor="middle" class="sm" fill="#fdfcfb">volatile · writable</text>

  <!-- tier 3: on-chip flash -->
  <polygon points="240,180 360,180 400,270 200,270" fill="#8a8480"/>
  <text x="300" y="210" text-anchor="middle" class="lb" fill="#fdfcfb">ON-CHIP FLASH</text>
  <text x="300" y="226" text-anchor="middle" class="sm" fill="#fdfcfb">512 KB – 2 MB · 10–50 cycle</text>
  <text x="300" y="240" text-anchor="middle" class="sm" fill="#fdfcfb">non-volatile · ~100K erase</text>
  <text x="300" y="254" text-anchor="middle" class="sm" fill="#fdfcfb">read-only at runtime</text>

  <!-- tier 4: external memory -->
  <polygon points="200,270 400,270 450,360 150,360" fill="#c8c4c0"/>
  <text x="300" y="300" text-anchor="middle" class="lb">EXTERNAL PSRAM / SDRAM</text>
  <text x="300" y="316" text-anchor="middle" class="sm">MB – GB · 10–50× SRAM latency</text>
  <text x="300" y="330" text-anchor="middle" class="sm">overflow capacity · BOM + power cost</text>

  <!-- left side: latency axis -->
  <line x1="80" y1="70" x2="80" y2="360" stroke="#8a8480" stroke-width="1" marker-end="url(#ar1)"/>
  <text x="80" y="60" text-anchor="middle" class="ax">latency ↓</text>
  <text x="68" y="90" text-anchor="end" class="sm">1 cycle</text>
  <text x="68" y="148" text-anchor="end" class="sm">1–2 cy</text>
  <text x="68" y="220" text-anchor="end" class="sm">10–50 cy</text>
  <text x="68" y="320" text-anchor="end" class="sm">100s cy</text>

  <!-- right side: what lives where -->
  <text x="490" y="92" class="lb">working set</text>
  <line x1="330" y1="90" x2="488" y2="90" stroke="#4a4540" stroke-dasharray="2 3" stroke-width="0.75"/>

  <text x="490" y="148" class="lb">stack / heap / activations</text>
  <text x="490" y="162" class="sm">DMA + scratch buffers</text>
  <line x1="360" y1="145" x2="488" y2="145" stroke="#4a4540" stroke-dasharray="2 3" stroke-width="0.75"/>

  <text x="490" y="218" class="lb">firmware + model weights</text>
  <text x="490" y="232" class="sm">biases + activation LUTs</text>
  <line x1="395" y1="215" x2="488" y2="215" stroke="#4a4540" stroke-dasharray="2 3" stroke-width="0.75"/>

  <text x="490" y="308" class="lb">overflow weights / buffers</text>
  <text x="490" y="322" class="sm">when on-chip cannot fit</text>
  <line x1="445" y1="305" x2="488" y2="305" stroke="#4a4540" stroke-dasharray="2 3" stroke-width="0.75"/>

  <!-- caption -->
  <text x="350" y="395" text-anchor="middle" class="cap">Each tier trades latency and cost for capacity; the embedded-AI question is which artifact lives in which tier.</text>
</svg>
