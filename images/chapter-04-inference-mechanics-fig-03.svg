<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 460" role="img" aria-labelledby="t03 d03">
  <title id="t03">Cycles per memory access by tier</title>
  <desc id="d03">Horizontal bar chart showing approximate cycles per access for registers, L1 cache, on-chip SRAM, external PSRAM, and flash (XIP), with accesses-per-MAC figures for a 3x3 conv layer, on Cortex-M class processors.</desc>
  <defs>
    <style>
      .ti  { font-family: Lato, 'Helvetica Neue', Arial, sans-serif; font-size: 14px; font-weight: bold; fill: #111111; }
      .hd  { font-family: Lato, 'Helvetica Neue', Arial, sans-serif; font-size: 11px; font-weight: bold; fill: #111111; }
      .lb  { font-family: Lato, 'Helvetica Neue', Arial, sans-serif; font-size: 11px; fill: #111111; }
      .val { font-family: Lato, 'Helvetica Neue', Arial, sans-serif; font-size: 11px; font-weight: bold; fill: #111111; }
      .sm  { font-family: Lato, 'Helvetica Neue', Arial, sans-serif; font-size: 10px; fill: #555555; }
      .nm  { font-family: Lato, 'Helvetica Neue', Arial, sans-serif; font-size: 10px; font-style: italic; fill: #555555; }
      .cap { font-family: Lato, 'Helvetica Neue', Arial, sans-serif; font-size: 11px; font-style: italic; fill: #555555; }
    </style>
  </defs>
  <rect width="720" height="460" fill="#FFFFFF"/>

  <text x="24" y="30" class="ti">Cycles per memory access — by tier</text>
  <text x="24" y="48" class="sm">approximate values on Cortex-M class processors; 3x3 conv reference: 9 input reads per output pixel</text>

  <!-- column headers -->
  <text x="158" y="76" class="sm">tier</text>
  <text x="184" y="76" class="sm">cycles per access (log-like scale, max 20)</text>
  <text x="492" y="76" class="sm">accesses/MAC</text>
  <text x="562" y="76" class="sm">in a 3x3 conv layer</text>

  <!-- vertical divider between bar area and right columns -->
  <line x1="160" y1="82" x2="160" y2="372" stroke="#BBBBBB" stroke-width="0.75"/>

  <!-- Row: registers -->
  <text x="155" y="106" text-anchor="end" class="lb">registers</text>
  <rect x="160" y="94" width="4" height="18" fill="#111111"/>
  <text x="170" y="107" class="val">~0</text>
  <text x="492" y="107" class="lb">0 (held)</text>
  <text x="562" y="107" class="sm">reused while in registers</text>

  <!-- Row: L1 cache -->
  <text x="155" y="142" text-anchor="end" class="lb">L1 cache</text>
  <rect x="160" y="130" width="24" height="18" fill="#333333"/>
  <text x="190" y="143" class="val">1-2</text>
  <text x="492" y="143" class="lb">0.1-0.3</text>
  <text x="562" y="143" class="sm">when tiles fit (M7 + L1, blocked)</text>

  <!-- Row: on-chip SRAM -->
  <text x="155" y="178" text-anchor="end" class="lb">on-chip SRAM</text>
  <rect x="160" y="166" width="48" height="18" fill="#555555"/>
  <text x="214" y="179" class="val">2-4</text>
  <text x="492" y="179" class="lb">1-3</text>
  <text x="562" y="179" class="sm">typical M4 / M7 activation path</text>

  <!-- Row: external PSRAM (widest bar — darkest to show cost) -->
  <text x="155" y="214" text-anchor="end" class="lb">external PSRAM</text>
  <rect x="160" y="202" width="240" height="18" fill="#888888"/>
  <text x="406" y="215" class="val">10-20</text>
  <text x="492" y="215" class="lb">3-6 (spill)</text>
  <text x="562" y="215" class="sm">where the order-of-magnitude lives</text>

  <!-- Row: flash XIP (striped to show variability) -->
  <text x="155" y="250" text-anchor="end" class="lb">flash (XIP)</text>
  <rect x="160" y="238" width="160" height="18" fill="#666666"/>
  <rect x="320" y="238" width="60"  height="18" fill="#BBBBBB"/>
  <text x="386" y="251" class="val">5-20 (variable)</text>
  <text x="492" y="251" class="lb">— (weights)</text>
  <text x="562" y="251" class="sm">weights live here; activations should not</text>

  <!-- x-axis -->
  <line x1="160" y1="278" x2="480" y2="278" stroke="#555555" stroke-width="0.7"/>
  <line x1="160" y1="276" x2="160" y2="282" stroke="#555555"/>
  <text x="160" y="296" text-anchor="middle" class="sm">0</text>
  <line x1="240" y1="276" x2="240" y2="282" stroke="#555555"/>
  <text x="240" y="296" text-anchor="middle" class="sm">5</text>
  <line x1="320" y1="276" x2="320" y2="282" stroke="#555555"/>
  <text x="320" y="296" text-anchor="middle" class="sm">10</text>
  <line x1="400" y1="276" x2="400" y2="282" stroke="#555555"/>
  <text x="400" y="296" text-anchor="middle" class="sm">15</text>
  <line x1="480" y1="276" x2="480" y2="282" stroke="#555555"/>
  <text x="480" y="296" text-anchor="middle" class="sm">20</text>
  <text x="320" y="312" text-anchor="middle" class="sm">cycles per access</text>

  <!-- two callout boxes -->
  <rect x="20" y="336" width="320" height="72" fill="none" stroke="#888888" stroke-width="0.8"/>
  <text x="32" y="356" class="hd">why activation placement decides everything</text>
  <text x="32" y="373" class="sm">96 x 96 x 32 x 9 x 32 = ~84 M accesses in one conv layer.</text>
  <text x="32" y="389" class="sm">at 15 cyc/access in PSRAM, that is ~12.6 s of memory traffic.</text>

  <rect x="380" y="336" width="320" height="72" fill="none" stroke="#AAAAAA" stroke-width="0.7"/>
  <text x="392" y="356" class="hd">two checks before optimization</text>
  <text x="392" y="373" class="sm">1. count accesses per MAC for the dominant layer.</text>
  <text x="392" y="389" class="sm">2. confirm where each tensor lives at run time.</text>

  <text x="360" y="440" text-anchor="middle" class="cap">The compute did not change. The memory pattern did, and the memory pattern is what dominated.</text>
</svg>
