<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 480" role="img" aria-labelledby="t05 d05">
  <title id="t05">YOLO on a Pi Zero, a Coral TPU, and a Zynq FPGA</title>
  <desc id="d05">Three small-multiples panels compare three deployments of a YOLO object-detection model. Each panel shows cost, power, and latency bars. Pi Zero 2 W: $15, 1.5 W, 2500 ms. Coral Edge TPU: $60, 2 W, 25 ms. Zynq-7020 FPGA: $150, 3 W, 15 ms.</desc>
  <defs>
    <style>
      .ti  { font-family: Lato, 'Helvetica Neue', Arial, sans-serif; font-size: 13px; font-weight: bold; fill: #111111; }
      .lb  { font-family: Lato, 'Helvetica Neue', Arial, sans-serif; font-size: 11px; fill: #111111; }
      .sm  { font-family: Lato, 'Helvetica Neue', Arial, sans-serif; font-size: 10px; fill: #555555; }
      .cap { font-family: Lato, 'Helvetica Neue', Arial, sans-serif; font-size: 10px; font-style: italic; fill: #555555; }
      .val { font-family: Lato, 'Helvetica Neue', Arial, sans-serif; font-size: 11px; font-weight: bold; fill: #111111; }
    </style>
    <marker id="ar" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#111111"/>
    </marker>
  </defs>
  <rect width="700" height="480" fill="#FFFFFF"/>

  <text x="32" y="32" class="ti">Same YOLO model — three platforms</text>
  <text x="32" y="48" class="sm">cost · power · latency per frame (latency bars on log scale: 10–10 000 ms)</text>

  <!-- ── PANEL 1: Raspberry Pi Zero 2 W ── -->
  <rect x="36" y="72" width="196" height="320" fill="none" stroke="#BBBBBB" stroke-width="0.75"/>
  <text x="134" y="92"  text-anchor="middle" class="lb">Pi Zero 2 W</text>
  <text x="134" y="108" text-anchor="middle" class="sm">CPU-only · quad A53 1 GHz</text>

  <!-- cost bar baseline 56..220, max $200 -->
  <text x="60"  y="140" class="sm">cost</text>
  <text x="220" y="140" text-anchor="end" class="val">$15</text>
  <line x1="60" y1="150" x2="220" y2="150" stroke="#DDDDDD" stroke-width="0.5"/>
  <rect x="60" y="142" width="12" height="10" fill="#AAAAAA"/>

  <!-- power bar, max 3.5 W → 160 px wide -->
  <text x="60"  y="190" class="sm">power</text>
  <text x="220" y="190" text-anchor="end" class="val">1.5 W</text>
  <line x1="60" y1="200" x2="220" y2="200" stroke="#DDDDDD" stroke-width="0.5"/>
  <rect x="60" y="192" width="68" height="10" fill="#666666"/>

  <!-- latency bar log scale (10–10000 ms = 4 decades = 160 px), 2500 ms: (log10(2500)-1)*160/3 = 1.398*53.3 = 74.5 px from 10 ms start; but use full bar width: log10(2500/10)/log10(1000) * 160 = 2.398/3 *160 = 127.9 px -->
  <text x="60"  y="240" class="sm">latency</text>
  <text x="220" y="240" text-anchor="end" class="val">2500 ms</text>
  <line x1="60" y1="250" x2="220" y2="250" stroke="#DDDDDD" stroke-width="0.5"/>
  <rect x="60" y="242" width="128" height="10" fill="#111111"/>

  <text x="134" y="330" text-anchor="middle" class="sm">fails real-time</text>
  <text x="134" y="346" text-anchor="middle" class="sm">cheapest · slowest</text>

  <!-- ── PANEL 2: Coral Edge TPU + A53 (highlighted) ── -->
  <rect x="252" y="72" width="196" height="320" fill="none" stroke="#111111" stroke-width="1.75"/>
  <text x="350" y="92"  text-anchor="middle" class="lb">Coral Edge TPU + A53</text>
  <text x="350" y="108" text-anchor="middle" class="sm">NPU · dedicated inference engine</text>

  <text x="276" y="140" class="sm">cost</text>
  <text x="436" y="140" text-anchor="end" class="val">$60</text>
  <line x1="276" y1="150" x2="436" y2="150" stroke="#DDDDDD" stroke-width="0.5"/>
  <rect x="276" y="142" width="48" height="10" fill="#AAAAAA"/>

  <text x="276" y="190" class="sm">power</text>
  <text x="436" y="190" text-anchor="end" class="val">2 W</text>
  <line x1="276" y1="200" x2="436" y2="200" stroke="#DDDDDD" stroke-width="0.5"/>
  <rect x="276" y="192" width="91" height="10" fill="#666666"/>

  <!-- latency 25 ms: log10(25/10)/log10(1000) * 160 = 0.398/3 *160 = 21 px -->
  <text x="276" y="240" class="sm">latency</text>
  <text x="436" y="240" text-anchor="end" class="val">25 ms</text>
  <line x1="276" y1="250" x2="436" y2="250" stroke="#DDDDDD" stroke-width="0.5"/>
  <rect x="276" y="242" width="21" height="10" fill="#111111"/>

  <text x="350" y="325" text-anchor="middle" class="lb">commercial sweet spot</text>
  <text x="350" y="341" text-anchor="middle" class="sm">100× CPU · 4× cost · off-the-shelf</text>

  <!-- ── PANEL 3: Zynq-7020 FPGA ── -->
  <rect x="468" y="72" width="196" height="320" fill="none" stroke="#BBBBBB" stroke-width="0.75"/>
  <text x="566" y="92"  text-anchor="middle" class="lb">Zynq-7020 FPGA</text>
  <text x="566" y="108" text-anchor="middle" class="sm">custom YOLO accelerator in fabric</text>

  <text x="492" y="140" class="sm">cost</text>
  <text x="652" y="140" text-anchor="end" class="val">$150</text>
  <line x1="492" y1="150" x2="652" y2="150" stroke="#DDDDDD" stroke-width="0.5"/>
  <rect x="492" y="142" width="120" height="10" fill="#AAAAAA"/>

  <text x="492" y="190" class="sm">power</text>
  <text x="652" y="190" text-anchor="end" class="val">3 W</text>
  <line x1="492" y1="200" x2="652" y2="200" stroke="#DDDDDD" stroke-width="0.5"/>
  <rect x="492" y="192" width="137" height="10" fill="#666666"/>

  <!-- latency 15 ms: log10(15/10)/log10(1000) * 160 = 0.176/3 *160 = 9.4 px -->
  <text x="492" y="240" class="sm">latency</text>
  <text x="652" y="240" text-anchor="end" class="val">15 ms</text>
  <line x1="492" y1="250" x2="652" y2="250" stroke="#DDDDDD" stroke-width="0.5"/>
  <rect x="492" y="242" width="9" height="10" fill="#111111"/>

  <text x="566" y="330" text-anchor="middle" class="sm">1.7× faster than TPU</text>
  <text x="566" y="346" text-anchor="middle" class="sm">2.5× cost · 6 months HDL work</text>

  <!-- Callout below panel 2 -->
  <path d="M 350 392 L 350 414" fill="none" stroke="#111111" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#ar)"/>
  <text x="350" y="430" text-anchor="middle" class="lb">cheapest path through cost · power · latency</text>

  <!-- Caption -->
  <text x="350" y="458" text-anchor="middle" class="cap">The FPGA wins on latency. The TPU wins on every other dimension. The constraint shape chooses the answer.</text>
</svg>
