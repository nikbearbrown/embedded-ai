<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 440" role="img" aria-labelledby="t04 d04">
  <title id="t04">Three inference scheduling patterns over a 60-second window</title>
  <desc id="d04">Three parallel timelines. Periodic: evenly spaced inference spikes every 10 seconds. Event-driven: long sleep punctuated by a single PIR-triggered burst. Adaptive: dense spikes during a high-activity region, sparse spikes elsewhere.</desc>
  <defs>
    <style>
      .ti   { font-family: Lato, 'Helvetica Neue', Arial, sans-serif; font-size: 13px; font-weight: bold; fill: #111111; }
      .lb   { font-family: Lato, 'Helvetica Neue', Arial, sans-serif; font-size: 11px; fill: #333333; }
      .sm   { font-family: Lato, 'Helvetica Neue', Arial, sans-serif; font-size: 10px; fill: #555555; }
      .cap  { font-family: Lato, 'Helvetica Neue', Arial, sans-serif; font-size: 10px; font-style: italic; fill: #555555; }
      .role { font-family: Lato, 'Helvetica Neue', Arial, sans-serif; font-size: 10px; font-style: italic; fill: #666666; }
    </style>
    <marker id="ar4" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#333333"/>
    </marker>
  </defs>
  <rect width="700" height="440" fill="#FFFFFF"/>
  <text x="350" y="28" text-anchor="middle" class="ti">Three scheduling patterns — same 60-second window</text>

  <!-- x scale: 60 s → x from 110 to 670 (560 px), 1 s = 9.33 px -->

  <!-- PERIODIC row — baseline y=125 -->
  <text x="32" y="98"  class="lb">Periodic</text>
  <text x="32" y="112" class="sm">every 10 s</text>
  <text x="32" y="126" class="role">avg ≈ 0.85 mA</text>
  <line x1="110" y1="125" x2="670" y2="125" stroke="#888888" stroke-width="1"/>
  <!-- spikes at t = 5, 15, 25, 35, 45, 55 s -->
  <rect x="156" y="82" width="5" height="43" fill="#333333"/>
  <rect x="249" y="82" width="5" height="43" fill="#333333"/>
  <rect x="342" y="82" width="5" height="43" fill="#333333"/>
  <rect x="435" y="82" width="5" height="43" fill="#333333"/>
  <rect x="528" y="82" width="5" height="43" fill="#333333"/>
  <rect x="621" y="82" width="5" height="43" fill="#333333"/>
  <text x="390" y="74" text-anchor="middle" class="sm">fixed-interval · simple, predictable</text>

  <!-- separator -->
  <line x1="110" y1="148" x2="670" y2="148" stroke="#DDDDDD" stroke-width="0.75"/>

  <!-- EVENT-DRIVEN row — baseline y=235 -->
  <text x="32" y="208" class="lb">Event-driven</text>
  <text x="32" y="222" class="sm">PIR wake</text>
  <text x="32" y="236" class="role">avg ≈ 0.06 mA</text>
  <line x1="110" y1="235" x2="670" y2="235" stroke="#888888" stroke-width="1"/>
  <!-- PIR continuous poll dashed line -->
  <line x1="110" y1="232" x2="670" y2="232" stroke="#AAAAAA" stroke-width="0.7" stroke-dasharray="2 3"/>
  <text x="590" y="222" text-anchor="middle" class="sm">PIR @ 50 µA</text>
  <!-- single spike at t=28 s -->
  <rect x="371" y="192" width="5" height="43" fill="#333333"/>
  <path d="M 373 180 L 373 194" fill="none" stroke="#333333" stroke-width="1" marker-end="url(#ar4)"/>
  <text x="373" y="174" text-anchor="middle" class="sm">wake</text>

  <!-- separator -->
  <line x1="110" y1="258" x2="670" y2="258" stroke="#DDDDDD" stroke-width="0.75"/>

  <!-- ADAPTIVE row — baseline y=345 -->
  <text x="32" y="318" class="lb">Adaptive</text>
  <text x="32" y="332" class="sm">context-driven</text>
  <text x="32" y="346" class="role">avg ≈ 0.35 mA</text>
  <line x1="110" y1="345" x2="670" y2="345" stroke="#888888" stroke-width="1"/>
  <!-- high-activity shaded region t=20..40 -->
  <rect x="297" y="302" width="187" height="43" fill="#BBBBBB" fill-opacity="0.5"/>
  <text x="390" y="296" text-anchor="middle" class="sm">high-activity window</text>
  <!-- dense spikes inside: t=22,25,28,31,34,37 -->
  <rect x="315" y="302" width="4" height="43" fill="#333333"/>
  <rect x="343" y="302" width="4" height="43" fill="#333333"/>
  <rect x="371" y="302" width="4" height="43" fill="#333333"/>
  <rect x="399" y="302" width="4" height="43" fill="#333333"/>
  <rect x="427" y="302" width="4" height="43" fill="#333333"/>
  <rect x="455" y="302" width="4" height="43" fill="#333333"/>
  <!-- sparse spikes outside: t=6, t=50 -->
  <rect x="166" y="302" width="4" height="43" fill="#777777"/>
  <rect x="576" y="302" width="4" height="43" fill="#777777"/>

  <!-- shared x axis -->
  <line x1="110" y1="375" x2="670" y2="375" stroke="#888888"/>
  <text x="110" y="390" text-anchor="middle" class="sm">0</text>
  <text x="203" y="390" text-anchor="middle" class="sm">10</text>
  <text x="296" y="390" text-anchor="middle" class="sm">20</text>
  <text x="389" y="390" text-anchor="middle" class="sm">30</text>
  <text x="482" y="390" text-anchor="middle" class="sm">40</text>
  <text x="575" y="390" text-anchor="middle" class="sm">50</text>
  <text x="670" y="390" text-anchor="middle" class="sm">60 s</text>

  <!-- caption -->
  <text x="350" y="414" text-anchor="middle" class="cap">Event-driven wins when interesting moments are rare. Adaptive wins when they cluster. Periodic is the safe default for continuous-stream applications.</text>
</svg>
