<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 420" role="img" aria-labelledby="t04 d04">
  <title id="t04">Three inference scheduling patterns over a 60-second window</title>
  <desc id="d04">Three parallel timelines. Periodic: evenly spaced inference spikes every 10 seconds. Event-driven: long sleep punctuated by a single PIR-triggered burst. Adaptive: dense spikes during a shaded high-activity region, sparse spikes elsewhere.</desc>
  <defs>
    <style>
      .ti { font-family: 'EB Garamond', Georgia, 'Times New Roman', serif; font-size: 13px; font-weight: bold; fill: #2a1a0e; }
      .lb { font-family: 'EB Garamond', Georgia, 'Times New Roman', serif; font-size: 11px; fill: #2a1a0e; }
      .sm { font-family: 'EB Garamond', Georgia, 'Times New Roman', serif; font-size: 10px; fill: #4a4540; }
      .cap { font-family: 'EB Garamond', Georgia, 'Times New Roman', serif; font-size: 10px; font-style: italic; fill: #4a4540; }
      .role { font-family: 'EB Garamond', Georgia, 'Times New Roman', serif; font-size: 11px; font-style: italic; fill: #4a4540; }
    </style>
    <marker id="ar4" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#2a1a0e"/>
    </marker>
  </defs>
  <rect width="700" height="420" fill="#fdfcfb"/>
  <text x="350" y="28" text-anchor="middle" class="ti">Three scheduling patterns — same 60-second window</text>

  <!-- common x scale: 60 s → x from 110 to 670 (560 px), so 1 s = 9.33 px -->
  <!-- three rows, baselines at y = 110, 220, 330; each lane is 60 px tall -->

  <!-- PERIODIC row -->
  <text x="32" y="100" class="lb">Periodic</text>
  <text x="32" y="116" class="sm">every 10 s</text>
  <text x="32" y="134" class="role">average ≈ 0.85 mA</text>
  <line x1="110" y1="125" x2="670" y2="125" stroke="#4a4540" stroke-width="1"/>
  <!-- spikes at t = 5, 15, 25, 35, 45, 55 s -->
  <rect x="156"  y="80" width="4" height="45" fill="#2a1a0e"/>
  <rect x="249"  y="80" width="4" height="45" fill="#2a1a0e"/>
  <rect x="342"  y="80" width="4" height="45" fill="#2a1a0e"/>
  <rect x="435"  y="80" width="4" height="45" fill="#2a1a0e"/>
  <rect x="528"  y="80" width="4" height="45" fill="#2a1a0e"/>
  <rect x="621"  y="80" width="4" height="45" fill="#2a1a0e"/>
  <text x="346" y="74" text-anchor="middle" class="sm">fixed-interval inference · simple, predictable</text>

  <!-- EVENT-DRIVEN row -->
  <text x="32" y="210" class="lb">Event-driven</text>
  <text x="32" y="226" class="sm">PIR wake</text>
  <text x="32" y="244" class="role">average ≈ 0.06 mA</text>
  <line x1="110" y1="235" x2="670" y2="235" stroke="#4a4540" stroke-width="1"/>
  <!-- only one spike at t = 28 s -->
  <rect x="371" y="190" width="4" height="45" fill="#2a1a0e"/>
  <!-- wake arrow above spike -->
  <path d="M 373 178 L 373 192" fill="none" stroke="#2a1a0e" stroke-width="1" marker-end="url(#ar4)"/>
  <text x="373" y="172" text-anchor="middle" class="sm">wake</text>
  <!-- tiny PIR poll line at the bottom of the lane -->
  <line x1="110" y1="232" x2="670" y2="232" stroke="#8a8480" stroke-width="0.6" stroke-dasharray="2 3"/>
  <text x="600" y="220" text-anchor="middle" class="sm">PIR @ 50 µA (continuous)</text>

  <!-- ADAPTIVE row -->
  <text x="32" y="320" class="lb">Adaptive</text>
  <text x="32" y="336" class="sm">context-driven</text>
  <text x="32" y="354" class="role">average ≈ 0.35 mA</text>
  <line x1="110" y1="345" x2="670" y2="345" stroke="#4a4540" stroke-width="1"/>
  <!-- high-activity shaded region from t=20 to t=40 -->
  <rect x="296.6" y="300" width="186.6" height="45" fill="#c89060" fill-opacity="0.25"/>
  <text x="390" y="294" text-anchor="middle" class="sm">high-activity window</text>
  <!-- dense spikes inside window: 22,25,28,31,34,37 -->
  <rect x="315.3" y="300" width="3" height="45" fill="#2a1a0e"/>
  <rect x="343.3" y="300" width="3" height="45" fill="#2a1a0e"/>
  <rect x="371.3" y="300" width="3" height="45" fill="#2a1a0e"/>
  <rect x="399.3" y="300" width="3" height="45" fill="#2a1a0e"/>
  <rect x="427.3" y="300" width="3" height="45" fill="#2a1a0e"/>
  <rect x="455.3" y="300" width="3" height="45" fill="#2a1a0e"/>
  <!-- sparse spikes outside window: 6, 50 -->
  <rect x="166" y="300" width="3" height="45" fill="#2a1a0e"/>
  <rect x="576" y="300" width="3" height="45" fill="#2a1a0e"/>

  <!-- shared x axis -->
  <line x1="110" y1="375" x2="670" y2="375" stroke="#8a8480"/>
  <text x="110" y="390" text-anchor="middle" class="sm">0</text>
  <text x="203" y="390" text-anchor="middle" class="sm">10</text>
  <text x="296" y="390" text-anchor="middle" class="sm">20</text>
  <text x="389" y="390" text-anchor="middle" class="sm">30</text>
  <text x="482" y="390" text-anchor="middle" class="sm">40</text>
  <text x="575" y="390" text-anchor="middle" class="sm">50</text>
  <text x="670" y="390" text-anchor="middle" class="sm">60 s</text>

  <!-- caption -->
  <text x="350" y="412" text-anchor="middle" class="cap">Event-driven wins when interesting moments are rare. Adaptive wins when they cluster. Periodic is the safe default for continuous-stream applications.</text>
</svg>
