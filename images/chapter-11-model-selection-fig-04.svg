<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 495" role="img" aria-labelledby="t11d d11d">
  <title id="t11d">Pareto frontier — six face-detection candidates against latency and accuracy</title>
  <desc id="d11d">Scatter plot of latency (ms) vs accuracy (%). Six face-detection models plotted; Pareto frontier connects TinyFace, MobileNetV3-Small, MobileNetV2-0.35, and EfficientNet-Lite0. MobileNetV2-0.25 and ResNet18 are dominated. Bubble size encodes memory footprint.</desc>
  <defs>
    <style>
      .ti  { font-family: Lato, 'Helvetica Neue', Arial, sans-serif; font-size: 13px; font-weight: bold; fill: #111111; }
      .lb  { font-family: Lato, 'Helvetica Neue', Arial, sans-serif; font-size: 11px; fill: #111111; }
      .sm  { font-family: Lato, 'Helvetica Neue', Arial, sans-serif; font-size: 10px; fill: #555555; }
      .cap { font-family: Lato, 'Helvetica Neue', Arial, sans-serif; font-size: 10px; font-style: italic; fill: #666666; }
    </style>
    <marker id="ar4" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#333333"/>
    </marker>
  </defs>
  <rect width="700" height="480" fill="#FFFFFF"/>

  <text x="32" y="30" class="ti">Pareto frontier — six face-detection candidates on your hardware</text>
  <text x="32" y="46" class="sm">Bubble size ∝ memory (KB). Dashed lines mark 50, 100, 200 ms budgets.</text>

  <!-- Plot area: x=latency 0..500ms → px 80..640; y=accuracy 80..100% → px 380..80 -->
  <line x1="80" y1="80" x2="80" y2="380" stroke="#AAAAAA" stroke-width="1"/>
  <line x1="80" y1="380" x2="640" y2="380" stroke="#AAAAAA" stroke-width="1"/>

  <!-- x ticks -->
  <line x1="80"  y1="380" x2="80"  y2="385" stroke="#888888"/><text x="80"  y="397" text-anchor="middle" class="sm">0</text>
  <line x1="192" y1="380" x2="192" y2="385" stroke="#888888"/><text x="192" y="397" text-anchor="middle" class="sm">100</text>
  <line x1="304" y1="380" x2="304" y2="385" stroke="#888888"/><text x="304" y="397" text-anchor="middle" class="sm">200</text>
  <line x1="416" y1="380" x2="416" y2="385" stroke="#888888"/><text x="416" y="397" text-anchor="middle" class="sm">300</text>
  <line x1="528" y1="380" x2="528" y2="385" stroke="#888888"/><text x="528" y="397" text-anchor="middle" class="sm">400</text>
  <line x1="640" y1="380" x2="640" y2="385" stroke="#888888"/><text x="640" y="397" text-anchor="middle" class="sm">500</text>
  <text x="360" y="414" text-anchor="middle" class="sm">latency on target (ms) — lower is better</text>

  <!-- y ticks -->
  <line x1="76" y1="380" x2="80" y2="380" stroke="#888888"/><text x="72" y="383" text-anchor="end" class="sm">80</text>
  <line x1="76" y1="305" x2="80" y2="305" stroke="#888888"/><text x="72" y="308" text-anchor="end" class="sm">85</text>
  <line x1="76" y1="230" x2="80" y2="230" stroke="#888888"/><text x="72" y="233" text-anchor="end" class="sm">90</text>
  <line x1="76" y1="155" x2="80" y2="155" stroke="#888888"/><text x="72" y="158" text-anchor="end" class="sm">95</text>
  <line x1="76" y1="80"  x2="80" y2="80"  stroke="#888888"/><text x="72" y="83"  text-anchor="end" class="sm">100</text>
  <text x="32" y="230" text-anchor="middle" transform="rotate(-90 32 230)" class="sm">accuracy (%) — higher is better</text>

  <!-- Budget vertical lines -->
  <line x1="136" y1="80" x2="136" y2="380" stroke="#AAAAAA" stroke-width="0.75" stroke-dasharray="3 3"/>
  <text x="136" y="74" text-anchor="middle" class="sm">50 ms</text>
  <line x1="192" y1="80" x2="192" y2="380" stroke="#AAAAAA" stroke-width="0.75" stroke-dasharray="3 3"/>
  <text x="192" y="74" text-anchor="middle" class="sm">100 ms</text>
  <line x1="304" y1="80" x2="304" y2="380" stroke="#AAAAAA" stroke-width="0.75" stroke-dasharray="3 3"/>
  <text x="304" y="74" text-anchor="middle" class="sm">200 ms</text>

  <!-- Pareto frontier line -->
  <polyline points="130,320 186,230 203,215 282,170" fill="none" stroke="#111111" stroke-width="1.5"/>

  <!-- Frontier bubbles (filled) -->
  <circle cx="130" cy="320" r="4"  fill="#111111"/>
  <circle cx="186" cy="230" r="7"  fill="#111111"/>
  <circle cx="203" cy="215" r="7.5" fill="#333333"/>
  <circle cx="282" cy="170" r="10" fill="#555555"/>

  <!-- Dominated bubbles (open) -->
  <circle cx="170" cy="260" r="5.5" fill="#FFFFFF" stroke="#888888" stroke-width="1.25" stroke-dasharray="3 2"/>
  <circle cx="584" cy="140" r="14"  fill="#FFFFFF" stroke="#888888" stroke-width="1.25" stroke-dasharray="3 2"/>

  <!-- Labels -->
  <text x="142" y="320" class="lb">TinyFace</text>
  <text x="142" y="332" class="sm">45 ms · 84% · 120 KB</text>

  <text x="196" y="222" class="lb">MNv3-Small</text>
  <text x="196" y="244" class="sm">95 ms · 90% · 380 KB</text>

  <text x="215" y="210" class="lb">MNv2-0.35</text>
  <text x="215" y="198" class="sm">110 ms · 91% · 420 KB</text>

  <text x="294" y="170" class="lb">EfficientNet-Lite0</text>
  <text x="294" y="184" class="sm">180 ms · 94% · 1.8 MB</text>

  <text x="182" y="272" class="sm">MNv2-0.25 (dominated)</text>
  <text x="182" y="284" class="sm">80 ms · 88% · 250 KB</text>

  <text x="558" y="133" text-anchor="end" class="sm">ResNet18 (dominated)</text>
  <text x="558" y="121" text-anchor="end" class="sm">450 ms · 96% · 11 MB</text>

  <!-- Pareto label -->
  <path d="M 380 128 L 320 158" fill="none" stroke="#333333" stroke-width="0.75" marker-end="url(#ar4)"/>
  <text x="382" y="126" class="lb">Pareto frontier</text>
  <text x="382" y="140" class="sm">choices that aren't dominated</text>

  <!-- Budget callouts -->
  <text x="88"  y="450" class="sm">≤50 ms → TinyFace only</text>
  <text x="270" y="450" class="sm">≤100 ms → MNv3-Small</text>
  <text x="460" y="450" class="sm">≤200 ms → EfficientNet-Lite0</text>

  <text x="350" y="468" text-anchor="middle" class="cap">The frontier names the choices. Which point you pick depends on which constraint binds.</text>
</svg>
