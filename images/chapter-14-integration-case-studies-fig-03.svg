<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 440" role="img" aria-labelledby="t03 d03">
  <title id="t03">Industrial energy budget — random forest fits the envelope, 1D CNN overflows it</title>
  <desc id="d03">Two stacked bars on the same axis showing how the 0.28 milliwatt average power envelope is spent. The chosen random-forest schedule at 2.5-second intervals stays inside the envelope: sleep current accounts for 0.037 milliwatts, inference accounts for 0.225 milliwatts, with small headroom. A 1D CNN evaluated at the same cadence demands roughly 1.5 milliwatts, overflowing the envelope by more than five times. The chart makes the model-rejection arithmetic visible.</desc>
  <defs>
    <style>
      .ti { font-family: 'EB Garamond', Georgia, 'Times New Roman', serif; font-size: 14px; font-weight: bold; fill: #2a1a0e; }
      .lb { font-family: 'EB Garamond', Georgia, 'Times New Roman', serif; font-size: 11px; fill: #2a1a0e; }
      .sm { font-family: 'EB Garamond', Georgia, 'Times New Roman', serif; font-size: 10px; fill: #4a4540; }
      .cap { font-family: 'EB Garamond', Georgia, 'Times New Roman', serif; font-size: 10px; font-style: italic; fill: #4a4540; }
      .nm { font-family: 'EB Garamond', Georgia, 'Times New Roman', serif; font-size: 11px; font-weight: bold; fill: #2a1a0e; }
    </style>
    <marker id="ar3" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#2a1a0e"/>
    </marker>
  </defs>
  <rect width="700" height="440" fill="#fdfcfb"/>

  <text x="32" y="30" class="ti">Industrial energy budget — what fits inside 0.28 mW, and what does not</text>
  <text x="32" y="48" class="sm">average power across an 18-month deployment on a 1,000 mAh coin-cell-class battery</text>

  <!-- y-axis: 0 to 1.6 mW, top=80, bottom=340 (260 px / 1.6 = 162.5 px per mW) -->
  <line x1="140" y1="80" x2="140" y2="340" stroke="#8a8480" stroke-width="1"/>
  <line x1="140" y1="340" x2="660" y2="340" stroke="#8a8480" stroke-width="1"/>

  <!-- y ticks at 0, 0.4, 0.8, 1.2, 1.6 -->
  <g class="sm">
    <line x1="138" y1="340" x2="140" y2="340" stroke="#4a4540"/>
    <text x="134" y="343" text-anchor="end">0</text>
    <line x1="138" y1="275" x2="140" y2="275" stroke="#4a4540"/>
    <text x="134" y="278" text-anchor="end">0.4</text>
    <line x1="138" y1="210" x2="140" y2="210" stroke="#4a4540"/>
    <text x="134" y="213" text-anchor="end">0.8</text>
    <line x1="138" y1="145" x2="140" y2="145" stroke="#4a4540"/>
    <text x="134" y="148" text-anchor="end">1.2</text>
    <line x1="138" y1="80" x2="140" y2="80" stroke="#4a4540"/>
    <text x="134" y="83" text-anchor="end">1.6</text>
  </g>
  <text x="80" y="210" text-anchor="middle" transform="rotate(-90 80 210)" class="lb">average power (mW)</text>

  <!-- Envelope line: 0.28 mW → y = 340 - 0.28*162.5 = 294.5 -->
  <line x1="140" y1="294.5" x2="660" y2="294.5" stroke="#2a1a0e" stroke-width="1.25" stroke-dasharray="6 3"/>
  <text x="655" y="290" text-anchor="end" class="nm">0.28 mW — battery envelope</text>

  <!-- Bar 1: Random forest @ 2.5 s -->
  <!-- sleep 0.037 mW: y from 340 to 340 - 0.037*162.5 = 333.99 -->
  <!-- inference 0.225 mW: stacked on top -->
  <rect x="220" y="333.99" width="140" height="6.01" fill="#c8c4c0" stroke="#8a8480" stroke-width="0.5"/>
  <rect x="220" y="297.43" width="140" height="36.56" fill="#2a1a0e"/>
  <!-- headroom slice (0.28-0.262 = 0.018 mW): from 297.43 to 294.5 -->
  <rect x="220" y="294.5" width="140" height="2.93" fill="none" stroke="#2a1a0e" stroke-width="0.5" stroke-dasharray="2 2"/>

  <text x="290" y="362" text-anchor="middle" class="nm">Random forest @ 2.5 s</text>
  <text x="290" y="376" text-anchor="middle" class="sm">25 features · 0.66 mJ per inference</text>
  <text x="290" y="390" text-anchor="middle" class="sm">200 KB flash · 5 ms runtime</text>

  <!-- Labels on bar 1 -->
  <line x1="360" y1="337" x2="395" y2="337" stroke="#4a4540" stroke-width="0.75"/>
  <text x="400" y="340" class="sm">sleep 0.037 mW (13%)</text>
  <line x1="360" y1="315" x2="395" y2="315" stroke="#4a4540" stroke-width="0.75"/>
  <text x="400" y="318" class="sm">inference 0.225 mW (80%)</text>

  <!-- Bar 2: 1D CNN @ 2.5s (overflow) -->
  <!-- sleep 0.037 mW → same 6.01 px slab -->
  <!-- 1D CNN inference ~1.46 mW total (overflow). Top y = 340 - 1.5*162.5 = 96.25 -->
  <rect x="460" y="333.99" width="140" height="6.01" fill="#c8c4c0" stroke="#8a8480" stroke-width="0.5"/>
  <rect x="460" y="96.25" width="140" height="237.74" fill="#4a4540"/>

  <text x="530" y="362" text-anchor="middle" class="nm">1D CNN @ 2.5 s</text>
  <text x="530" y="376" text-anchor="middle" class="sm">~8 mJ per inference</text>
  <text x="530" y="390" text-anchor="middle" class="sm">overflows envelope 5×</text>

  <!-- Overflow callout -->
  <path d="M 600 96 L 640 96 L 640 290 L 660 290" fill="none" stroke="#2a1a0e" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#ar3)"/>
  <text x="640" y="88" text-anchor="end" class="lb">demands ~1.5 mW · battery dies in 3 months</text>

  <!-- Headroom annotation on RF bar -->
  <path d="M 220 295 L 200 270 L 168 270" fill="none" stroke="#2a1a0e" stroke-width="0.75" marker-end="url(#ar3)"/>
  <text x="165" y="266" text-anchor="end" class="sm">≈ 7% headroom</text>

  <text x="350" y="420" text-anchor="middle" class="cap">The model that would have been more accurate cannot fit inside the milliwatts the battery can spare —</text>
  <text x="350" y="434" text-anchor="middle" class="cap">that is why the random forest, not the CNN, wins the industrial case.</text>
</svg>
