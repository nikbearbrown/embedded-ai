<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 460" role="img" aria-labelledby="t04 d04">
  <title id="t04">Accuracy versus structured pruning rate — the cliff past 70 percent</title>
  <desc id="d04">A curve showing model accuracy declining as the percentage of channels removed increases from 0 to 90 percent. The slope is gentle through 20 percent, steepens through 60 percent, and collapses past 70 percent. A shaded band marks the 20 to 40 percent sweet spot.</desc>
  <defs>
    <style>
      .ti     { font-family: Lato, 'Helvetica Neue', Arial, sans-serif; font-size: 14px; font-weight: bold; fill: #111111; }
      .lb     { font-family: Lato, 'Helvetica Neue', Arial, sans-serif; font-size: 11px; fill: #333333; }
      .sm     { font-family: Lato, 'Helvetica Neue', Arial, sans-serif; font-size: 10px; fill: #555555; }
      .nm     { font-family: Lato, 'Helvetica Neue', Arial, sans-serif; font-size: 10px; font-style: italic; fill: #555555; }
      .cap    { font-family: Lato, 'Helvetica Neue', Arial, sans-serif; font-size: 11px; font-style: italic; fill: #555555; }
      .ax-lbl { font-family: Lato, 'Helvetica Neue', Arial, sans-serif; font-size: 11px; fill: #555555; }
    </style>
    <marker id="ar" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0,8 3,0 6" fill="#555555"/>
    </marker>
  </defs>
  <rect width="700" height="450" fill="#FFFFFF"/>

  <text x="32" y="32" class="ti">Pruning accuracy curve — the cliff is real, but not where you'd guess</text>
  <text x="32" y="50" class="nm">structured channel pruning on a typical over-parameterised embedded CNN · accuracy relative to unpruned baseline</text>

  <!-- sweet spot band 20–40% — light gray -->
  <rect x="198.9" y="90" width="128.9" height="290" fill="#DDDDDD" fill-opacity="0.6"/>
  <text x="263" y="106" text-anchor="middle" class="lb">sweet spot for embedded</text>
  <text x="263" y="119" text-anchor="middle" class="sm">20–40% · barely-felt accuracy cost</text>

  <!-- cliff zone past 70% — darker gray -->
  <rect x="521.1" y="90" width="128.9" height="290" fill="#BBBBBB" fill-opacity="0.45"/>
  <text x="585" y="106" text-anchor="middle" class="lb">accuracy collapse</text>
  <text x="585" y="119" text-anchor="middle" class="sm">unless network was wildly over-built</text>

  <!-- axes -->
  <line x1="70" y1="380" x2="650" y2="380" stroke="#333333" stroke-width="1"/>
  <line x1="70" y1="90"  x2="70"  y2="380" stroke="#333333" stroke-width="1"/>

  <!-- x ticks -->
  <line x1="70"    y1="378" x2="70"    y2="382" stroke="#333333"/>
  <line x1="198.9" y1="378" x2="198.9" y2="382" stroke="#333333"/>
  <line x1="327.8" y1="378" x2="327.8" y2="382" stroke="#333333"/>
  <line x1="456.7" y1="378" x2="456.7" y2="382" stroke="#333333"/>
  <line x1="585.6" y1="378" x2="585.6" y2="382" stroke="#333333"/>
  <text x="70"    y="395" text-anchor="middle" class="sm">0%</text>
  <text x="198.9" y="395" text-anchor="middle" class="sm">20%</text>
  <text x="327.8" y="395" text-anchor="middle" class="sm">40%</text>
  <text x="456.7" y="395" text-anchor="middle" class="sm">60%</text>
  <text x="585.6" y="395" text-anchor="middle" class="sm">80%</text>
  <text x="360"   y="414" text-anchor="middle" class="ax-lbl">channels removed</text>

  <!-- y ticks -->
  <line x1="68" y1="380" x2="70" y2="380" stroke="#333333"/><text x="64" y="383" text-anchor="end" class="sm">0</text>
  <line x1="68" y1="235" x2="70" y2="235" stroke="#333333"/><text x="64" y="238" text-anchor="end" class="sm">50</text>
  <line x1="68" y1="148" x2="70" y2="148" stroke="#333333"/><text x="64" y="151" text-anchor="end" class="sm">80</text>
  <line x1="68" y1="119" x2="70" y2="119" stroke="#333333"/><text x="64" y="122" text-anchor="end" class="sm">90</text>
  <line x1="68" y1="90"  x2="70" y2="90"  stroke="#333333"/><text x="64" y="93"  text-anchor="end" class="sm">100</text>
  <text x="30" y="235" text-anchor="middle" transform="rotate(-90 30 235)" class="ax-lbl">accuracy retained (%)</text>

  <!-- acceptance threshold line -->
  <line x1="70" y1="125" x2="650" y2="125" stroke="#888888" stroke-width="1" stroke-dasharray="4 3"/>
  <text x="648" y="121" text-anchor="end" class="sm">acceptance threshold</text>

  <!-- accuracy curve -->
  <path d="M 70,90 C 110,90 134,91.5 198.9,93 C 230,94 263,97 327.8,101.6 C 360,107 392,110 456.7,119 C 490,125 521.1,139 585.6,235 C 615,275 635,310 650,322"
        fill="none" stroke="#111111" stroke-width="2.2"/>

  <!-- data points -->
  <g fill="#111111">
    <circle cx="70"    cy="90"    r="3.5"/>
    <circle cx="198.9" cy="93"    r="3.5"/>
    <circle cx="327.8" cy="101.6" r="3.5"/>
    <circle cx="456.7" cy="119"   r="3.5"/>
    <circle cx="521.1" cy="139"   r="3.5"/>
    <circle cx="585.6" cy="235"   r="3.5"/>
  </g>

  <!-- annotation callouts -->
  <path d="M 198.9 93 L 230 162" fill="none" stroke="#888888" stroke-width="0.8" stroke-dasharray="2 2"/>
  <text x="232" y="172" class="sm">first 20% costs &lt;1%</text>

  <path d="M 327.8 101.6 L 355 200" fill="none" stroke="#888888" stroke-width="0.8" stroke-dasharray="2 2"/>
  <text x="357" y="210" class="sm">next 20% costs 2–4%</text>

  <path d="M 456.7 119 L 468 248" fill="none" stroke="#888888" stroke-width="0.8" stroke-dasharray="2 2"/>
  <text x="470" y="258" class="sm">60% costs 5–10%</text>

  <path d="M 521.1 139 L 538 295" fill="none" stroke="#555555" stroke-width="0.8" stroke-dasharray="2 2" marker-end="url(#ar)"/>
  <text x="540" y="307" class="sm" font-weight="bold" fill="#444444">cliff — switch to distillation</text>

  <text x="350" y="432" text-anchor="middle" class="cap">Past 60% compression, the right move is not more pruning — it is distilling onto a smaller architecture designed to be small.</text>
</svg>
