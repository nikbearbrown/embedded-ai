<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 440" role="img" aria-labelledby="t01 d01">
  <title id="t01">Vineyard bandwidth arithmetic — 20 KB JPEG payload against LoRaWAN per-hour airtime allowance</title>
  <desc id="d01">Horizontal bars comparing the size of a single compressed grape-leaf image (20 KB) against the data volume LoRaWAN can move in one hour at the fastest spreading factor (SF7, about 50 KB per hour) and the slowest (SF12, about 3.75 KB per hour), with the 30-second duty-cycle ceiling annotated. The chart makes visible that cloud inference is physically impossible on this radio.</desc>
  <defs>
    <style>
      .ti { font-family: 'EB Garamond', Georgia, 'Times New Roman', serif; font-size: 14px; font-weight: bold; fill: #2a1a0e; }
      .lb { font-family: 'EB Garamond', Georgia, 'Times New Roman', serif; font-size: 11px; fill: #2a1a0e; }
      .sm { font-family: 'EB Garamond', Georgia, 'Times New Roman', serif; font-size: 10px; fill: #4a4540; }
      .cap { font-family: 'EB Garamond', Georgia, 'Times New Roman', serif; font-size: 10px; font-style: italic; fill: #4a4540; }
      .nm { font-family: 'EB Garamond', Georgia, 'Times New Roman', serif; font-size: 11px; font-weight: bold; fill: #2a1a0e; }
    </style>
    <marker id="ar1" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#2a1a0e"/>
    </marker>
  </defs>
  <rect width="700" height="440" fill="#fdfcfb"/>

  <text x="32" y="30" class="ti">Bandwidth-vs-payload arithmetic — why a single image cannot leave the vineyard</text>
  <text x="32" y="48" class="sm">payload size and per-hour airtime allowance, in kilobytes, on the same axis</text>

  <!-- x-axis: 0 to 60 KB, mapped 110 → 660 (550 px) -->
  <line x1="110" y1="320" x2="660" y2="320" stroke="#8a8480" stroke-width="1"/>
  <line x1="110" y1="80" x2="110" y2="320" stroke="#8a8480" stroke-width="1"/>
  <!-- x ticks 0, 10, 20, 30, 40, 50, 60 -->
  <g class="sm">
    <line x1="110" y1="320" x2="110" y2="324" stroke="#4a4540"/>
    <text x="110" y="338" text-anchor="middle">0</text>
    <line x1="201.7" y1="320" x2="201.7" y2="324" stroke="#4a4540"/>
    <text x="201.7" y="338" text-anchor="middle">10</text>
    <line x1="293.3" y1="320" x2="293.3" y2="324" stroke="#4a4540"/>
    <text x="293.3" y="338" text-anchor="middle">20</text>
    <line x1="385" y1="320" x2="385" y2="324" stroke="#4a4540"/>
    <text x="385" y="338" text-anchor="middle">30</text>
    <line x1="476.7" y1="320" x2="476.7" y2="324" stroke="#4a4540"/>
    <text x="476.7" y="338" text-anchor="middle">40</text>
    <line x1="568.3" y1="320" x2="568.3" y2="324" stroke="#4a4540"/>
    <text x="568.3" y="338" text-anchor="middle">50</text>
    <line x1="660" y1="320" x2="660" y2="324" stroke="#4a4540"/>
    <text x="660" y="338" text-anchor="middle">60</text>
    <text x="385" y="356" text-anchor="middle" class="lb">kilobytes per hour</text>
  </g>

  <!-- Row 1: JPEG payload — 20 KB → bar from 110 to 293.3, y=110, height=44 -->
  <text x="100" y="138" text-anchor="end" class="nm">One JPEG</text>
  <text x="100" y="152" text-anchor="end" class="sm">224×224 RGB, compressed</text>
  <rect x="110" y="110" width="183.3" height="44" fill="#2a1a0e"/>
  <text x="303" y="138" class="lb">20 KB</text>
  <text x="303" y="152" class="sm">per image</text>

  <!-- Row 2: LoRaWAN SF7 — 50 KB/hr ceiling → bar 110 to 568.3, y=180, height=44 -->
  <text x="100" y="208" text-anchor="end" class="nm">LoRaWAN SF7</text>
  <text x="100" y="222" text-anchor="end" class="sm">fastest, shortest range</text>
  <rect x="110" y="180" width="458.3" height="44" fill="#8a8480"/>
  <text x="578" y="208" class="lb">~50 KB / hr</text>
  <text x="578" y="222" class="sm">duty-cycle ceiling</text>

  <!-- Row 3: LoRaWAN SF12 — 3.75 KB/hr → bar 110 to 144.4, y=250, height=44 -->
  <text x="100" y="278" text-anchor="end" class="nm">LoRaWAN SF12</text>
  <text x="100" y="292" text-anchor="end" class="sm">longest range</text>
  <rect x="110" y="250" width="34.4" height="44" fill="#c8c4c0"/>
  <text x="154" y="278" class="lb">~3.75 KB / hr</text>
  <text x="154" y="292" class="sm">cannot fit one image</text>

  <!-- vertical reference line at one JPEG width (293.3) -->
  <line x1="293.3" y1="80" x2="293.3" y2="320" stroke="#2a1a0e" stroke-width="0.75" stroke-dasharray="4 3"/>
  <text x="293.3" y="76" text-anchor="middle" class="sm">one image</text>

  <!-- annotation arrow pointing to SF12 shortfall -->
  <path d="M 144 272 L 144 392 L 380 392" fill="none" stroke="#2a1a0e" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#ar1)"/>
  <text x="262" y="384" text-anchor="middle" class="lb">at long range, one image takes &gt; 5 hours of airtime</text>

  <!-- annotation: duty cycle box -->
  <rect x="500" y="372" width="170" height="40" fill="none" stroke="#8a8480" stroke-width="0.75"/>
  <text x="585" y="388" text-anchor="middle" class="nm">regulatory ceiling</text>
  <text x="585" y="402" text-anchor="middle" class="sm">30 s of airtime per hour</text>

  <text x="350" y="430" text-anchor="middle" class="cap">Cloud inference is physically impossible: the payload is wider than the pipe at every spreading factor.</text>
</svg>
