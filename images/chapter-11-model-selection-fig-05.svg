<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 480" role="img" aria-labelledby="t11e d11e">
  <title id="t11e">Fall-detector candidates — five models against four constraints</title>
  <desc id="d11e">Constraint matrix. Five candidate models form rows; four constraint columns score each as FIT, TIGHT, or FAILS. The small 1D CNN is the only all-FIT row.</desc>
  <defs>
    <style>
      .ti  { font-family: Lato, 'Helvetica Neue', Arial, sans-serif; font-size: 13px; font-weight: bold; fill: #111111; }
      .sm  { font-family: Lato, 'Helvetica Neue', Arial, sans-serif; font-size: 10px; fill: #555555; }
      .cap { font-family: Lato, 'Helvetica Neue', Arial, sans-serif; font-size: 10px; font-style: italic; fill: #666666; }
      .nm  { font-family: Lato, 'Helvetica Neue', Arial, sans-serif; font-size: 11px; font-weight: bold; fill: #111111; }
      .vd  { font-family: Lato, 'Helvetica Neue', Arial, sans-serif; font-size: 10px; font-weight: bold; fill: #111111; }
    </style>
  </defs>
  <rect width="700" height="480" fill="#FFFFFF"/>

  <text x="32" y="30" class="ti">Fall-detector candidates — five models, four constraints</text>
  <text x="32" y="46" class="sm">nRF52840 · 256 KB SRAM · 500 ms deadline · 2 mA avg draw · ≥95% TPR / ≤1% FPR</text>

  <!-- Column headers -->
  <text x="32"  y="80" class="sm">Model</text>
  <text x="218" y="72" text-anchor="middle" class="sm">Latency</text>
  <text x="218" y="82" text-anchor="middle" class="sm">vs 500 ms</text>
  <text x="346" y="72" text-anchor="middle" class="sm">SRAM</text>
  <text x="346" y="82" text-anchor="middle" class="sm">vs 256 KB</text>
  <text x="474" y="72" text-anchor="middle" class="sm">Energy</text>
  <text x="474" y="82" text-anchor="middle" class="sm">vs 2 mA avg</text>
  <text x="606" y="72" text-anchor="middle" class="sm">TPR ≥95%</text>
  <text x="606" y="82" text-anchor="middle" class="sm">FPR ≤1%</text>
  <line x1="32" y1="88" x2="668" y2="88" stroke="#AAAAAA" stroke-width="0.75"/>

  <!-- Legend -->
  <rect x="32"  y="448" width="12" height="10" fill="#FFFFFF" stroke="#333333" stroke-width="1.25"/>
  <text x="48"  y="457" class="sm">FIT</text>
  <rect x="100" y="448" width="12" height="10" fill="#DDDDDD" stroke="#888888" stroke-width="1"/>
  <text x="116" y="457" class="sm">TIGHT</text>
  <rect x="190" y="448" width="12" height="10" fill="#111111"/>
  <text x="206" y="457" class="sm">FAILS</text>

  <!-- Row A — Threshold detector -->
  <text x="44" y="114" class="nm">A · Threshold detector</text>
  <text x="44" y="128" class="sm">hand-tuned peak + duration</text>
  <rect x="160" y="96" width="128" height="46" fill="#FFFFFF" stroke="#333333" stroke-width="1.25"/>
  <text x="224" y="116" text-anchor="middle" class="vd">FIT</text>
  <text x="224" y="130" text-anchor="middle" class="sm">&lt;1 ms · 1 KB code</text>
  <rect x="288" y="96" width="128" height="46" fill="#FFFFFF" stroke="#333333" stroke-width="1.25"/>
  <text x="352" y="116" text-anchor="middle" class="vd">FIT</text>
  <text x="352" y="130" text-anchor="middle" class="sm">negligible</text>
  <rect x="416" y="96" width="128" height="46" fill="#FFFFFF" stroke="#333333" stroke-width="1.25"/>
  <text x="480" y="116" text-anchor="middle" class="vd">FIT</text>
  <text x="480" y="130" text-anchor="middle" class="sm">negligible</text>
  <rect x="544" y="96" width="124" height="46" fill="#111111"/>
  <text x="606" y="116" text-anchor="middle" font-family="Lato,'Helvetica Neue',Arial,sans-serif" font-size="10" font-weight="bold" fill="#FFFFFF">FAILS</text>
  <text x="606" y="130" text-anchor="middle" font-family="Lato,'Helvetica Neue',Arial,sans-serif" font-size="10" fill="#AAAAAA">78% TPR · 8% FPR</text>

  <!-- Row B — Random forest -->
  <text x="44" y="166" class="nm">B · Random forest (50 trees)</text>
  <text x="44" y="180" class="sm">15 engineered features / 1 s window</text>
  <rect x="160" y="150" width="128" height="46" fill="#FFFFFF" stroke="#333333" stroke-width="1.25"/>
  <text x="224" y="170" text-anchor="middle" class="vd">FIT</text>
  <text x="224" y="184" text-anchor="middle" class="sm">3.5 ms</text>
  <rect x="288" y="150" width="128" height="46" fill="#DDDDDD" stroke="#888888" stroke-width="1"/>
  <text x="352" y="170" text-anchor="middle" class="vd">TIGHT</text>
  <text x="352" y="184" text-anchor="middle" class="sm">200 KB (78%)</text>
  <rect x="416" y="150" width="128" height="46" fill="#FFFFFF" stroke="#333333" stroke-width="1.25"/>
  <text x="480" y="170" text-anchor="middle" class="vd">FIT</text>
  <text x="480" y="184" text-anchor="middle" class="sm">low</text>
  <rect x="544" y="150" width="124" height="46" fill="#111111"/>
  <text x="606" y="170" text-anchor="middle" font-family="Lato,'Helvetica Neue',Arial,sans-serif" font-size="10" font-weight="bold" fill="#FFFFFF">FAILS</text>
  <text x="606" y="184" text-anchor="middle" font-family="Lato,'Helvetica Neue',Arial,sans-serif" font-size="10" fill="#AAAAAA">92% TPR · 2% FPR</text>

  <!-- Row C — Small 1D CNN — WINNER -->
  <text x="44" y="222" class="nm">C · Small 1D CNN  ← ship this</text>
  <text x="44" y="236" class="sm">4 conv + 2 FC · 45k int8 params · CMSIS-NN</text>
  <rect x="160" y="206" width="128" height="46" fill="#FFFFFF" stroke="#333333" stroke-width="1.25"/>
  <text x="224" y="226" text-anchor="middle" class="vd">FIT</text>
  <text x="224" y="240" text-anchor="middle" class="sm">25 ms · 20× under</text>
  <rect x="288" y="206" width="128" height="46" fill="#FFFFFF" stroke="#333333" stroke-width="1.25"/>
  <text x="352" y="226" text-anchor="middle" class="vd">FIT</text>
  <text x="352" y="240" text-anchor="middle" class="sm">75 KB (29%)</text>
  <rect x="416" y="206" width="128" height="46" fill="#FFFFFF" stroke="#333333" stroke-width="1.25"/>
  <text x="480" y="226" text-anchor="middle" class="vd">FIT</text>
  <text x="480" y="240" text-anchor="middle" class="sm">0.12 mA · 16× under</text>
  <rect x="544" y="206" width="124" height="46" fill="#FFFFFF" stroke="#333333" stroke-width="1.25"/>
  <text x="606" y="226" text-anchor="middle" class="vd">FIT</text>
  <text x="606" y="240" text-anchor="middle" class="sm">96% TPR · 0.8% FPR</text>

  <!-- Row D — Large 1D CNN -->
  <text x="44" y="278" class="nm">D · Large 1D CNN</text>
  <text x="44" y="292" class="sm">6 conv + 3 FC · 180k params</text>
  <rect x="160" y="262" width="128" height="46" fill="#FFFFFF" stroke="#333333" stroke-width="1.25"/>
  <text x="224" y="282" text-anchor="middle" class="vd">FIT</text>
  <text x="224" y="296" text-anchor="middle" class="sm">85 ms</text>
  <rect x="288" y="262" width="128" height="46" fill="#111111"/>
  <text x="352" y="282" text-anchor="middle" font-family="Lato,'Helvetica Neue',Arial,sans-serif" font-size="10" font-weight="bold" fill="#FFFFFF">FAILS</text>
  <text x="352" y="296" text-anchor="middle" font-family="Lato,'Helvetica Neue',Arial,sans-serif" font-size="10" fill="#AAAAAA">260 KB · 4 KB over</text>
  <rect x="416" y="262" width="128" height="46" fill="#DDDDDD" stroke="#888888" stroke-width="1"/>
  <text x="480" y="282" text-anchor="middle" class="vd">—</text>
  <text x="480" y="296" text-anchor="middle" class="sm">moot · won't load</text>
  <rect x="544" y="262" width="124" height="46" fill="#DDDDDD" stroke="#888888" stroke-width="1"/>
  <text x="606" y="282" text-anchor="middle" class="vd">—</text>
  <text x="606" y="296" text-anchor="middle" class="sm">98% TPR (paper only)</text>

  <!-- Row E — LSTM -->
  <text x="44" y="334" class="nm">E · 2-layer LSTM (32u)</text>
  <text x="44" y="348" class="sm">60k params · sequential ops</text>
  <rect x="160" y="318" width="128" height="46" fill="#DDDDDD" stroke="#888888" stroke-width="1"/>
  <text x="224" y="338" text-anchor="middle" class="vd">TIGHT</text>
  <text x="224" y="352" text-anchor="middle" class="sm">120 ms · 4× over C</text>
  <rect x="288" y="318" width="128" height="46" fill="#FFFFFF" stroke="#333333" stroke-width="1.25"/>
  <text x="352" y="338" text-anchor="middle" class="vd">FIT</text>
  <text x="352" y="352" text-anchor="middle" class="sm">150 KB</text>
  <rect x="416" y="318" width="128" height="46" fill="#DDDDDD" stroke="#888888" stroke-width="1"/>
  <text x="480" y="338" text-anchor="middle" class="vd">TIGHT</text>
  <text x="480" y="352" text-anchor="middle" class="sm">5× C's energy</text>
  <rect x="544" y="318" width="124" height="46" fill="#FFFFFF" stroke="#333333" stroke-width="1.25"/>
  <text x="606" y="338" text-anchor="middle" class="vd">FIT</text>
  <text x="606" y="352" text-anchor="middle" class="sm">97.5% TPR · 0.5% FPR</text>

  <text x="350" y="418" text-anchor="middle" class="cap">Model C is the only row with every constraint met. D fails on memory by 4 KB; E pays for accuracy the spec doesn't require.</text>
</svg>
