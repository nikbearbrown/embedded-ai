<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 460" role="img" aria-labelledby="t06 d06">
  <title id="t06">Three memory failure modes — decision tree of fixes</title>
  <desc id="d06">A three-branch decision tree. Branch one: doesn't fit in flash, leaves naming quantize, prune, smaller architecture. Branch two: doesn't fit in SRAM, leaves naming reduce channels, swap to MobileNet, add PSRAM. Branch three: insufficient margin above 80 percent, leaves naming reduce model, reduce app footprint, upgrade hardware. Each leaf annotated with expected savings.</desc>
  <defs>
    <style>
      .ti { font-family: 'Real Head Pro', 'FF Real', Lato, sans-serif; font-size: 14px; font-weight: bold; fill: #000000; }
      .lb { font-family: 'Real Head Pro', 'FF Real', Lato, sans-serif; font-size: 11px; fill: #000000; }
      .br { font-family: 'Real Head Pro', 'FF Real', Lato, sans-serif; font-size: 12px; font-weight: bold; fill: #FFFFFF; }
      .leaf { font-family: 'Real Head Pro', 'FF Real', Lato, sans-serif; font-size: 11px; fill: #000000; }
      .sv { font-family: 'Real Head Pro', 'FF Real', Lato, sans-serif; font-size: 10px; fill: #A4804A; font-weight: bold; }
      .sm { font-family: 'Real Head Pro', 'FF Real', Lato, sans-serif; font-size: 10px; fill: #555555; }
      .cap { font-family: 'Real Head Pro', 'FF Real', Lato, sans-serif; font-size: 10px; font-style: italic; fill: #555555; }
    </style>
    <marker id="ar6" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#000000"/>
    </marker>
  </defs>
  <rect width="700" height="460" fill="#FFFFFF"/>

  <text x="32" y="28" class="ti">When memory fails, it fails one of three ways</text>
  <text x="32" y="44" class="sm">each branch points at a different fix</text>

  <!-- root -->
  <rect x="290" y="62" width="120" height="42" fill="#000000"/>
  <text x="350" y="80" text-anchor="middle" class="br">memory</text>
  <text x="350" y="96" text-anchor="middle" class="br">fails</text>

  <!-- branch nodes -->
  <!-- B1 flash -->
  <rect x="50" y="150" width="180" height="44" fill="#555555"/>
  <text x="140" y="168" text-anchor="middle" class="br">doesn't fit in flash</text>
  <text x="140" y="184" text-anchor="middle" class="br">weights &gt; flash budget</text>

  <!-- B2 SRAM -->
  <rect x="260" y="150" width="180" height="44" fill="#555555"/>
  <text x="350" y="168" text-anchor="middle" class="br">doesn't fit in SRAM</text>
  <text x="350" y="184" text-anchor="middle" class="br">activations + app &gt; SRAM</text>

  <!-- B3 margin -->
  <rect x="470" y="150" width="180" height="44" fill="#555555"/>
  <text x="560" y="168" text-anchor="middle" class="br">insufficient margin</text>
  <text x="560" y="184" text-anchor="middle" class="br">SRAM usage &gt; 80%</text>

  <!-- root → branches -->
  <line x1="350" y1="104" x2="140" y2="150" stroke="#000000" stroke-width="1" marker-end="url(#ar6)"/>
  <line x1="350" y1="104" x2="350" y2="150" stroke="#000000" stroke-width="1" marker-end="url(#ar6)"/>
  <line x1="350" y1="104" x2="560" y2="150" stroke="#000000" stroke-width="1" marker-end="url(#ar6)"/>

  <!-- B1 leaves -->
  <line x1="140" y1="194" x2="140" y2="230" stroke="#787878" stroke-width="1"/>
  <line x1="60" y1="230" x2="220" y2="230" stroke="#787878" stroke-width="1"/>
  <line x1="60" y1="230" x2="60" y2="246" stroke="#787878" stroke-width="1" marker-end="url(#ar6)"/>
  <line x1="140" y1="230" x2="140" y2="246" stroke="#787878" stroke-width="1" marker-end="url(#ar6)"/>
  <line x1="220" y1="230" x2="220" y2="246" stroke="#787878" stroke-width="1" marker-end="url(#ar6)"/>

  <rect x="20" y="250" width="80" height="60" fill="#FFFFFF" stroke="#787878"/>
  <text x="60" y="266" text-anchor="middle" class="leaf">quantize</text>
  <text x="60" y="278" text-anchor="middle" class="leaf">f32 → int8</text>
  <text x="60" y="300" text-anchor="middle" class="sv">−75%</text>

  <rect x="100" y="250" width="80" height="60" fill="#FFFFFF" stroke="#787878"/>
  <text x="140" y="266" text-anchor="middle" class="leaf">prune</text>
  <text x="140" y="278" text-anchor="middle" class="leaf">layers / weights</text>
  <text x="140" y="300" text-anchor="middle" class="sv">−20 to 50%</text>

  <rect x="180" y="250" width="80" height="60" fill="#FFFFFF" stroke="#787878"/>
  <text x="220" y="266" text-anchor="middle" class="leaf">smaller</text>
  <text x="220" y="278" text-anchor="middle" class="leaf">architecture</text>
  <text x="220" y="300" text-anchor="middle" class="sv">−40 to 80%</text>

  <!-- B2 leaves -->
  <line x1="350" y1="194" x2="350" y2="230" stroke="#787878" stroke-width="1"/>
  <line x1="270" y1="230" x2="430" y2="230" stroke="#787878" stroke-width="1"/>
  <line x1="270" y1="230" x2="270" y2="246" stroke="#787878" stroke-width="1" marker-end="url(#ar6)"/>
  <line x1="350" y1="230" x2="350" y2="246" stroke="#787878" stroke-width="1" marker-end="url(#ar6)"/>
  <line x1="430" y1="230" x2="430" y2="246" stroke="#787878" stroke-width="1" marker-end="url(#ar6)"/>

  <rect x="230" y="250" width="80" height="60" fill="#FFFFFF" stroke="#787878"/>
  <text x="270" y="266" text-anchor="middle" class="leaf">reduce</text>
  <text x="270" y="278" text-anchor="middle" class="leaf">channels / res</text>
  <text x="270" y="300" text-anchor="middle" class="sv">−50 to 75%</text>

  <rect x="310" y="250" width="80" height="60" fill="#FFFFFF" stroke="#787878"/>
  <text x="350" y="266" text-anchor="middle" class="leaf">swap to</text>
  <text x="350" y="278" text-anchor="middle" class="leaf">MobileNet-style</text>
  <text x="350" y="300" text-anchor="middle" class="sv">−30 to 60%</text>

  <rect x="390" y="250" width="80" height="60" fill="#FFFFFF" stroke="#787878"/>
  <text x="430" y="266" text-anchor="middle" class="leaf">add</text>
  <text x="430" y="278" text-anchor="middle" class="leaf">PSRAM</text>
  <text x="430" y="300" text-anchor="middle" class="sv">+10–50× latency</text>

  <!-- B3 leaves -->
  <line x1="560" y1="194" x2="560" y2="230" stroke="#787878" stroke-width="1"/>
  <line x1="480" y1="230" x2="640" y2="230" stroke="#787878" stroke-width="1"/>
  <line x1="480" y1="230" x2="480" y2="246" stroke="#787878" stroke-width="1" marker-end="url(#ar6)"/>
  <line x1="560" y1="230" x2="560" y2="246" stroke="#787878" stroke-width="1" marker-end="url(#ar6)"/>
  <line x1="640" y1="230" x2="640" y2="246" stroke="#787878" stroke-width="1" marker-end="url(#ar6)"/>

  <rect x="440" y="250" width="80" height="60" fill="#FFFFFF" stroke="#787878"/>
  <text x="480" y="266" text-anchor="middle" class="leaf">reduce</text>
  <text x="480" y="278" text-anchor="middle" class="leaf">model footprint</text>
  <text x="480" y="300" text-anchor="middle" class="sv">target &lt;70%</text>

  <rect x="520" y="250" width="80" height="60" fill="#FFFFFF" stroke="#787878"/>
  <text x="560" y="266" text-anchor="middle" class="leaf">reduce</text>
  <text x="560" y="278" text-anchor="middle" class="leaf">app memory</text>
  <text x="560" y="300" text-anchor="middle" class="sv">comms, RTOS, heap</text>

  <rect x="600" y="250" width="80" height="60" fill="#FFFFFF" stroke="#787878"/>
  <text x="640" y="266" text-anchor="middle" class="leaf">upgrade</text>
  <text x="640" y="278" text-anchor="middle" class="leaf">hardware</text>
  <text x="640" y="300" text-anchor="middle" class="sv">cost + BOM</text>

  <!-- legend / summary bands -->
  <line x1="50" y1="340" x2="650" y2="340" stroke="#ADADAD"/>

  <text x="50" y="362" class="lb">audit triggers</text>
  <text x="50" y="380" class="sm">flash branch fires when <tspan font-family="JetBrains Mono, Fira Code, Courier New, monospace" font-size="10">model_size &gt; flash_kb</tspan></text>
  <text x="50" y="394" class="sm">SRAM branch fires when arena init returns "required &gt; provided"</text>
  <text x="50" y="408" class="sm">margin branch fires when measured peak / total_sram &gt; 0.80</text>

  <text x="50" y="430" class="sm" font-style="italic">Memory is binary. The model fits or it does not.</text>

  <!-- caption -->
  <text x="350" y="450" text-anchor="middle" class="cap">Which fix to reach for depends on which branch fired — verdict drives mitigation.</text>
</svg>
