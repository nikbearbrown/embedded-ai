<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Figure 11.2 — Standard vs depthwise-separable convolution</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:wght@400;500&family=Inter:wght@400;600;700&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
<style>
  :root {
    --color-white:     #FFFFFF;
    --color-ink:       #121212;
    --color-red:       #C8102E;
    --color-secondary: #545454;
    --color-border:    #D4D4D4;
    --color-ochre:     #C8860E;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --color-white:     #111111;
      --color-ink:       #F0EBE3;
      --color-red:       #E8243A;
      --color-secondary: #A0978C;
      --color-border:    #2E2E2E;
      --color-ochre:     #D49A30;
    }
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--color-white); color: var(--color-ink); font-family: 'Inter', sans-serif; padding: 24px; }
  h1 { font-family: 'EB Garamond', Georgia, serif; font-weight: 400; font-size: 28px; margin-bottom: 4px; }
  p.subtitle { color: var(--color-secondary); font-size: 13px; margin-bottom: 16px; }
  .controls { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; font-family: 'JetBrains Mono', monospace; font-size: 13px; }
  .controls input { accent-color: var(--color-red); width: 240px; }
  #chart { width: 100%; height: 480px; }
  .panel-title { font-family: 'Inter', sans-serif; font-weight: 700; font-size: 14px; fill: var(--color-ink); }
  .block { transition: opacity 200ms cubic-bezier(0.2,0.8,0.2,1); }
  .block.standard { fill: var(--color-ink); }
  .block.depthwise { fill: var(--color-secondary); }
  .block.pointwise { fill: var(--color-ink); }
  .channel { fill: var(--color-white); stroke: var(--color-secondary); }
  .arrow { stroke: var(--color-ink); fill: none; }
  .equation { font-family: 'EB Garamond', serif; font-size: 14px; font-style: italic; fill: var(--color-ink); }
  .ratio-box { fill: var(--color-white); stroke: var(--color-red); stroke-width: 1.5; }
  .ratio-text { font-family: 'EB Garamond', serif; font-weight: 700; font-size: 16px; fill: var(--color-red); }
  .axis-note { font-family: 'JetBrains Mono', monospace; font-size: 11px; fill: var(--color-secondary); }
  .tooltip { position: absolute; pointer-events: none; opacity: 0; background: var(--color-ink); color: var(--color-white); padding: 6px 10px; font-size: 12px; }
  @media (prefers-reduced-motion: reduce) { * { transition: none !important; animation: none !important; } }
</style>
</head>
<body>
<h1>Figure 11.2 — Standard vs depthwise-separable convolution</h1>
<p class="subtitle">Slide C; the cost ratio updates live. Both costs are mults per output pixel.</p>
<div class="controls">
  <label for="cIn">channels C =</label>
  <input id="cIn" type="range" min="8" max="256" step="4" value="64">
  <span id="cVal">64</span>
</div>
<div id="chart" role="img" aria-labelledby="t-fig2 d-fig2"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.9.0/d3.min.js"></script>
<script>
const tooltip = d3.select('body').append('div').attr('class', 'tooltip');

function fmt(n) {
  if (n >= 1e6) return (n / 1e6).toFixed(2) + 'M';
  if (n >= 1e3) return (n / 1e3).toFixed(1) + 'k';
  return Math.round(n).toString();
}

function draw() {
  d3.select('#chart').selectAll('*').remove();
  const container = document.getElementById('chart');
  const w = container.clientWidth || 800;
  const h = 480;
  const half = w / 2;

  const svg = d3.select('#chart').append('svg')
    .attr('width', w).attr('height', h)
    .attr('role', 'img').attr('aria-labelledby', 't-fig2 d-fig2');

  svg.append('title').attr('id', 't-fig2').text('Standard versus depthwise-separable convolution cost');
  svg.append('desc').attr('id', 'd-fig2').text('Block diagram comparing one dense 3x3 standard convolution costing 9C squared multiplications against the depthwise then pointwise factorization costing 9C plus C squared.');

  // Divider
  svg.append('line').attr('x1', half).attr('y1', 30).attr('x2', half).attr('y2', h - 30)
    .attr('stroke', 'var(--color-border)').attr('stroke-width', 0.75);

  // --- LEFT panel: standard ---
  const lx = half / 2;
  svg.append('text').attr('class', 'panel-title').attr('x', lx).attr('y', 30).attr('text-anchor', 'middle')
    .text('Standard 3×3 convolution');

  // input stack
  for (let i = 0; i < 4; i++) {
    svg.append('rect').attr('class', 'channel')
      .attr('x', lx - 130 + i * 6).attr('y', 76 + i * 6).attr('width', 50).attr('height', 36);
  }
  svg.append('text').attr('class', 'axis-note').attr('x', lx - 110).attr('y', 72).text('input · C ch');

  // dense block
  svg.append('rect').attr('class', 'block standard')
    .attr('x', lx - 40).attr('y', 76).attr('width', 80).attr('height', 80)
    .on('mouseover', function (event) {
      const c = +document.getElementById('cIn').value;
      tooltip.html(`<strong>standard 3×3</strong><br>9·C² = ${fmt(9 * c * c)} mults/pixel`)
        .style('opacity', 1)
        .style('left', (event.pageX + 12) + 'px')
        .style('top', (event.pageY - 28) + 'px');
    })
    .on('mouseout', () => tooltip.style('opacity', 0));
  svg.append('text').attr('x', lx).attr('y', 112).attr('text-anchor', 'middle')
    .attr('fill', 'var(--color-white)').attr('font-family', 'Inter').attr('font-size', 13).attr('font-weight', 700)
    .text('3×3 dense');
  svg.append('text').attr('x', lx).attr('y', 128).attr('text-anchor', 'middle')
    .attr('fill', 'var(--color-white)').attr('font-family', 'Inter').attr('font-size', 11).attr('opacity', 0.75)
    .text('all-channel mix + spatial');

  // output stack
  for (let i = 0; i < 4; i++) {
    svg.append('rect').attr('class', 'channel')
      .attr('x', lx + 70 + i * 6).attr('y', 76 + i * 6).attr('width', 50).attr('height', 36);
  }
  svg.append('text').attr('class', 'axis-note').attr('x', lx + 96).attr('y', 72).text('output · C ch');

  svg.append('line').attr('class', 'arrow').attr('x1', lx - 70).attr('y1', 116).attr('x2', lx - 42).attr('y2', 116).attr('stroke-width', 1.25).attr('marker-end', 'url(#arrowL)');
  svg.append('line').attr('class', 'arrow').attr('x1', lx + 42).attr('y1', 116).attr('x2', lx + 68).attr('y2', 116).attr('stroke-width', 1.25).attr('marker-end', 'url(#arrowL)');

  // --- RIGHT panel: depthwise separable ---
  const rx = half + half / 2;
  svg.append('text').attr('class', 'panel-title').attr('x', rx).attr('y', 30).attr('text-anchor', 'middle')
    .text('Depthwise separable');

  // input
  svg.append('rect').attr('class', 'channel').attr('x', rx - 150).attr('y', 88).attr('width', 36).attr('height', 60);
  // depthwise
  svg.append('rect').attr('class', 'block depthwise').attr('x', rx - 92).attr('y', 88).attr('width', 70).attr('height', 60)
    .on('mouseover', function (event) {
      const c = +document.getElementById('cIn').value;
      tooltip.html(`<strong>depthwise (3×3 per channel)</strong><br>9·C = ${fmt(9 * c)} mults/pixel`)
        .style('opacity', 1)
        .style('left', (event.pageX + 12) + 'px')
        .style('top', (event.pageY - 28) + 'px');
    })
    .on('mouseout', () => tooltip.style('opacity', 0));
  svg.append('text').attr('x', rx - 57).attr('y', 116).attr('text-anchor', 'middle')
    .attr('fill', 'var(--color-white)').attr('font-family', 'Inter').attr('font-size', 12).attr('font-weight', 700)
    .text('depthwise');
  svg.append('text').attr('x', rx - 57).attr('y', 132).attr('text-anchor', 'middle')
    .attr('fill', 'var(--color-white)').attr('font-family', 'Inter').attr('font-size', 11).attr('opacity', 0.75)
    .text('3×3 per ch');

  // intermediate
  svg.append('rect').attr('class', 'channel').attr('x', rx - 8).attr('y', 88).attr('width', 36).attr('height', 60);

  // pointwise
  svg.append('rect').attr('class', 'block pointwise').attr('x', rx + 38).attr('y', 88).attr('width', 70).attr('height', 60)
    .on('mouseover', function (event) {
      const c = +document.getElementById('cIn').value;
      tooltip.html(`<strong>pointwise (1×1 mix)</strong><br>C² = ${fmt(c * c)} mults/pixel`)
        .style('opacity', 1)
        .style('left', (event.pageX + 12) + 'px')
        .style('top', (event.pageY - 28) + 'px');
    })
    .on('mouseout', () => tooltip.style('opacity', 0));
  svg.append('text').attr('x', rx + 73).attr('y', 116).attr('text-anchor', 'middle')
    .attr('fill', 'var(--color-white)').attr('font-family', 'Inter').attr('font-size', 12).attr('font-weight', 700)
    .text('pointwise');
  svg.append('text').attr('x', rx + 73).attr('y', 132).attr('text-anchor', 'middle')
    .attr('fill', 'var(--color-white)').attr('font-family', 'Inter').attr('font-size', 11).attr('opacity', 0.75)
    .text('1×1 mix');

  // output
  svg.append('rect').attr('class', 'channel').attr('x', rx + 122).attr('y', 88).attr('width', 36).attr('height', 60);

  // arrows
  ['arrowL'].forEach(id => {
    const defs = svg.append('defs');
    defs.append('marker').attr('id', id).attr('markerWidth', 8).attr('markerHeight', 6)
      .attr('refX', 7).attr('refY', 3).attr('orient', 'auto')
      .append('polygon').attr('points', '0 0, 8 3, 0 6').attr('fill', 'var(--color-ink)');
  });

  // --- Equations and live ratio ---
  const c = +document.getElementById('cIn').value;
  const std = 9 * c * c;
  const dws = 9 * c + c * c;
  const ratio = std / dws;

  svg.append('text').attr('class', 'equation').attr('x', lx).attr('y', 220).attr('text-anchor', 'middle')
    .text(`cost = 9·C² = ${fmt(std)} mults/pixel`);
  svg.append('text').attr('class', 'axis-note').attr('x', lx).attr('y', 240).attr('text-anchor', 'middle')
    .text('every output channel weights every input channel');

  svg.append('text').attr('class', 'equation').attr('x', rx).attr('y', 220).attr('text-anchor', 'middle')
    .text(`cost = 9·C + C² = ${fmt(dws)} mults/pixel`);
  svg.append('text').attr('class', 'axis-note').attr('x', rx).attr('y', 240).attr('text-anchor', 'middle')
    .text('spatial filter, then channel mix — never both at once');

  // Ratio callout
  const rbW = Math.min(520, w - 80);
  svg.append('rect').attr('class', 'ratio-box')
    .attr('x', (w - rbW) / 2).attr('y', 290).attr('width', rbW).attr('height', 90);
  svg.append('text').attr('class', 'ratio-text').attr('x', w / 2).attr('y', 322).attr('text-anchor', 'middle')
    .text(`9·C² / (9·C + C²) ≈ ${ratio.toFixed(2)}×  cheaper`);
  svg.append('text').attr('class', 'axis-note').attr('x', w / 2).attr('y', 345).attr('text-anchor', 'middle')
    .text(`at C = ${c} channels`);
  svg.append('text').attr('font-family', 'EB Garamond, serif').attr('font-style', 'italic')
    .attr('font-size', 12).attr('fill', 'var(--color-secondary)')
    .attr('x', w / 2).attr('y', 367).attr('text-anchor', 'middle')
    .text('lose a little expressiveness — MobileNetV2 patches it with inverted residuals');
}

draw();
const slider = document.getElementById('cIn');
slider.addEventListener('input', () => {
  document.getElementById('cVal').textContent = slider.value;
  draw();
});
const ro = new ResizeObserver(() => draw());
ro.observe(document.getElementById('chart'));
</script>
</body>
</html>
