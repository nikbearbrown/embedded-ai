<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Figure 4.3 — Memory hierarchy access cost</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:wght@400;500&family=Inter:wght@400;600;700&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
<style>
  :root {
    --color-white:     #FFFFFF;
    --color-ink:       #121212;
    --color-red:       #C8102E;
    --color-secondary: #545454;
    --color-border:    #D4D4D4;
    --color-ochre:     #C8860E;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --color-white:     #111111;
      --color-ink:       #F0EBE3;
      --color-red:       #E8243A;
      --color-secondary: #A0978C;
      --color-border:    #2E2E2E;
      --color-ochre:     #D49A30;
    }
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--color-white); color: var(--color-ink); font-family: 'Inter', sans-serif; padding: 24px; }
  h1 { font-family: 'EB Garamond', Georgia, serif; font-weight: 400; font-size: 28px; margin-bottom: 4px; }
  p.subtitle { color: var(--color-secondary); font-size: 13px; margin-bottom: 24px; }
  #chart { width: 100%; height: 460px; }
  .axis text { font-family: 'JetBrains Mono', monospace; font-size: 11px; fill: var(--color-secondary); }
  .axis path, .axis line { stroke: var(--color-secondary); shape-rendering: crispEdges; }
  .bar { fill: var(--color-secondary); transition: opacity 200ms cubic-bezier(0.2,0.8,0.2,1); }
  .bar.primary { fill: var(--color-red); }
  .bar.muted   { fill: var(--color-border); }
  .row-label { font-family: 'Inter', sans-serif; font-size: 12px; fill: var(--color-ink); }
  .row-detail { font-family: 'JetBrains Mono', monospace; font-size: 11px; fill: var(--color-secondary); }
  .value-label { font-family: 'JetBrains Mono', monospace; font-size: 11px; font-weight: 700; fill: var(--color-ink); }
  .value-label.primary { fill: var(--color-red); }
  .axis-title { font-family: 'Inter', sans-serif; font-size: 12px; fill: var(--color-secondary); }
  .tooltip { position: absolute; pointer-events: none; opacity: 0; background: var(--color-ink); color: var(--color-white); padding: 6px 10px; font-size: 12px; transition: opacity 150ms cubic-bezier(0.2,0.8,0.2,1); }
  @media (prefers-reduced-motion: reduce) { * { transition: none !important; animation: none !important; } }
</style>
</head>
<body>
<h1>Figure 4.3 — Memory hierarchy access cost</h1>
<p class="subtitle">Cycles per access by tier, with accesses-per-MAC for a 3×3 conv layer shown beside each row.</p>
<div id="chart" role="img" aria-labelledby="t-chart d-chart"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.9.0/d3.min.js"></script>
<script>
const tierData = [
  { tier: 'registers',      cycles: 0.3, primary: false, perMac: '0 (held)',  note: 'reused while in registers' },
  { tier: 'L1 cache',       cycles: 1.5, primary: false, perMac: '0.1–0.3',   note: 'when tiles fit (M7 + L1)' },
  { tier: 'on-chip SRAM',   cycles: 3.0, primary: false, perMac: '1–3',       note: 'typical M4/M7 activation path' },
  { tier: 'external PSRAM', cycles: 15.0, primary: true, perMac: '3–6 (spill)', note: 'order-of-magnitude lives here' },
  { tier: 'flash (XIP)',    cycles: 12.0, primary: false, muted: true, perMac: '— (weights)', note: 'weights here; activations should not be' }
];

const tooltip = d3.select('body').append('div').attr('class', 'tooltip');
function showTip(event, d) {
  tooltip.html(`<strong>${d.tier}</strong><br>${d.cycles} cycles per access · ${d.perMac} per MAC`)
    .style('left', (event.pageX + 12) + 'px').style('top', (event.pageY - 28) + 'px')
    .style('opacity', 1);
}
function moveTip(event) { tooltip.style('left', (event.pageX + 12) + 'px').style('top', (event.pageY - 28) + 'px'); }
function hideTip() { tooltip.style('opacity', 0); }

function draw() {
  const container = document.getElementById('chart');
  d3.select('#chart').selectAll('*').remove();
  const totalWidth  = container.clientWidth  || 900;
  const totalHeight = container.clientHeight || 460;
  const margin = { top: 32, right: 280, bottom: 56, left: 160 };
  const chartWidth  = totalWidth  - margin.left - margin.right;
  const chartHeight = totalHeight - margin.top  - margin.bottom;

  const svg = d3.select('#chart').append('svg')
    .attr('width', totalWidth).attr('height', totalHeight)
    .attr('role', 'img').attr('aria-labelledby', 't-chart d-chart');
  svg.append('title').attr('id', 't-chart').text('Memory hierarchy access cost');
  svg.append('desc').attr('id', 'd-chart').text('Horizontal bar chart with one row per memory tier; bar width encodes cycles per access; tier label sits to the left, accesses-per-MAC and a note sit to the right.');

  const g = svg.append('g').attr('transform', `translate(${margin.left},${margin.top})`);

  const yScaleBand = d3.scaleBand()
    .domain(tierData.map(d => d.tier))
    .range([0, chartHeight])
    .padding(0.28);

  const xScaleLinear = d3.scaleLinear()
    .domain([0, 20])
    .range([0, chartWidth]);

  g.append('g').attr('class', 'axis')
    .attr('transform', `translate(0,${chartHeight})`)
    .call(d3.axisBottom(xScaleLinear).ticks(5));

  g.append('text').attr('class', 'axis-title')
    .attr('x', chartWidth / 2).attr('y', chartHeight + 40)
    .attr('text-anchor', 'middle').text('cycles per access');

  // bars
  g.selectAll('.bar')
    .data(tierData)
    .join('rect')
      .attr('class', d => 'bar' + (d.primary ? ' primary' : '') + (d.muted ? ' muted' : ''))
      .attr('x', 0)
      .attr('y', d => yScaleBand(d.tier))
      .attr('height', yScaleBand.bandwidth())
      .attr('width', d => xScaleLinear(d.cycles))
      .attr('tabindex', 0)
      .attr('aria-label', d => `${d.tier}: ${d.cycles} cycles per access`)
      .on('mouseover', showTip).on('mousemove', moveTip).on('mouseout', hideTip);

  // tier labels (left)
  g.selectAll('.row-label')
    .data(tierData)
    .join('text')
      .attr('class', 'row-label')
      .attr('x', -10).attr('y', d => yScaleBand(d.tier) + yScaleBand.bandwidth() / 2 + 4)
      .attr('text-anchor', 'end')
      .text(d => d.tier);

  // value labels (right of bar)
  g.selectAll('.value-label')
    .data(tierData)
    .join('text')
      .attr('class', d => 'value-label' + (d.primary ? ' primary' : ''))
      .attr('x', d => xScaleLinear(d.cycles) + 8)
      .attr('y', d => yScaleBand(d.tier) + yScaleBand.bandwidth() / 2 + 4)
      .text(d => d.cycles === 12 ? '5–20  (variable)' : (d.cycles < 1 ? '≈ 0' : (d.cycles < 2 ? '1–2' : (d.cycles < 4 ? '2–4' : '10–20'))));

  // accesses-per-MAC + note in right margin
  const rightX = chartWidth + 24;
  g.selectAll('.per-mac')
    .data(tierData)
    .join('text')
      .attr('class', 'row-label')
      .attr('x', rightX)
      .attr('y', d => yScaleBand(d.tier) + yScaleBand.bandwidth() / 2 - 2)
      .style('fill', d => d.primary ? 'var(--color-red)' : 'var(--color-ink)')
      .text(d => `accesses/MAC: ${d.perMac}`);

  g.selectAll('.per-mac-note')
    .data(tierData)
    .join('text')
      .attr('class', 'row-detail')
      .attr('x', rightX)
      .attr('y', d => yScaleBand(d.tier) + yScaleBand.bandwidth() / 2 + 14)
      .style('fill', d => d.primary ? 'var(--color-red)' : 'var(--color-secondary)')
      .text(d => d.note);
}

draw();
const ro = new ResizeObserver(() => draw());
ro.observe(document.getElementById('chart'));
</script>
</body>
</html>
