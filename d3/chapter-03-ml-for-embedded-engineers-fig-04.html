<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Figure 3.4 — Standard vs depthwise separable convolution</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:wght@400;500&family=Inter:wght@400;600;700&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
<style>
  :root {
    --color-white:     #FFFFFF;
    --color-ink:       #121212;
    --color-red:       #C8102E;
    --color-secondary: #545454;
    --color-border:    #D4D4D4;
    --color-ochre:     #C8860E;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --color-white:     #111111;
      --color-ink:       #F0EBE3;
      --color-red:       #E8243A;
      --color-secondary: #A0978C;
      --color-border:    #2E2E2E;
      --color-ochre:     #D49A30;
    }
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--color-white); color: var(--color-ink); font-family: 'Inter', sans-serif; padding: 24px; }
  h1 { font-family: 'EB Garamond', Georgia, serif; font-weight: 400; font-size: 28px; margin-bottom: 4px; }
  p.subtitle { color: var(--color-secondary); font-size: 13px; margin-bottom: 24px; }
  .controls { display: flex; gap: 16px; align-items: center; margin-bottom: 16px; font-size: 13px; color: var(--color-secondary); flex-wrap: wrap; }
  .controls input { width: 160px; }
  .controls .val { font-family: 'JetBrains Mono', monospace; font-size: 12px; color: var(--color-ink); }
  #chart { width: 100%; height: 420px; }
  .row-label { font-family: 'Inter', sans-serif; font-size: 13px; font-weight: 700; fill: var(--color-ink); }
  .row-sub   { font-family: 'Inter', sans-serif; font-size: 11px; fill: var(--color-secondary); }
  .block-std  { fill: var(--color-ink); cursor: pointer; transition: opacity 200ms cubic-bezier(0.2,0.8,0.2,1); }
  .block-dw   { fill: #4a4540; cursor: pointer; transition: opacity 200ms cubic-bezier(0.2,0.8,0.2,1); }
  .block-pw   { fill: #8a8480; cursor: pointer; transition: opacity 200ms cubic-bezier(0.2,0.8,0.2,1); }
  .block-std.primary { fill: var(--color-red); }
  .tensor { fill: color-mix(in srgb, var(--color-ink) 6%, var(--color-white)); stroke: var(--color-border); }
  .tensor-text { font-family: 'JetBrains Mono', monospace; font-size: 11px; fill: var(--color-ink); }
  .block-text { font-family: 'Inter', sans-serif; font-size: 11px; fill: var(--color-white); }
  .arrow { stroke: var(--color-ink); stroke-width: 1.4; fill: none; }
  .cost-bar { fill: var(--color-ink); }
  .cost-bar.dw { fill: var(--color-red); }
  .cost-text { font-family: 'Inter', sans-serif; font-size: 12px; font-weight: 600; fill: var(--color-white); }
  .caption { color: var(--color-secondary); font-size: 13px; margin-top: 12px; max-width: 65ch; font-style: italic; }
  .tooltip { position: absolute; pointer-events: none; opacity: 0; background: var(--color-ink); color: var(--color-white); padding: 6px 10px; font-size: 12px; }
  @media (prefers-reduced-motion: reduce) { * { transition: none !important; animation: none !important; } }
</style>
</head>
<body>
<h1>Figure 3.4 — Standard vs depthwise separable convolution</h1>
<p class="subtitle">Two paths to the same output. Adjust channels to feel the gap.</p>
<div class="controls">
  <label>input channels</label>
  <input id="inC" type="range" min="3" max="128" value="32" step="1">
  <span class="val" id="inCVal">32</span>
  <label>output channels</label>
  <input id="outC" type="range" min="8" max="256" value="64" step="1">
  <span class="val" id="outCVal">64</span>
  <label>kernel</label>
  <input id="kS" type="range" min="1" max="7" step="2" value="3">
  <span class="val" id="kSVal">3</span>
</div>
<div id="chart" role="img" aria-labelledby="t-fig04 d-fig04"></div>
<p class="caption">MobileNet's central trick: the same job in two cheaper steps.</p>
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.9.0/d3.min.js"></script>
<script>
const tooltip = d3.select('body').append('div').attr('class', 'tooltip');
function showTip(event, html) {
  tooltip.html(html)
    .style('left', (event.pageX + 12) + 'px')
    .style('top', (event.pageY - 28) + 'px')
    .transition().duration(150).style('opacity', 1);
}
function moveTip(event) { tooltip.style('left', (event.pageX + 12) + 'px').style('top', (event.pageY - 28) + 'px'); }
function hideTip()      { tooltip.transition().duration(100).style('opacity', 0); }

const fmt = d3.format(',');
let inC = 32, outC = 64, kS = 3;

function draw() {
  const container = document.getElementById('chart');
  d3.select('#chart').selectAll('*').remove();
  const totalWidth  = container.clientWidth || 800;
  const totalHeight = container.clientHeight || 420;

  const stdCost = kS*kS * inC * outC;
  const dwCost  = kS*kS * inC;
  const pwCost  = inC * outC;
  const sepCost = dwCost + pwCost;
  const ratio   = stdCost / sepCost;

  const svg = d3.select('#chart').append('svg')
    .attr('width', totalWidth).attr('height', totalHeight)
    .attr('role','img').attr('aria-labelledby','t-fig04 d-fig04');
  svg.append('title').attr('id','t-fig04').text('Standard vs depthwise separable convolution');
  svg.append('desc').attr('id','d-fig04').text('Comparison of multiplications per output pixel for a standard convolution and a depthwise plus pointwise sequence.');

  svg.append('defs').append('marker').attr('id','ar04')
    .attr('markerWidth',8).attr('markerHeight',6).attr('refX',7).attr('refY',3).attr('orient','auto')
    .append('polygon').attr('points','0 0, 8 3, 0 6').attr('fill','var(--color-ink)');

  // ROW 1: standard
  svg.append('text').attr('class','row-label').attr('x',40).attr('y',36).text('Standard 3×3 convolution');
  svg.append('text').attr('class','row-sub').attr('x',40).attr('y',52).text('one op does spatial filtering and channel mixing together');

  // input tensor
  svg.append('rect').attr('class','tensor').attr('x',60).attr('y',70).attr('width',80).attr('height',56);
  svg.append('text').attr('class','tensor-text').attr('x',100).attr('y',94).attr('text-anchor','middle').text('input');
  svg.append('text').attr('class','tensor-text').attr('x',100).attr('y',110).attr('text-anchor','middle').text(`${inC} ch`);
  svg.append('path').attr('class','arrow').attr('d',`M 142 98 L 218 98`).attr('marker-end','url(#ar04)');

  // std block
  svg.append('rect').attr('class','block-std primary').attr('x',220).attr('y',66).attr('width',180).attr('height',64)
    .attr('tabindex',0).attr('aria-label',`Standard conv, ${kS}x${kS}, ${inC} input ${outC} output, ${stdCost} mults`)
    .on('mouseover',(e)=>showTip(e,`<strong>${kS}×${kS} conv</strong><br>${inC} in · ${outC} out<br>${fmt(stdCost)} mults/px`))
    .on('mousemove',moveTip).on('mouseout',hideTip);
  svg.append('text').attr('class','block-text').attr('x',310).attr('y',88).attr('text-anchor','middle').text(`${kS}×${kS} conv`);
  svg.append('text').attr('class','block-text').attr('x',310).attr('y',104).attr('text-anchor','middle').text(`${inC} in · ${outC} out`);
  svg.append('text').attr('class','block-text').attr('x',310).attr('y',120).attr('text-anchor','middle').text('spatial + channel mix');

  svg.append('path').attr('class','arrow').attr('d',`M 402 98 L 458 98`).attr('marker-end','url(#ar04)');
  svg.append('rect').attr('class','tensor').attr('x',460).attr('y',70).attr('width',80).attr('height',56);
  svg.append('text').attr('class','tensor-text').attr('x',500).attr('y',94).attr('text-anchor','middle').text('output');
  svg.append('text').attr('class','tensor-text').attr('x',500).attr('y',110).attr('text-anchor','middle').text(`${outC} ch`);

  svg.append('text').attr('class','tensor-text').attr('x',560).attr('y',90).text(`${kS} · ${kS} · ${inC} · ${outC}`);
  svg.append('text').attr('class','tensor-text').attr('x',560).attr('y',108).attr('font-weight','bold').text(`= ${fmt(stdCost)} mults/px`);

  // divider
  svg.append('line').attr('x1',40).attr('y1',160).attr('x2',totalWidth-40).attr('y2',160)
    .attr('stroke','var(--color-border)').attr('stroke-width',0.75);

  // ROW 2: depthwise separable
  svg.append('text').attr('class','row-label').attr('x',40).attr('y',186).text('Depthwise separable');
  svg.append('text').attr('class','row-sub').attr('x',40).attr('y',202).text('step one filters per channel · step two mixes channels');

  svg.append('rect').attr('class','tensor').attr('x',60).attr('y',220).attr('width',68).attr('height',56);
  svg.append('text').attr('class','tensor-text').attr('x',94).attr('y',244).attr('text-anchor','middle').text('input');
  svg.append('text').attr('class','tensor-text').attr('x',94).attr('y',260).attr('text-anchor','middle').text(`${inC} ch`);
  svg.append('path').attr('class','arrow').attr('d',`M 130 248 L 186 248`).attr('marker-end','url(#ar04)');

  svg.append('rect').attr('class','block-dw').attr('x',188).attr('y',216).attr('width',146).attr('height',64)
    .attr('tabindex',0).attr('aria-label',`Depthwise ${kS}x${kS}, ${dwCost} mults`)
    .on('mouseover',(e)=>showTip(e,`<strong>depthwise ${kS}×${kS}</strong><br>per-channel filter<br>${kS}·${kS}·${inC} = ${fmt(dwCost)} mults/px`))
    .on('mousemove',moveTip).on('mouseout',hideTip);
  svg.append('text').attr('class','block-text').attr('x',261).attr('y',238).attr('text-anchor','middle').text(`depthwise ${kS}×${kS}`);
  svg.append('text').attr('class','block-text').attr('x',261).attr('y',254).attr('text-anchor','middle').text('per-channel filter');
  svg.append('text').attr('class','block-text').attr('x',261).attr('y',270).attr('text-anchor','middle').text(`${kS} · ${kS} · ${inC} = ${fmt(dwCost)}`);

  svg.append('path').attr('class','arrow').attr('d',`M 336 248 L 376 248`).attr('marker-end','url(#ar04)');
  svg.append('rect').attr('class','tensor').attr('x',378).attr('y',220).attr('width',50).attr('height',56);
  svg.append('text').attr('class','tensor-text').attr('x',403).attr('y',252).attr('text-anchor','middle').text(`${inC} ch`);

  svg.append('path').attr('class','arrow').attr('d',`M 430 248 L 470 248`).attr('marker-end','url(#ar04)');
  svg.append('rect').attr('class','block-pw').attr('x',472).attr('y',216).attr('width',146).attr('height',64)
    .attr('tabindex',0).attr('aria-label',`Pointwise 1x1, ${pwCost} mults`)
    .on('mouseover',(e)=>showTip(e,`<strong>pointwise 1×1</strong><br>channel mix<br>1·1·${inC}·${outC} = ${fmt(pwCost)} mults/px`))
    .on('mousemove',moveTip).on('mouseout',hideTip);
  svg.append('text').attr('class','block-text').attr('x',545).attr('y',238).attr('text-anchor','middle').text('pointwise 1×1');
  svg.append('text').attr('class','block-text').attr('x',545).attr('y',254).attr('text-anchor','middle').text('channel mix');
  svg.append('text').attr('class','block-text').attr('x',545).attr('y',270).attr('text-anchor','middle').text(`1 · 1 · ${inC} · ${outC} = ${fmt(pwCost)}`);

  svg.append('rect').attr('class','tensor').attr('x',620).attr('y',220).attr('width',40).attr('height',56);
  svg.append('text').attr('class','tensor-text').attr('x',640).attr('y',252).attr('text-anchor','middle').text(`${outC} ch`);

  // cost callout — comparative bars
  const calloutY = 310;
  svg.append('rect').attr('class','cost-bar').attr('x',60).attr('y',calloutY).attr('width', totalWidth-120).attr('height',40);
  svg.append('text').attr('class','cost-text').attr('x',180).attr('y',calloutY+24).attr('text-anchor','middle')
    .text(`${fmt(dwCost)} + ${fmt(pwCost)} = ${fmt(sepCost)} mults/px`);
  svg.append('text').attr('class','cost-text').attr('x',totalWidth-220).attr('y',calloutY+24).attr('text-anchor','middle')
    .text(`≈ ${ratio.toFixed(1)}× cheaper than standard`);
}

['inC','outC','kS'].forEach(id => {
  document.getElementById(id).addEventListener('input', (e) => {
    if (id === 'inC') inC = +e.target.value;
    if (id === 'outC') outC = +e.target.value;
    if (id === 'kS')  kS  = +e.target.value;
    document.getElementById(id+'Val').textContent = e.target.value;
    draw();
  });
});

draw();
const ro = new ResizeObserver(() => draw());
ro.observe(document.getElementById('chart'));
</script>
</body>
</html>
