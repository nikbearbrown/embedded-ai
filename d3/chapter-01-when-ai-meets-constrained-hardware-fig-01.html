<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Figure 1.1 — Hardware-class taxonomy ladder</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:wght@400;500;700&family=Inter:wght@400;600;700&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
<style>
  :root {
    --color-white:     #FFFFFF;
    --color-ink:       #121212;
    --color-red:       #C8102E;
    --color-secondary: #545454;
    --color-border:    #D4D4D4;
    --color-ochre:     #C8860E;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --color-white:     #111111;
      --color-ink:       #F0EBE3;
      --color-red:       #E8243A;
      --color-secondary: #A0978C;
      --color-border:    #2E2E2E;
      --color-ochre:     #D49A30;
    }
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--color-white); color: var(--color-ink); font-family: 'Inter', sans-serif; padding: 24px; }
  h1 { font-family: 'EB Garamond', Georgia, serif; font-weight: 500; font-size: 28px; margin-bottom: 4px; }
  p.subtitle { color: var(--color-secondary); font-size: 13px; margin-bottom: 24px; max-width: 70ch; }
  #chart { width: 100%; height: 520px; position: relative; }
  .axis text { font-family: 'JetBrains Mono', monospace; font-size: 11px; fill: var(--color-secondary); }
  .axis path, .axis line { stroke: var(--color-secondary); shape-rendering: crispEdges; }
  .tier-row { stroke: var(--color-border); fill: var(--color-white); transition: fill 200ms ease; }
  .tier-row.embedded { fill: var(--color-white); }
  .tier-row:focus, .tier-row:hover { fill: var(--color-border); outline: none; }
  .tier-marker { stroke: none; }
  .tier-label { font-family: 'Inter', sans-serif; font-weight: 700; font-size: 14px; fill: var(--color-ink); }
  .tier-detail { font-family: 'Inter', sans-serif; font-size: 12px; fill: var(--color-secondary); }
  .tier-value { font-family: 'JetBrains Mono', monospace; font-size: 12px; fill: var(--color-ink); }
  .col-head { font-family: 'Inter', sans-serif; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; fill: var(--color-secondary); }
  .boundary { stroke: var(--color-red); stroke-width: 1; stroke-dasharray: 4 3; }
  .bracket { stroke: var(--color-ochre); stroke-width: 1.5; fill: none; }
  .bracket-label { font-family: 'EB Garamond', Georgia, serif; font-size: 12px; fill: var(--color-ochre); font-style: italic; }
  .caption { color: var(--color-secondary); font-size: 13px; margin-top: 16px; max-width: 70ch; font-family: 'EB Garamond', Georgia, serif; font-style: italic; }
  .tooltip { position: absolute; pointer-events: none; opacity: 0; background: var(--color-ink); color: var(--color-white); padding: 8px 12px; font-size: 12px; font-family: 'Inter', sans-serif; max-width: 260px; }
  @media (prefers-reduced-motion: reduce) { * { transition: none !important; animation: none !important; } }
</style>
</head>
<body>
<h1>Figure 1.1 — Hardware-class taxonomy ladder</h1>
<p class="subtitle">Four tiers from desktop down to deeply embedded. The embedded boundary is not about size; it is about what the system can do when resources are exceeded.</p>
<div id="chart" role="img" aria-labelledby="chart-title chart-desc"></div>
<p class="caption">Moving down the ladder, recovery paths disappear. A laptop swaps. An MCU brown-outs.</p>
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.9.0/d3.min.js"></script>
<script>
const tierData = [
  { tier: 'Desktop / server',       hardware: 'x86, Xeon, A100 — virtualized', example: 'cloud node, workstation', sram: 'unbounded (TB)', sramDetail: 'swap to disk', power: '~100 W', powerDetail: 'wall socket', recovery: 'autoscale, swap, retry', recoveryDetail: 'graceful degradation', embedded: false, marker: 'var(--color-ink)' },
  { tier: 'Single-board computer',  hardware: 'Raspberry Pi 4, Jetson Nano',   example: 'edge gateway, kiosk',     sram: '~4 GB',          sramDetail: 'DRAM + flash',  power: '~5 W',   powerDetail: 'USB-C, PoE',  recovery: 'throttle, swap (slow)', recoveryDetail: 'thermal slowdown', embedded: false, marker: 'var(--color-secondary)' },
  { tier: 'Application MCU',        hardware: 'Cortex-M4 / M7, ESP32',          example: 'wearable, smart sensor',   sram: '~256 KB',        sramDetail: 'SRAM, no swap', power: '~50 mW', powerDetail: 'coin cell, AA', recovery: 'hard fault, reset',     recoveryDetail: 'no graceful path', embedded: true,  marker: 'var(--color-red)' },
  { tier: 'Deeply embedded MCU',    hardware: 'Cortex-M0+, Arduino Nano 33',    example: 'hearing aid, beacon',       sram: '~32 KB',         sramDetail: 'SRAM only',     power: '~10 mW', powerDetail: 'harvested, button cell', recovery: 'silent stack overflow', recoveryDetail: 'brownout, dead device', embedded: true, marker: 'var(--color-red)' }
];

const tooltip = d3.select('body').append('div').attr('class', 'tooltip');
function showTip(event, d) {
  tooltip.html(`<strong>${d.tier}</strong><br>${d.hardware}<br><em>${d.example}</em><br><br>SRAM ${d.sram} · ${d.power}<br>Recovery: ${d.recovery}`)
    .style('left', (event.pageX + 12) + 'px')
    .style('top', (event.pageY - 28) + 'px')
    .transition().duration(150).style('opacity', 1);
}
function moveTip(event) { tooltip.style('left', (event.pageX + 12) + 'px').style('top', (event.pageY - 28) + 'px'); }
function hideTip() { tooltip.transition().duration(100).style('opacity', 0); }

function draw() {
  const container = document.getElementById('chart');
  d3.select('#chart').selectAll('svg').remove();
  const totalWidth = container.clientWidth || 800;
  const totalHeight = 520;
  const margin = { top: 48, right: 40, bottom: 32, left: 64 };
  const chartWidth = totalWidth - margin.left - margin.right;
  const chartHeight = totalHeight - margin.top - margin.bottom;

  const svg = d3.select('#chart').append('svg')
    .attr('width', totalWidth)
    .attr('height', totalHeight)
    .attr('role', 'img')
    .attr('aria-labelledby', 'chart-title chart-desc');

  svg.append('title').attr('id', 'chart-title').text('Hardware-class taxonomy ladder');
  svg.append('desc').attr('id', 'chart-desc').text('Four tiers of compute from desktop/server to deeply embedded MCU, with SRAM, power, and recovery behavior compared side by side.');

  const gChart = svg.append('g').attr('transform', `translate(${margin.left},${margin.top})`);

  // Column positions (proportional)
  const colTier = 0;
  const colSram = chartWidth * 0.42;
  const colPower = chartWidth * 0.60;
  const colRecov = chartWidth * 0.78;

  // Headers
  const headers = [
    { x: colTier,  text: 'Tier' },
    { x: colSram,  text: 'Typical SRAM' },
    { x: colPower, text: 'Typical power' },
    { x: colRecov, text: 'When resources exceeded' }
  ];
  gChart.selectAll('.col-head').data(headers).join('text')
    .attr('class', 'col-head')
    .attr('x', d => d.x)
    .attr('y', -8)
    .text(d => d.text);

  gChart.append('line')
    .attr('x1', 0).attr('y1', 0).attr('x2', chartWidth).attr('y2', 0)
    .attr('stroke', 'var(--color-secondary)').attr('stroke-width', 0.75);

  const yScaleBand = d3.scaleBand()
    .domain(tierData.map(d => d.tier))
    .range([0, chartHeight])
    .padding(0.08);

  const rowH = yScaleBand.bandwidth();

  const rows = gChart.selectAll('.row')
    .data(tierData)
    .join('g')
      .attr('class', 'row')
      .attr('transform', d => `translate(0,${yScaleBand(d.tier)})`)
      .attr('tabindex', 0)
      .attr('aria-label', d => `${d.tier}: SRAM ${d.sram}, power ${d.power}, recovery ${d.recovery}`)
      .on('mouseover', showTip).on('mousemove', moveTip).on('mouseout', hideTip)
      .on('focus', function(event) {
        const d = d3.select(this).datum();
        const rect = this.getBoundingClientRect();
        showTip({ pageX: rect.left + 200, pageY: rect.top + 20 }, d);
      })
      .on('blur', hideTip);

  rows.append('rect')
    .attr('class', d => d.embedded ? 'tier-row embedded' : 'tier-row')
    .attr('x', 0).attr('y', 0)
    .attr('width', chartWidth).attr('height', rowH);

  rows.append('rect')
    .attr('class', 'tier-marker')
    .attr('x', 0).attr('y', 0)
    .attr('width', 6).attr('height', rowH)
    .attr('fill', d => d.marker);

  rows.append('text').attr('class', 'tier-label').attr('x', 18).attr('y', 18).text(d => d.tier);
  rows.append('text').attr('class', 'tier-detail').attr('x', 18).attr('y', 36).text(d => d.hardware);
  rows.append('text').attr('class', 'tier-detail').attr('x', 18).attr('y', 52).text(d => 'examples: ' + d.example);

  rows.append('text').attr('class', 'tier-value').attr('x', colSram).attr('y', 22).text(d => d.sram);
  rows.append('text').attr('class', 'tier-detail').attr('x', colSram).attr('y', 40).text(d => d.sramDetail);

  rows.append('text').attr('class', 'tier-value').attr('x', colPower).attr('y', 22).text(d => d.power);
  rows.append('text').attr('class', 'tier-detail').attr('x', colPower).attr('y', 40).text(d => d.powerDetail);

  rows.append('text').attr('class', 'tier-detail').attr('x', colRecov).attr('y', 22).text(d => d.recovery);
  rows.append('text').attr('class', 'tier-detail').attr('x', colRecov).attr('y', 40).text(d => d.recoveryDetail);

  // Boundary line between SBC and MCU
  const boundaryY = yScaleBand(tierData[2].tier) - yScaleBand.step() * 0.04;
  gChart.append('line')
    .attr('class', 'boundary')
    .attr('x1', 0).attr('y1', boundaryY)
    .attr('x2', chartWidth).attr('y2', boundaryY);
  gChart.append('text')
    .attr('x', chartWidth).attr('y', boundaryY - 4)
    .attr('text-anchor', 'end')
    .attr('font-family', "'EB Garamond', Georgia, serif").attr('font-size', 11).attr('font-style', 'italic')
    .attr('fill', 'var(--color-red)')
    .text('embedded boundary');

  // Bracket for embedded region
  const embStart = yScaleBand(tierData[2].tier);
  const embEnd = yScaleBand(tierData[3].tier) + rowH;
  gChart.append('path')
    .attr('class', 'bracket')
    .attr('d', `M -18 ${embStart} L -24 ${embStart} L -24 ${embEnd} L -18 ${embEnd}`);
  gChart.append('text')
    .attr('class', 'bracket-label')
    .attr('transform', `translate(-32 ${(embStart + embEnd) / 2}) rotate(-90)`)
    .attr('text-anchor', 'middle')
    .text('embedded region');
}
draw();
const ro = new ResizeObserver(() => draw());
ro.observe(document.getElementById('chart'));
</script>
</body>
</html>
