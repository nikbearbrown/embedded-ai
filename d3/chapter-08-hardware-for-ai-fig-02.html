<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Figure 8.2 — microNPU dataflow</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:wght@400;500;700&family=Inter:wght@400;600;700&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
<style>
  :root {
    --color-white:     #FDFCFB;
    --color-ink:       #2A1A0E;
    --color-red:       #C8102E;
    --color-secondary: #4A4540;
    --color-border:    #C8C4C0;
    --color-ochre:     #C8860E;
    --color-mid:       #8A8480;
    --color-tint:      #E6DCD0;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --color-white:     #14110D;
      --color-ink:       #F0EBE3;
      --color-red:       #E8243A;
      --color-secondary: #A0978C;
      --color-border:    #3A332B;
      --color-ochre:     #D49A30;
      --color-mid:       #6E665F;
      --color-tint:      #2B2520;
    }
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--color-white); color: var(--color-ink); font-family: 'EB Garamond', Georgia, serif; padding: 24px; }
  h1 { font-family: 'EB Garamond', Georgia, serif; font-weight: 500; font-size: 26px; margin-bottom: 4px; }
  p.subtitle { color: var(--color-secondary); font-size: 13px; margin-bottom: 24px; font-family: 'Inter', sans-serif; }
  #chart { width: 100%; height: 440px; }
  .block { fill: var(--color-white); stroke: var(--color-ink); stroke-width: 1.25; }
  .block-em { fill: var(--color-white); stroke: var(--color-ink); stroke-width: 2; }
  .block-tint { fill: var(--color-tint); stroke: var(--color-ink); stroke-width: 1.25; }
  .pe { fill: var(--color-border); stroke: var(--color-secondary); stroke-width: 0.5; }
  .pe.active { fill: var(--color-ink); }
  .block-label { font-family: 'EB Garamond', Georgia, serif; font-size: 14px; fill: var(--color-ink); font-weight: 600; }
  .block-sub { font-family: 'Inter', sans-serif; font-size: 11px; fill: var(--color-secondary); }
  .flow-label { font-family: 'EB Garamond', Georgia, serif; font-size: 12px; fill: var(--color-ink); font-style: italic; }
  .data-arrow { stroke: var(--color-ink); stroke-width: 1.5; fill: none; }
  .ctrl-arrow { stroke: var(--color-mid); stroke-width: 0.75; stroke-dasharray: 2 3; fill: none; }
  .writeback { stroke: var(--color-ink); stroke-width: 1.5; stroke-dasharray: 4 3; fill: none; }
  .caption { color: var(--color-secondary); font-size: 13px; margin-top: 16px; max-width: 65ch; font-family: 'EB Garamond', Georgia, serif; font-style: italic; }
  .tooltip { position: absolute; pointer-events: none; opacity: 0; background: var(--color-ink); color: var(--color-white); padding: 6px 10px; font-size: 12px; font-family: 'Inter', sans-serif; }
  @media (prefers-reduced-motion: reduce) { * { transition: none !important; animation: none !important; } }
</style>
</head>
<body>
<h1>Figure 8.2 — microNPU dataflow</h1>
<p class="subtitle">Weights and activations move from external memory through a local scratchpad into a parallel MAC grid; a thin sequencer issues the control.</p>
<div id="chart" role="img" aria-labelledby="t02 d02"></div>
<p class="caption">Local scratchpad feeds a parallel MAC grid. A thin sequencer replaces the CPU's fetch/decode machine.</p>
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.9.0/d3.min.js"></script>
<script>
const blockData = [
  { id: 'mem',  x: 0.05, y: 0.40, w: 0.16, h: 0.30, label: 'External memory', sub: 'flash / DRAM · weights, model', cls: 'block' },
  { id: 'dma',  x: 0.27, y: 0.46, w: 0.12, h: 0.18, label: 'DMA',             sub: 'block xfer',                     cls: 'block' },
  { id: 'sram', x: 0.43, y: 0.30, w: 0.16, h: 0.48, label: 'Scratchpad',      sub: 'SRAM · kB to MB · no cache',     cls: 'block-em' },
  { id: 'mac',  x: 0.63, y: 0.30, w: 0.24, h: 0.48, label: 'MAC array (16×16)', sub: '256 MACs/cycle · int8',         cls: 'block-em' },
  { id: 'seq',  x: 0.91, y: 0.46, w: 0.07, h: 0.18, label: 'Seq.',            sub: 'controller',                     cls: 'block' }
];

const dataFlows = [
  { from: 'mem',  to: 'dma',  label: 'weights' },
  { from: 'dma',  to: 'sram', label: '' },
  { from: 'sram', to: 'mac',  label: 'tiles' }
];

const tooltip = d3.select('body').append('div').attr('class', 'tooltip');
function showTip(event, d) {
  tooltip.html(`<strong>${d.label}</strong><br/>${d.sub}`)
    .style('left', (event.pageX + 12) + 'px')
    .style('top', (event.pageY - 28) + 'px')
    .transition().duration(150).style('opacity', 1);
}
function moveTip(event) { tooltip.style('left', (event.pageX + 12) + 'px').style('top', (event.pageY - 28) + 'px'); }
function hideTip() { tooltip.transition().duration(100).style('opacity', 0); }

function draw() {
  const container = document.getElementById('chart');
  d3.select('#chart').selectAll('*').remove();
  const totalWidth  = container.clientWidth  || 700;
  const totalHeight = container.clientHeight || 440;
  const padTop = 60, padBottom = 40;
  const innerHeight = totalHeight - padTop - padBottom;

  const svg = d3.select('#chart').append('svg')
    .attr('width', totalWidth).attr('height', totalHeight)
    .attr('role', 'img').attr('aria-labelledby', 't02 d02');
  svg.append('title').attr('id', 't02').text('microNPU dataflow');
  svg.append('desc').attr('id', 'd02').text('Block diagram. External memory connects through DMA to a local SRAM scratchpad, which feeds a 16-by-16 MAC array. A sequencer issues control signals to all blocks.');

  const defs = svg.append('defs');
  defs.append('marker').attr('id', 'arrow').attr('markerWidth', 9).attr('markerHeight', 7).attr('refX', 8).attr('refY', 3.5).attr('orient', 'auto')
    .append('polygon').attr('points', '0 0, 9 3.5, 0 7').attr('fill', 'var(--color-ink)');
  defs.append('marker').attr('id', 'arrow-ctrl').attr('markerWidth', 9).attr('markerHeight', 7).attr('refX', 8).attr('refY', 3.5).attr('orient', 'auto')
    .append('polygon').attr('points', '0 0, 9 3.5, 0 7').attr('fill', 'var(--color-mid)');

  // Title text
  svg.append('text').attr('x', 0).attr('y', 28).attr('class', 'block-label').text('microNPU dataflow — weights and activations to MACs, back to memory');
  svg.append('text').attr('x', 0).attr('y', 46).attr('class', 'block-sub').text('representative 16×16 MAC array with on-chip scratchpad and DMA');

  const blockPos = {};
  blockData.forEach(b => {
    const x = b.x * totalWidth;
    const y = padTop + b.y * innerHeight;
    const w = b.w * totalWidth;
    const h = b.h * innerHeight;
    blockPos[b.id] = { x, y, w, h, cx: x + w/2, cy: y + h/2 };

    svg.append('rect').attr('class', b.cls).attr('x', x).attr('y', y).attr('width', w).attr('height', h)
      .attr('tabindex', 0).attr('aria-label', `${b.label}: ${b.sub}`)
      .on('mouseover', (event) => showTip(event, b))
      .on('mousemove', moveTip).on('mouseout', hideTip);

    svg.append('text').attr('class', 'block-label')
      .attr('x', x + w/2).attr('y', y + 22).attr('text-anchor', 'middle').text(b.label);
    svg.append('text').attr('class', 'block-sub')
      .attr('x', x + w/2).attr('y', y + 38).attr('text-anchor', 'middle').text(b.sub);
  });

  // Render MAC PE grid inside MAC block
  const mac = blockPos['mac'];
  const grid = 8; // visual abstraction of 16x16
  const gridSize = Math.min(mac.w - 32, mac.h - 80);
  const cell = gridSize / grid;
  const gx = mac.cx - gridSize / 2;
  const gy = mac.y + 56;
  for (let r = 0; r < grid; r++) {
    for (let c = 0; c < grid; c++) {
      svg.append('rect').attr('class', 'pe')
        .attr('x', gx + c * cell + 1).attr('y', gy + r * cell + 1)
        .attr('width', cell - 2).attr('height', cell - 2);
    }
  }

  // Data flow arrows
  dataFlows.forEach(f => {
    const a = blockPos[f.from], b = blockPos[f.to];
    const x1 = a.x + a.w, y1 = a.cy, x2 = b.x, y2 = b.cy;
    svg.append('line').attr('class', 'data-arrow')
      .attr('x1', x1).attr('y1', y1).attr('x2', x2 - 2).attr('y2', y2)
      .attr('marker-end', 'url(#arrow)');
    if (f.label) {
      svg.append('text').attr('class', 'flow-label')
        .attr('x', (x1 + x2) / 2).attr('y', y1 - 6).attr('text-anchor', 'middle').text(f.label);
    }
  });

  // Writeback curve: MAC top → Scratchpad top
  const mtop = { x: blockPos['mac'].cx, y: blockPos['mac'].y };
  const stop = { x: blockPos['sram'].cx, y: blockPos['sram'].y };
  const arcY = Math.min(mtop.y, stop.y) - 28;
  svg.append('path').attr('class', 'writeback')
    .attr('d', `M ${mtop.x} ${mtop.y} C ${mtop.x} ${arcY}, ${stop.x} ${arcY}, ${stop.x} ${stop.y}`)
    .attr('marker-end', 'url(#arrow)');
  svg.append('text').attr('class', 'flow-label')
    .attr('x', (mtop.x + stop.x) / 2).attr('y', arcY + 2).attr('text-anchor', 'middle')
    .text('accumulator writeback');

  // Control lines from sequencer
  const seq = blockPos['seq'];
  ['mac', 'sram', 'dma'].forEach(target => {
    const t = blockPos[target];
    svg.append('line').attr('class', 'ctrl-arrow')
      .attr('x1', seq.x).attr('y1', seq.cy).attr('x2', t.x + t.w).attr('y2', t.cy + 8)
      .attr('marker-end', 'url(#arrow-ctrl)');
  });
  svg.append('text').attr('class', 'block-sub')
    .attr('x', seq.cx).attr('y', seq.y + seq.h + 18).attr('text-anchor', 'middle').text('no per-cycle');
  svg.append('text').attr('class', 'block-sub')
    .attr('x', seq.cx).attr('y', seq.y + seq.h + 32).attr('text-anchor', 'middle').text('instruction fetch');
}
draw();
const ro = new ResizeObserver(() => draw());
ro.observe(document.getElementById('chart'));
</script>
</body>
</html>
