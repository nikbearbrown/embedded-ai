<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Figure 13.2 — TFLite Micro memory layout</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:wght@400;500;700&family=Inter:wght@400;600;700&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
<style>
  :root {
    --color-white:     #FFFFFF;
    --color-ink:       #121212;
    --color-red:       #C8102E;
    --color-secondary: #545454;
    --color-border:    #D4D4D4;
    --color-ochre:     #C8860E;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --color-white:     #111111;
      --color-ink:       #F0EBE3;
      --color-red:       #E8243A;
      --color-secondary: #A0978C;
      --color-border:    #2E2E2E;
      --color-ochre:     #D49A30;
    }
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--color-white); color: var(--color-ink); font-family: 'Inter', sans-serif; padding: 24px; }
  h1 { font-family: 'EB Garamond', Georgia, serif; font-weight: 500; font-size: 28px; margin-bottom: 4px; }
  p.subtitle { color: var(--color-secondary); font-size: 13px; margin-bottom: 24px; max-width: 70ch; }
  #chart { width: 100%; height: 520px; position: relative; }
  .region-head { font-family: 'EB Garamond', Georgia, serif; font-weight: 700; font-size: 16px; fill: var(--color-ink); }
  .region-sub { font-family: 'Inter', sans-serif; font-size: 11px; fill: var(--color-secondary); }
  .frame { fill: none; stroke: var(--color-ink); stroke-width: 1.25; }
  .block { stroke: var(--color-secondary); stroke-width: 1; transition: opacity 200ms cubic-bezier(0.2,0.8,0.2,1); }
  .block.b1 { fill: var(--color-border); }
  .block.b2 { fill: var(--color-secondary); fill-opacity: 0.45; }
  .block.b3 { fill: var(--color-ink); fill-opacity: 0.18; }
  .block:hover, .block:focus { opacity: 0.85; outline: none; }
  .block-name { font-family: 'Inter', sans-serif; font-weight: 700; font-size: 13px; fill: var(--color-ink); }
  .block-detail { font-family: 'Inter', sans-serif; font-size: 11px; fill: var(--color-secondary); }
  .block-size { font-family: 'JetBrains Mono', monospace; font-size: 11px; fill: var(--color-ink); }
  .pin-circle { fill: var(--color-red); stroke: none; }
  .pin-text { font-family: 'Inter', sans-serif; font-weight: 700; font-size: 11px; fill: var(--color-white); }
  .pin-line { stroke: var(--color-red); stroke-dasharray: 3 2; stroke-width: 0.75; }
  .pin-label { font-family: 'EB Garamond', Georgia, serif; font-style: italic; font-size: 11px; fill: var(--color-red); }
  .align-bar { stroke: var(--color-ochre); stroke-width: 3; }
  .align-text { font-family: 'JetBrains Mono', monospace; font-size: 9px; fill: var(--color-ochre); }
  .caption { color: var(--color-secondary); font-family: 'EB Garamond', Georgia, serif; font-style: italic; font-size: 13px; margin-top: 16px; max-width: 70ch; }
  .tooltip { position: absolute; pointer-events: none; opacity: 0; background: var(--color-ink); color: var(--color-white); padding: 8px 12px; font-size: 12px; font-family: 'Inter', sans-serif; max-width: 280px; }
  @media (prefers-reduced-motion: reduce) { * { transition: none !important; animation: none !important; } }
</style>
</head>
<body>
<h1>Figure 13.2 — TFLite Micro on-device memory layout</h1>
<p class="subtitle">Flash holds the model, engine, and op kernels. SRAM holds the live tensor arena. Four failure points sit on the boundary between the two.</p>
<div id="chart" role="img" aria-labelledby="chart-title chart-desc"></div>
<p class="caption">Hover any block to see the role it plays in <code>Invoke()</code>.</p>
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.9.0/d3.min.js"></script>
<script>
const flashBlocks = [
  { id: 'model',  name: 'model byte array', detail: 'flatbuffer of layers + quantization params', size: '~85 KB', h: 130, class: 'b1',
    body: 'const unsigned char model_data[] · generated by xxd -i model.tflite' },
  { id: 'engine', name: 'TFLite Micro engine', detail: 'interpreter + OpResolver + MemPlanner', size: '~100 KB', h: 70, class: 'b2',
    body: 'Static C++ library, no dynamic memory allocation by default.' },
  { id: 'kernels',name: 'op kernels',          detail: 'only registered ops: Conv2D, FullyConnected, Softmax', size: 'few KB each', h: 80, class: 'b3',
    body: 'Every op the model uses must be added to MicroMutableOpResolver explicitly.' }
];

const sramBlocks = [
  { id: 'arena',  name: 'tensor arena',  detail: 'alignas(16) uint8_t arena[N]', size: '~80 KB', h: 170, class: 'b1',
    body: 'All intermediate activations, re-used across layers. Aligned to 16 bytes.' },
  { id: 'stack',  name: 'stack',         detail: 'grows down — main loop + ISR frames',          size: '~20 KB', h: 50, class: 'b2',
    body: 'Stack overflow here causes silent corruption of the arena above.' },
  { id: 'heap',   name: 'heap (often unused)', detail: 'avoid in embedded ML',                    size: 'avoid',  h: 40, class: 'b3',
    body: 'TFLite Micro deliberately does not use heap — predictability over flexibility.' }
];

const pins = [
  { n: 1, region: 'sram',  target: 'arena',   label: 'arena too small',       offset: { x: 16, y: 12 } },
  { n: 2, region: 'flash', target: 'kernels', label: 'missing op',            offset: { x: 16, y: 20 } },
  { n: 3, region: 'flash', target: 'model',   label: 'calibration mismatch', offset: { x: 16, y: 28 } },
  { n: 4, region: 'sram',  target: 'arena',   label: 'alignment fault',       offset: { x: 0,  y: 0  } }
];

const tooltip = d3.select('body').append('div').attr('class', 'tooltip');
function showTip(event, d) {
  tooltip.html(`<strong>${d.name}</strong> <span style="color:#aaa">(${d.size})</span><br><span style="color:#aaa">${d.detail}</span><br><br>${d.body}`)
    .style('left', (event.pageX + 12) + 'px')
    .style('top', (event.pageY - 28) + 'px')
    .transition().duration(150).style('opacity', 1);
}
function moveTip(event) { tooltip.style('left', (event.pageX + 12) + 'px').style('top', (event.pageY - 28) + 'px'); }
function hideTip() { tooltip.transition().duration(100).style('opacity', 0); }

function draw() {
  const container = document.getElementById('chart');
  d3.select('#chart').selectAll('svg').remove();
  const totalWidth = container.clientWidth || 880;
  const totalHeight = 520;
  const margin = { top: 60, right: 24, bottom: 60, left: 24 };
  const chartWidth = totalWidth - margin.left - margin.right;
  const chartHeight = totalHeight - margin.top - margin.bottom;

  const svg = d3.select('#chart').append('svg')
    .attr('width', totalWidth).attr('height', totalHeight)
    .attr('role', 'img').attr('aria-labelledby', 'chart-title chart-desc');
  svg.append('title').attr('id', 'chart-title').text('TFLite Micro memory layout');
  svg.append('desc').attr('id', 'chart-desc').text('Two side-by-side regions: flash holds the model byte array, the TFLite Micro engine, and op kernels; SRAM holds the tensor arena, stack, and heap. Four failure pins mark common silent-failure points.');

  const colWidth = (chartWidth - 40) / 2;
  const flashG = svg.append('g').attr('transform', `translate(${margin.left},${margin.top})`);
  const sramG  = svg.append('g').attr('transform', `translate(${margin.left + colWidth + 40},${margin.top})`);

  function renderRegion(g, headLabel, subLabel, blocks, region) {
    g.append('text').attr('class', 'region-head').attr('x', 12).attr('y', -16).text(headLabel);
    g.append('text').attr('class', 'region-sub').attr('x', 12).attr('y', -2).text(subLabel);
    g.append('rect').attr('class', 'frame').attr('x', 0).attr('y', 8).attr('width', colWidth).attr('height', 380);

    let y = 24;
    blocks.forEach(b => {
      const blockG = g.append('g').attr('class', 'block-g')
        .attr('transform', `translate(12,${y})`);

      blockG.append('rect')
        .attr('class', `block ${b.class}`)
        .attr('x', 0).attr('y', 0).attr('width', colWidth - 24).attr('height', b.h - 8)
        .attr('tabindex', 0)
        .attr('aria-label', `${b.name}: ${b.detail}, size ${b.size}`)
        .datum(b)
        .on('mouseover', showTip).on('mousemove', moveTip).on('mouseout', hideTip)
        .on('focus', (event, d) => showTip(event, d)).on('blur', hideTip);

      blockG.append('text').attr('class', 'block-name').attr('x', 12).attr('y', 20).text(b.name);
      blockG.append('text').attr('class', 'block-detail').attr('x', 12).attr('y', 36).text(b.detail);
      blockG.append('text').attr('class', 'block-size')
        .attr('x', colWidth - 36).attr('y', 20).attr('text-anchor', 'end').text(b.size);
      b._y = y;
      b._region = region;
      y += b.h + 4;
    });

    return blocks;
  }

  renderRegion(flashG, 'Flash (read-only)', '≈ 256 KB typical · MCU ROM region', flashBlocks, 'flash');
  renderRegion(sramG,  'SRAM (read-write)', '≈ 256 KB on Cortex-M4 · live activations', sramBlocks, 'sram');

  // 16-byte alignment marker on the arena
  const arenaY = sramBlocks[0]._y;
  sramG.append('line').attr('class', 'align-bar')
    .attr('x1', 12).attr('y1', arenaY).attr('x2', 12).attr('y2', arenaY + sramBlocks[0].h - 8);
  sramG.append('text').attr('class', 'align-text').attr('x', 8).attr('y', arenaY + 14).attr('text-anchor', 'end').text('16');
  sramG.append('text').attr('class', 'align-text').attr('x', 8).attr('y', arenaY + 26).attr('text-anchor', 'end').text('byte');
  sramG.append('text').attr('class', 'align-text').attr('x', 8).attr('y', arenaY + 38).attr('text-anchor', 'end').text('align');

  // Pins — overlay on the SVG root so they can sit on top of either region
  const overlay = svg.append('g').attr('class', 'g-pins');

  function findBlock(region, id) {
    const arr = region === 'flash' ? flashBlocks : sramBlocks;
    return arr.find(b => b.id === id);
  }

  pins.forEach(p => {
    const blk = findBlock(p.region, p.target);
    const baseG = p.region === 'flash'
      ? { x: margin.left + 12, y: margin.top + blk._y }
      : { x: margin.left + colWidth + 40 + 12, y: margin.top + blk._y };
    const cx = baseG.x + p.offset.x;
    const cy = baseG.y + p.offset.y;
    overlay.append('circle').attr('class', 'pin-circle').attr('cx', cx).attr('cy', cy).attr('r', 10);
    overlay.append('text').attr('class', 'pin-text').attr('x', cx).attr('y', cy + 4).attr('text-anchor', 'middle').text(p.n);
  });

  // Pin legend strip at bottom
  const legendY = margin.top + chartHeight - 4;
  const legend = svg.append('g').attr('transform', `translate(${margin.left},${legendY})`);
  legend.append('text').attr('class', 'region-sub').attr('x', 0).attr('y', 0).text('failure points');
  pins.forEach((p, i) => {
    const x = 110 + i * 150;
    legend.append('circle').attr('class', 'pin-circle').attr('cx', x).attr('cy', -4).attr('r', 8);
    legend.append('text').attr('class', 'pin-text').attr('x', x).attr('y', 0).attr('text-anchor', 'middle').text(p.n);
    legend.append('text').attr('class', 'pin-label').attr('x', x + 14).attr('y', 0).text(p.label);
  });
}

draw();
const ro = new ResizeObserver(() => draw());
ro.observe(document.getElementById('chart'));
</script>
</body>
</html>
